- id: arxiv:2101.04866v1
  title_zh: 面向5G+移动设备的节能联邦学习研究
  title_en: Towards Energy Efficient Federated Learning over 5G+ Mobile Devices
  pdf_url: https://arxiv.org/pdf/2101.04866v1.pdf
  publish_time: '2021-01-13'
  update_time: '2021-01-13'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着机器学习算法、5G及更高级无线通信技术与人工智能硬件实现的深度融合，联邦学习在5G+移动设备上的应用迅速发展，推动了AI功能向终端迁移并开启设备端AI应用新时代。然而，尽管联邦学习取得显著进展，高能耗问题仍是限制其在电池受限设备上发展的核心障碍。本文聚焦于通过权衡'工作'（本地计算）与'通信'（无线传输）的能耗来提升整体能效。首先，系统分析了图形处理单元（GPU）计算和无线传输的能耗模型，揭示关键能耗来源；其次，全面综述了联邦学习流程与节能技术（如梯度稀疏化、权重量化及模型剪枝）的集成现状，探讨其优化潜力；最后，从能效视角提出5G+移动设备联邦学习的未来研究方向，包括动态资源调度与硬件协同设计。研究为解决移动设备上联邦学习的能耗瓶颈提供了理论框架与实践路径，对推动绿色AI应用具有重要意义。
  key_points_zh:
  - 联邦学习在5G+移动设备上面临高能耗挑战，尤其对电池供电设备构成发展限制。
  - 提出通过本地计算与无线通信能耗的动态权衡机制提升整体能效。
  - 详细解析GPU计算和无线传输的能耗模型，识别关键优化节点。
  - 综述梯度稀疏化、权重量化等节能技术在联邦学习中的集成应用现状。
  - 提出未来研究方向，强调动态资源调度与硬件协同设计的重要性。
  queries:
  - Energy efficient mobile agents
  source: arxiv
  created_at: '2026-03-18T21:00:30+08:00'
- id: arxiv:2012.11070v2
  title_zh: 通过权重量化与无线传输联合设计实现异构移动设备上的高效联邦学习
  title_en: Energy Efficient Federated Learning over Heterogeneous Mobile Devices
    via Joint Design of Weight Quantization and Wireless Transmission
