  summary_zh: 本文针对移动边缘计算中的计算卸载问题，提出了一种基于多智能体深度强化学习的能量优化方案，旨在降低手机系统功耗并延长设备寿命。研究场景涉及多个能量受限用户通过共享无线介质竞争将任务卸载至多服务器，传统方法常导致能耗不均衡和系统寿命缩短。所提算法为每个服务器部署独立智能体，实时观测关联用户状态并动态选择最优卸载目标，以平衡计算时间（任务完成效率）与系统寿命（电池续航）两大核心指标。通过能量感知机制，算法智能调整卸载策略，减少冗余计算和通信开销，从而最小化整体能耗。数值实验验证了该方法在功耗控制上的优越性：相比基线算法，它在计算时间与系统寿命的权衡中表现更佳，显著提升能效。研究为资源受限的移动设备提供了实用框架，适用于5G边缘网络等场景，通过智能决策实现功耗的精细化管理，为AI驱动的低功耗移动系统设计奠定基础。
  key_points_zh:
  - 多智能体深度强化学习算法动态优化卸载决策，减少不必要的计算和通信能耗。
  - 智能体实时选择最佳用户任务，避免能量浪费，直接降低手机系统功耗。
  - 系统寿命作为关键指标，与电池续航紧密关联，确保长期能效提升。
  - 在计算时间与功耗间实现高效权衡，性能优于传统卸载策略。
  - 适用于多服务器边缘环境，通过减少资源竞争延长移动设备使用时间。
