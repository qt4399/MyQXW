- id: arxiv:2309.13643v1
  title_zh: REWAFL：面向移动设备的节能高效联邦学习参与者选择机制
  title_en: 'REWAFL: Residual Energy and Wireless Aware Participant Selection for
    Efficient Federated Learning over Mobile Devices'
  pdf_url: https://arxiv.org/pdf/2309.13643v1.pdf
  publish_time: '2023-09-24'
  update_time: '2023-09-24'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 参与者选择对加速联邦学习收敛至关重要，但现有方法多聚焦训练精度而忽视设备剩余能量，后者直接决定设备能否持续参与。同时，移动设备异构无线传输速率对训练效率的影响常被忽略，且参与者选择易引发模型陈旧性问题。本文提出REWAFL机制，创新性设计剩余能量与无线感知的参与者选择框架。其核心是新型效用函数，联合优化全局训练目标与本地能量效用，整合设备能耗与剩余电量数据；在此基础上，制定无线感知的本地计算策略，动态调整任务分配。REWAFL将陈旧性解决方案内嵌于效用函数，避免传统孤立处理的脱节问题。实验表明，该机制显著提升训练精度与收敛速度，同时有效预防设备'电量耗尽'，为移动联邦学习提供可持续的能效优化方案，确保系统长期稳定运行。
  key_points_zh:
  - 现有参与者选择方法忽略设备剩余能量，导致部分设备无法持续参与训练。
  - 移动设备异构无线传输速率对训练效率的影响未被充分考虑。
  - REWAFL设计联合效用函数，同步优化全局训练目标与本地能量消耗。
  - 整合设备能耗与剩余电量数据，实现可持续的参与者选择机制。
  - 将陈旧性解决方案内嵌于效用函数，提升系统鲁棒性。
  - 实验验证能提高训练精度并避免设备电量耗尽问题。
  queries:
  - Energy efficient mobile agents
  source: arxiv
  created_at: '2026-03-18T21:00:31+08:00'
- id: arxiv:2308.04436v1
  title_zh: 绿色移动计算中AI的双重面孔：文献综述
  title_en: 'The Two Faces of AI in Green Mobile Computing: A Literature Review'
  pdf_url: https://arxiv.org/pdf/2308.04436v1.pdf
  publish_time: '2023-07-21'
  update_time: '2023-07-21'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 人工智能为现代移动设备提供了相机助手、语音交互和推荐系统等关键功能，但其运行过程消耗大量能量，同时AI技术也被用于设计更节能的移动系统解决方案，形成双重角色：既是功能使能者，又是主要功耗源。本研究系统回顾了过去十年绿色移动计算领域的34篇核心文献，揭示了研究趋势并划分为13个主题，包括AI能耗建模、动态资源调度及硬件协同优化等。分析显示，该领域自2019年起缓慢增长，但针对AI系统自身能耗的研究严重不足，远少于利用AI实现节能的探索，亟需加强实证性研究。94%的论文虽提出解决方案，却未公开代码或模型，限制了实际应用；28篇纯学术研究凸显行业参与缺失，移动软件企业贡献有限。综述指出，当前工作过度侧重理论验证，缺乏真实设备测试和标准化评估指标。建议未来研究应平衡AI功能与能耗，推动开源实践并促进产学研合作，以解决移动设备中AI驱动的功耗矛盾，实现可持续绿色计算发展。
  key_points_zh:
  - AI在移动设备中具双重角色：提供必需功能但消耗大量能量，同时用于节能方案设计
  - 文献综述分析34篇论文，识别13个研究主题，自2019年起领域缓慢增长
  - AI系统自身能耗研究不足，相比AI用于节能的研究存在显著差距
  - 94%的解决方案未公开，限制社区复现和实际应用
  - 28篇纯学术论文表明行业参与度低，需加强移动软件企业合作
  - 呼吁更多探索性研究、开源实践及标准化评估以推动绿色移动计算
  queries:
  - Energy efficient mobile AI
  source: arxiv
  created_at: '2026-03-19T02:40:59+08:00'
- id: arxiv:2304.01646v3
  title_zh: 移动Web应用节能策略与测量：十年研究成果
  title_en: 'Energy-Saving Strategies for Mobile Web Apps and their Measurement: Results
    from a Decade of Research'
  pdf_url: https://arxiv.org/pdf/2304.01646v3.pdf
  publish_time: '2023-04-04'
  update_time: '2023-04-27'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着移动互联网的快速发展，2022年全球超过50%的网络流量通过智能手机访问，移动Web应用的高能耗问题日益突出，不仅导致设备电池快速耗尽，还加剧了全球能源消耗压力。本研究通过系统文献综述方法，深入分析了过去十年间44篇核心文献，全面梳理了移动Web应用的节能实验与策略。研究揭示了主要耗能环节，包括频繁的网络请求、JavaScript执行开销及页面渲染过程，并详细阐述了功耗测量技术（如专业硬件工具Monsoon
    Power Monitor的应用）和标准化实验设计流程。节能策略被系统归纳为三大类：前端代码优化（减少脚本执行时间）、资源管理（图像压缩与缓存机制）以及智能调度算法（利用AI动态调整资源分配）。实证结果表明，综合实施这些策略可降低能耗10%-20%，显著延长电池使用时间；例如，仅节省5%的能耗就相当于避免福岛一个核反应堆的年发电量，对全球节能具有深远意义。本综述为研究人员和开发者提供了实用指南，助力移动Web应用的绿色可持续发展，同时为AI驱动的手机系统功耗优化提供了理论基础。
  key_points_zh:
  - 移动Web应用的高能耗问题严重，2022年超半数网络流量来自移动设备，直接影响电池寿命并加剧能源消耗。
  - 本研究基于44篇核心文献的系统综述，识别了主要耗能因素如网络请求、JavaScript执行和渲染过程。
  - 详细描述了节能实验方法，包括专业功耗测量工具的使用和标准化实验流程设计原则。
  - 节能策略分为代码优化、资源压缩和智能调度算法三类，其中AI技术用于动态资源分配以降低功耗。
  - 综合应用策略可实现10%-20%的能耗降低，显著延长设备电池续航时间。
  - 仅节省5%能耗就相当于减少福岛一个核反应堆的发电量，凸显节能措施的全球重要性。
  queries:
  - Smartphone energy saving AI
  source: arxiv
  created_at: '2026-03-19T02:50:07+08:00'
- id: arxiv:2303.01826v2
  title_zh: TopSpark：一种用于自主移动智能体上节能脉冲神经网络的时间步优化方法
  title_en: 'TopSpark: A Timestep Optimization Methodology for Energy-Efficient Spiking
    Neural Networks on Autonomous Mobile Agents'
  pdf_url: https://arxiv.org/pdf/2303.01826v2.pdf
  publish_time: '2023-03-03'
  update_time: '2023-07-29'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 自主移动智能体通常由电池供电，需低功耗机器学习算法以完成任务并适应多样化环境。脉冲神经网络（SNN）凭借稀疏计算和生物启发学习机制，能提供低功耗处理及高效在线学习能力。现有技术通过减少神经元处理脉冲序列的时间步优化SNN能耗，但依赖密集设计搜索确定固定时间步设置，仅适用于推理阶段，阻碍了训练和推理中的进一步节能，并限制了运行时的高效在线学习。为此，本文提出TopSpark方法，利用自适应时间步减少技术，在训练和推理中实现节能SNN处理，同时保持准确率接近无时间步减少的SNN。其核心思想包括：分析不同时间步对准确率的影响；识别关键神经元参数；采用参数增强策略减少脉冲活动以提升学习和推理效率；开发准确率、延迟和能量的权衡策略以满足设计需求。实验表明，TopSpark在不同网络规模、学习规则和工作负载下，平均节省延迟3.9倍，训练能耗降低3.5倍，推理能耗降低3.3倍，同时准确率维持在基准SNN的2%以内。
  key_points_zh:
  - TopSpark通过自适应时间步减少技术优化SNN能耗，适用于训练和推理双阶段
  - 分析时间步对准确率的影响并识别关键神经元参数，确保优化精准性
  - 采用参数增强策略减少脉冲活动，显著提升学习和推理效率
  - 开发准确率、延迟和能量的动态权衡策略，灵活满足设计需求
  - 实验验证平均延迟节省3.9倍，训练能耗降低3.5倍，推理能耗降低3.3倍
  - 在保持高准确率的同时，有效支持移动智能体的实时自适应能力
  queries:
  - Mobile energy efficiency agents
  source: arxiv
  created_at: '2026-03-19T03:07:30+08:00'
- id: arxiv:2303.01509v1
  title_zh: EPAM：移动AI的预测性能耗模型
  title_en: 'EPAM: A Predictive Energy Model for Mobile AI'
  pdf_url: https://arxiv.org/pdf/2303.01509v1.pdf
  publish_time: '2023-03-02'
  update_time: '2023-03-02'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 人工智能应用在移动设备上面临严格的延迟要求，小型化与量化深度神经网络虽提升计算效率，但其能耗行为尚未被系统研究。本文针对视觉与非视觉应用，全面考察不同DNN模型在CPU、GPU及NNAPI等处理源下的计算资源利用、延迟与能耗特性。通过大量实验测量四类处理源上模型的运行指标，揭示了设备配置差异带来的挑战并提出解决方案。研究发现移动AI在不同应用类型与处理源间存在显著行为差异，例如视觉任务在GPU上能效更高。基于此，创新性提出基于高斯过程回归的通用预测能耗模型EPAM，该模型仅需DNN结构、计算资源及处理器参数，即可准确预测任意设备配置下完整应用周期的能耗。本成果为AI社区提供关键事实依据与实用预测工具，助力移动AI应用的能效优化设计。
  key_points_zh:
  - 系统测量多类DNN模型在CPU、GPU等处理源下的能耗、延迟及内存使用数据
  - 揭示视觉与非视觉应用在不同处理源上的能耗行为差异及关键影响因素
  - 识别设备配置差异导致的能耗研究挑战，提出标准化实验方法
  - 构建基于高斯过程回归的EPAM模型，实现跨设备配置的精准能耗预测
  - 模型支持完整应用周期能耗估算，为能效优化提供量化决策依据
  queries:
  - Mobile AI energy efficiency
  source: arxiv
  created_at: '2026-03-19T10:36:49+08:00'
- id: arxiv:2302.10681v4
  title_zh: FrankenSplit：用于移动边缘计算的高效神经特征压缩与浅层变分瓶颈注入
  title_en: 'FrankenSplit: Efficient Neural Feature Compression with Shallow Variational
    Bottleneck Injection for Mobile Edge Computing'
  pdf_url: https://arxiv.org/pdf/2302.10681v4.pdf
  publish_time: '2023-02-21'
  update_time: '2024-03-23'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 移动AI加速器的普及使延迟敏感型应用能在客户端执行轻量级深度神经网络，但关键任务所需的高性能模型往往超出边缘设备承载能力，导致计算卸载时高维数据竞争有限网络带宽，加剧系统功耗问题。本研究创新性地提出FrankenSplit框架，摒弃传统分区DNN浅层执行思路，转而将本地资源集中于面向机器可解释性优化的变分压缩技术。该方法通过浅层变分瓶颈注入实现神经特征的高效压缩，在模拟边缘设备与服务器资源不对称分布的环境中进行了全面评估。实验结果表明，该方案在保持模型精度不变的前提下，比特率较最先进语义压缩方法降低60%，且卸载速度比现有编解码标准快16倍。这一突破显著缓解了移动边缘计算中的带宽压力与能耗瓶颈，为低功耗手机AI系统提供了轻量化数据传输新范式，有效平衡了性能与能效需求。
  key_points_zh:
  - 摒弃分区DNN浅层执行，聚焦变分压缩技术优化机器可解释性
  - 引入浅层变分瓶颈注入实现神经特征高效压缩，降低数据维度
  - 比特率较先进方法降低60%且精度无损，显著减少传输能耗
  - 卸载速度提升16倍，缓解边缘计算带宽竞争问题
  - 在资源不对称环境中验证，适用于手机等移动设备低功耗场景
  - 为移动AI系统提供轻量化数据传输解决方案，优化整体能效
  queries:
  - Low power mobile AI
  source: arxiv
  created_at: '2026-03-19T01:53:46+08:00'
- id: arxiv:2212.12620v1
  title_zh: Mantis：利用脉冲神经网络实现节能自主移动智能体
  title_en: 'Mantis: Enabling Energy-Efficient Autonomous Mobile Agents with Spiking
