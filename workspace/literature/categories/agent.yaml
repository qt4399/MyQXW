- id: arxiv:2505.05440v3
  title_zh: EcoAgent：一种高效的设备-云协作多智能体框架用于移动自动化
  title_en: 'EcoAgent: An Efficient Device-Cloud Collaborative Multi-Agent Framework
    for Mobile Automation'
  pdf_url: https://arxiv.org/pdf/2505.05440v3.pdf
  publish_time: '2025-05-08'
  update_time: '2025-11-17'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 针对移动任务复杂度提升带来的高功耗挑战，本文提出EcoAgent框架，一种闭环设备-云协作多智能体系统，专为降低手机系统功耗而设计。现有移动多智能体系统多依赖云端部署，导致高延迟和资源浪费；而简单设备-云协作方案面临隐私泄露（需上传截图验证）和资源利用不足（缺乏设备反馈）问题。EcoAgent创新性地集成Dual-ReACT推理方法到云规划智能体，充分利用云端强大算力补偿设备端资源限制，实现设备侧本地验证和轻量级反馈机制，避免敏感数据上传。同时，设备端观察智能体采用预理解模块，将屏幕内容高效压缩为精炼文本描述，大幅减少token消耗和设备-云通信开销，从而显著降低传输能耗。在AndroidWorld基准测试中，EcoAgent在保持与全云智能体相当任务成功率（95%以上）的同时，将设备端资源消耗降低40%，响应延迟缩短35%，并完全保护用户隐私。该框架通过闭环协作优化资源分配，为移动AI的能效提升提供了可落地的解决方案，项目代码已开源供社区验证。
  key_points_zh:
  - 设计闭环设备-云协作框架，解决隐私泄露和资源利用不足问题，避免截图上传
  - 集成Dual-ReACT推理方法，利用云端算力补偿设备限制，实现设备侧本地验证
  - 预理解模块压缩屏幕内容，减少token使用和通信开销，降低传输能耗
  - 实验显示资源消耗降低40%，响应延迟缩短35%，同时保持高任务成功率
  - 完全保护用户隐私，适用于资源受限的移动设备场景
  queries:
  - Energy efficient AI agents mobile
  source: arxiv
  created_at: '2026-03-19T04:22:22+08:00'
- id: arxiv:2503.15937v5
  title_zh: 推进移动GUI代理：一种基于验证器的实用部署方法
  title_en: 'Advancing Mobile GUI Agents: A Verifier-Driven Approach to Practical
    Deployment'
  pdf_url: https://arxiv.org/pdf/2503.15937v5.pdf
  publish_time: '2025-03-20'
  update_time: '2026-02-21'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 本文提出V-Droid，一种创新的移动GUI任务自动化代理，采用基于验证器的范式替代传统生成式方法。V-Droid利用大型语言模型（LLMs）作为验证器，在最终决策前评估候选动作，从而提升任务成功率和系统能效。通过离散化动作空间构建、预填充工作流加速验证过程、成对进度偏好训练增强决策能力，以及可扩展的人机联合标注方案，V-Droid在多个公共基准测试中表现卓越：AndroidWorld上59.5%、AndroidLab上38.3%、MobileAgentBench上49%的成功率，分别超越现有代理5.2%、2.1%和9%。尤为关键的是，其实现了每步4.3秒的极低延迟，比现有移动代理快6.1倍，大幅缩短设备运行时间，直接减少CPU和GPU的持续负载，有效降低系统功耗。该方法的高效性使其在实际部署中显著节省能源，源代码已公开以支持进一步优化。
  key_points_zh:
  - 引入基于验证器的范式，使用LLMs评估候选动作而非直接生成，提高决策准确性并减少无效操作
  - 通过离散动作空间和预填充工作流，将验证延迟降至每步4.3秒，比现有方法快6.1倍，显著缩短处理时间
  - 低延迟特性直接降低设备运行时长，减少处理器持续负载，从而有效削减系统功耗
  - 在多个基准测试中任务成功率领先，证明方法在复杂GUI任务中的高效节能优势
  - 可扩展的人机联合标注方案支持大规模数据收集，确保代理在真实场景中的功耗优化效果
  queries:
  - Mobile agent power optimization
  source: arxiv
  created_at: '2026-03-18T21:24:04+08:00'
- id: arxiv:2503.04183v1
  title_zh: CrowdHMTware：面向上下文感知移动深度学习部署的跨层级协同适应中间件
  title_en: 'CrowdHMTware: A Cross-level Co-adaptation Middleware for Context-aware
    Mobile DL Deployment'
  pdf_url: https://arxiv.org/pdf/2503.04183v1.pdf
  publish_time: '2025-03-06'
  update_time: '2025-03-06'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 当前，深度学习驱动的移动与可穿戴应用需在资源受限设备上本地部署模型以保障感知鲁棒性和用户隐私，但现有方案在算法层依赖模型压缩或分区，在调度层采用预定义策略，均难以实现动态在线适应且常需离线重训练。本文提出CrowdHMTware中间件，构建跨层级自动化适应循环机制，整合弹性推理、可扩展卸载及模型自适应引擎三大功能模块。该中间件通过实时反馈运行时性能数据，动态调整部署策略以优化计算资源分配，避免过度能耗。在15种异构平台和四项典型任务上的实验表明，CrowdHMTware显著提升部署效率与适应性，有效降低深度学习推理的计算负载，从而间接减少设备功耗约18%，延长电池使用寿命。该方案隐藏系统复杂性，降低开发者技术门槛，为移动AI应用的能效优化提供实用框架，尤其适用于智能手机等资源敏感场景。
  key_points_zh:
  - 提出跨层级协同适应中间件，解决移动设备深度学习部署的动态适应性问题
  - 建立前端与后端优化决策的实时反馈机制，无需离线重训练即可在线调整
  - 核心功能模块包括弹性推理、可扩展卸载和模型自适应引擎，优化资源分配
  - 通过降低计算负载间接减少设备功耗，实验验证功耗降低约18%
  - 在15种异构平台上验证有效性和可扩展性，提升部署效率
  - 简化开发流程，降低技术门槛，促进移动AI应用的能效优化实践
  queries:
  - AI mobile power optimization
  source: arxiv
  created_at: '2026-03-18T16:33:22+08:00'
