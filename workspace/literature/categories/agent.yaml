  summary_zh: 深度学习推动了目标检测技术的显著进步，但主流算法计算和内存密集，难以在嵌入式设备实用化。本文提出面向异构嵌入式平台的系统级优化方案，通过软硬件协同设计实现高效能效比。核心创新包括：将检测网络量化至4-8位低位宽，利用移位操作符替代乘法运算；设计基于FPGA的专用加速器，采用混合数据流策略适配不同卷积层特性；引入列优先平铺方法高效映射计算密集层，支持任意尺寸特征图处理。系统架构采用异构分工：加速器专注卷积运算，低功耗CPU处理其他操作，并通过流水线执行消除空闲周期。在真实监控场景测试中，512x512输入视频实现18帧/秒推理速度，整机功耗仅6.9瓦（含显示屏），PASCAL
    VOC 2012数据集验证mAP达66.4%。该方案在精度损失小于2%的前提下，功耗较传统方案降低55%，为移动视觉应用提供了实用化低功耗框架。
  key_points_zh:
  - 提出软硬件协同的系统级方案，针对嵌入式设备优化目标检测能效
  - 采用低位宽量化和移位操作符，大幅降低计算复杂度和内存带宽需求
  - 设计专用加速器实现混合数据流处理，适配卷积层异构特性
  - 创新列优先平铺策略提升资源利用率，支持任意尺寸特征图处理
  - 实测性能：512x512输入下18fps推理速度，功耗6.9W，mAP 66.4%
  - 在精度损失可控前提下，功耗较传统方案降低55%，适用于移动视觉场景
  queries:
  - low power AI techniques
  source: arxiv
  created_at: '2026-03-19T01:24:36+08:00'
- id: arxiv:1909.00805v1
