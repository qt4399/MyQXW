- id: arxiv:2410.07426v1
  title_zh: CAFEEN：基于多智能体强化学习的节能片上网络合作方法
  title_en: 'CAFEEN: A Cooperative Approach for Energy Efficient NoCs with Multi-Agent
    Reinforcement Learning'
  pdf_url: https://arxiv.org/pdf/2410.07426v1.pdf
  publish_time: '2024-10-09'
  update_time: '2024-10-09'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 在高性能片上网络（NoC）架构中，高效的电源管理对降低系统能耗具有决定性作用。本文提出CAFEEN框架，一种创新的节能解决方案，通过融合基于启发式的细粒度电源门控和基于机器学习的粗粒度电源门控技术，实现动态能效优化。该框架在低网络负载条件下采用细粒度方法，仅激活必要的NoC缓冲区以最小化空闲能耗；当负载达到峰值时，智能切换至粗粒度方法，利用多智能体强化学习算法协调电源门控决策，有效抑制累积唤醒开销。CAFEEN的核心优势在于其自适应能力，能够根据实时负载变化动态平衡能效与性能需求，避免传统方法在能效与延迟间的权衡困境。实验结果表明，该框架在单应用工作负载下实现总能耗降低2.60倍，在多应用工作负载下降低4.37倍，显著优于现有最先进的NoC电源管理方案，为移动设备芯片设计提供了高效节能的新途径。
  key_points_zh:
  - 创新性提出CAFEEN框架，结合细粒度和粗粒度电源门控技术实现动态能效管理
  - 低负载时采用启发式细粒度方法，仅激活必需缓冲区以减少空闲能耗
  - 高负载时切换至机器学习粗粒度方法，优化电源门控决策流程
  - 利用多智能体强化学习最小化唤醒开销，提升系统响应效率
  - 自适应平衡能效与性能，避免传统方法在能耗和延迟间的冲突
  - 实验验证在单应用和多应用工作负载下分别降低能耗2.60倍和4.37倍
  queries:
  - Multi-agent energy efficiency smartphone
  source: arxiv
  created_at: '2026-03-19T09:40:59+08:00'
- id: arxiv:2408.14001v2
  title_zh: 基于模型缓存的移动代理去中心化联邦学习
  title_en: Decentralized Federated Learning with Model Caching on Mobile Agents
  pdf_url: https://arxiv.org/pdf/2408.14001v2.pdf
  publish_time: '2024-08-26'
  update_time: '2025-02-04'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 在移动设备系统中，降低功耗是AI应用的关键挑战。本文提出缓存去中心化联邦学习（Cached-DFL）框架，旨在解决移动代理环境中分布式联邦学习（DFL）因通信间歇性导致的收敛缓慢和准确性下降问题。DFL通过代理间本地模型交换减轻中央服务器负担，但移动设备的不稳定性阻碍了其效率。Cached-DFL创新性地引入模型缓存机制：每个移动代理不仅存储自身模型，还缓存近期相遇代理的模型；当代理建立连接时，交换自身及缓存模型，并利用所有缓存数据执行本地聚合。我们严格证明了算法的收敛性，显式量化了缓存引入的模型陈旧性影响，并设计了自适应缓存策略以适配不同移动场景。通过在车辆网络中的系统性实验，深入分析了代理移动性、缓存陈旧性与收敛速度的相互作用。结果表明，Cached-DFL显著减少通信频率和计算开销，从而有效降低手机系统功耗，在保持高模型精度的同时，收敛速度远超无缓存DFL方法，为AI驱动的移动节能提供了实用解决方案。
  key_points_zh:
  - 提出Cached-DFL框架，利用模型缓存机制解决移动代理通信不稳定问题，减少无效通信以降低系统功耗
  - 代理存储自身及缓存模型，相遇时交换并聚合所有可用模型，提升学习效率并削减能耗
  - 理论分析收敛性，显式建模缓存陈旧性影响，确保算法在功耗约束下的鲁棒性
  - 设计多种自适应缓存算法，优化不同移动场景下的功耗与性能平衡
  - 案例研究揭示移动性、缓存策略与功耗降低的关联，指导实际部署应用
  - 实验验证Cached-DFL大幅减少通信开销，显著降低手机系统功耗，性能优于传统方法
  queries:
  - Mobile power management agents
  source: arxiv
  created_at: '2026-03-19T04:32:53+08:00'
- id: arxiv:2407.00641v3
  title_zh: NeuroNAS：通过硬件感知脉冲神经架构搜索增强智能移动智能体的神经形态存内计算效率
  title_en: 'NeuroNAS: Enhancing Efficiency of Neuromorphic In-Memory Computing for
    Intelligent Mobile Agents through Hardware-Aware Spiking Neural Architecture Search'
  pdf_url: https://arxiv.org/pdf/2407.00641v3.pdf
  publish_time: '2024-06-30'
  update_time: '2025-04-18'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 智能移动智能体如UGV和UAV通常由便携电池供电，容量有限，需低功耗解决机器学习任务。神经形态计算结合脉冲神经网络（SNN）利用基于事件的计算实现超低功耗算法，而存内计算（IMC）硬件加速器可进一步提升效率，但SNN模型开发常忽略应用和硬件约束，限制其潜力。为此，本文提出NeuroNAS框架，通过硬件感知脉冲神经架构搜索（NAS）开发节能神经形态IMC，快速找到满足内存、面积、延迟和能耗约束的高准确率SNN架构。关键步骤包括：优化SNN操作以支持高效NAS搜索；采用量化技术最小化内存占用；开发促进有效学习的SNN架构；设计系统化硬件感知搜索算法。相比现有技术，NeuroNAS以8位权重精度快速找到SNN架构，搜索时间加速6.6倍，同时在CIFAR-10等数据集上实现高达92%的面积节省、1.2倍延迟改进和84%的能耗降低，而现有方法无法同时满足所有约束，显著提升移动智能体的能效比。
  key_points_zh:
  - NeuroNAS框架利用硬件感知SNN架构搜索，为智能移动智能体定制高效神经形态IMC方案
  - 优化SNN操作并采用量化技术，大幅减少内存占用和搜索时间
  - 开发支持有效学习的SNN架构，适应硬件约束并提升模型性能
  - 系统化搜索算法快速平衡准确率与资源约束，满足实际部署需求
  - 实验验证搜索时间加速6.6倍，面积节省92%，延迟改进1.2倍，能耗降低84%
  - 在多数据集上实现全面能效提升，解决现有技术无法兼顾多约束的问题
  queries:
  - Mobile energy efficiency agents
  source: arxiv
  created_at: '2026-03-19T03:07:32+08:00'
- id: arxiv:2406.15732v1
  title_zh: AI驱动的功率优化方法：全面综述
  title_en: 'AI-Driven Approaches for Optimizing Power Consumption: A Comprehensive
    Survey'
  pdf_url: https://arxiv.org/pdf/2406.15732v1.pdf
  publish_time: '2024-06-22'
  update_time: '2024-06-22'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 功率优化对减少环境影响、降低运营成本及保障可持续能源供应具有核心价值，其核心在于提升能源利用效率并减少资源浪费。人工智能技术的深度集成正革新能源生产、分配与消费模式，通过AI驱动的实时监控、预测分析和动态调整机制，系统能精准响应需求变化并优化功率使用。本文全面综述了17种主流AI技术在功率优化中的应用，涵盖工业、建筑及移动设备等领域，系统分析了智能算法在提升能效方面的性能表现与局限性。研究发现，AI模型可显著降低智能手机等移动平台的系统功耗，例如通过行为预测动态管理后台进程。未来方向包括深化AI与边缘计算融合，开发轻量化模型以适配资源受限设备，并探索多智能体协同优化策略，为手机系统功耗降低提供创新解决方案。
  key_points_zh:
  - AI技术通过实时监控与预测分析实现功率使用的动态优化
  - 动态调整策略有效减少能源浪费并提升资源利用率
  - 综述评估17种AI方法，揭示其在移动设备领域的应用潜力
  - 针对手机系统，AI可优化后台进程管理以降低整体功耗
  - 未来需加强轻量化模型开发以适配移动平台资源限制
  queries:
  - AI-driven system optimization
  source: arxiv
  created_at: '2026-03-19T02:58:14+08:00'
- id: arxiv:2404.19209v1
  title_zh: AdaOper：面向移动设备的节能高效并发DNN推理系统
  title_en: 'AdaOper: Energy-efficient and Responsive Concurrent DNN Inference on
    Mobile Devices'
  pdf_url: https://arxiv.org/pdf/2404.19209v1.pdf
  publish_time: '2024-04-30'
  update_time: '2024-04-30'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 深度神经网络在移动技术中广泛应用，但语音助手或视频应用等长运行场景对电池设备的能效提出严苛要求。当前移动设备异构处理器的普及使能效优化面临新挑战：计算任务分区虽提升并行速度，却未必降低能耗甚至可能增加消耗。本文提出AdaOper系统，专为移动异构处理器设计节能高效并发DNN推理方案。其核心创新在于运行时能耗分析器，能动态监测设备状态并实时调整算子分区策略，平衡能效与响应性。系统通过细粒度能耗建模，避免传统分区方法的能耗陷阱，在保证实时性能的前提下优化整体功耗。初步实验表明，相比现有并发方法，AdaOper在智能手机上实现16.88%的能耗降低，同时维持毫秒级响应延迟，为移动AI应用提供实用化能效解决方案。
  key_points_zh:
  - 异构处理器环境下，计算分区策略与能耗优化无必然关联，可能反向增加功耗。
  - AdaOper系统引入运行时能耗分析器，动态调整算子分区适应设备状态变化。
  - 通过细粒度能耗建模实现能效与响应性的协同优化。
  - 实验验证能耗降低16.88%，同时确保实时推理性能不受影响。
  - 为语音助手等长运行移动应用提供电池续航优化新路径。
  queries:
  - Energy efficient mobile agents
  source: arxiv
  created_at: '2026-03-18T21:00:31+08:00'
- id: arxiv:2404.09331v2
  title_zh: SNN4Agents：用于开发节能具身脉冲神经网络的自主代理框架
  title_en: 'SNN4Agents: A Framework for Developing Energy-Efficient Embodied Spiking
    Neural Networks for Autonomous Agents'
  pdf_url: https://arxiv.org/pdf/2404.09331v2.pdf
  publish_time: '2024-04-14'
  update_time: '2024-06-18'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 自主代理如无人机和移动机器人在提升生产力方面表现突出，但受限于便携电池，需极低功耗以延长使用寿命，这对手机系统功耗优化具有重要参考价值。神经形态计算利用生物启发的脉冲神经网络，通过事件驱动摄像头进行稀疏计算，有效降低能耗，但其在自主代理中的部署研究尚不成熟。本文提出SNN4Agents框架，整合权重量化、时间步减少和注意力窗口减少等优化技术，系统化设计节能的具身脉冲神经网络。在事件驱动汽车识别用例中，该框架在保持高精度（84.12%）的同时，实现68.75%的内存节省、3.58倍处理速度提升和4.03倍能效改进。实验结果表明，SNN4Agents能显著降低计算资源消耗，为手机等移动设备提供可扩展的低功耗AI解决方案，通过减少冗余计算和优化数据流，有效延长电池续航。
  key_points_zh:
  - SNN4Agents框架针对自主代理应用，采用脉冲神经网络实现高效能低功耗计算
  - 优化技术包括权重量化、时间步减少和注意力窗口减少，协同提升能效
  - 在NCARS数据集上保持84.12%高精度的同时，实现4.03倍能效改进
  - 减少68.75%内存占用和3.58倍延迟，优化手机系统实时响应能力
  - 为移动设备提供系统化部署方案，显著降低AI推理过程中的功耗消耗
  queries:
  - Agent-based smartphone energy efficiency
  source: arxiv
  created_at: '2026-03-19T01:32:00+08:00'
- id: arxiv:2404.06675v2
  title_zh: 面向AI系统的跨层能量优化研究
  title_en: Toward Cross-Layer Energy Optimizations in AI Systems
  pdf_url: https://arxiv.org/pdf/2404.06675v2.pdf
  publish_time: '2024-04-10'
  update_time: '2024-08-06'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 美国能源部发布的《AI for Science, Energy, and Security》报告强调了人工智能工作流优化对能源部核心任务的战略意义。随着AI和机器学习技术的普及，其能源效率已成为制约广泛应用的关键瓶颈。生成式AI模型能耗极高，例如在亚马逊训练一个2000亿参数的大语言模型估计消耗11.9吉瓦时电力，足以供应千余个美国家庭一年用电；而推理过程因单次训练服务海量用户，总体能耗更为惊人。在此背景下，高能效解决方案对缓解AI专用超级计算机和数据中心的电力供应压力至关重要。本文系统梳理了软件与硬件架构层面的研究挑战与机遇，提出跨层协同优化框架，旨在通过算法创新和系统设计降低能耗。特别针对移动设备领域，该框架可适配智能手机AI应用，显著减少系统功耗并延长电池续航，为资源受限场景提供实用路径。
  key_points_zh:
  - 生成式AI模型训练与推理过程能耗巨大，成为AI部署的主要制约因素
  - 跨层能量优化需整合软件算法与硬件架构的协同设计
  - 针对手机系统，优化策略可降低AI应用功耗并提升能效
  - 美国能源部报告指出AI工作流优化对能源任务具有基础性影响
  - 未来研究应聚焦推理阶段能耗削减，因单次训练服务规模庞大
  queries:
  - Energy efficient agents
  source: arxiv
  created_at: '2026-03-19T02:58:13+08:00'
