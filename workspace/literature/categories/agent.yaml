- id: arxiv:2012.10682v1
  title_zh: 基于深度强化学习的蜂窝网络联合频谱与功率分配
  title_en: Deep Reinforcement Learning for Joint Spectrum and Power Allocation in
    Cellular Networks
  pdf_url: https://arxiv.org/pdf/2012.10682v1.pdf
  publish_time: '2020-12-19'
  update_time: '2020-12-19'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 蜂窝网络中，无线运营商需将频谱划分为子带并在多小区复用，为减轻同频干扰，常需联合优化频谱和功率分配以最大化和速率。传统算法依赖全局信道状态信息和集中式优化器，难以在时变子带的大规模网络中实施。本文提出一种基于深度强化学习（DRL）的框架，专门解决离散频谱分配与连续功率分配的混合优化挑战。设计两个独立的DRL算法并行执行和训练，以最大化联合目标函数，无需全局信息即可适应动态网络环境。该方法通过AI代理实现分布式资源管理，有效降低手机系统功耗。仿真结果表明，所提方案在能量效率和系统性能上均优于现有分数规划算法及先前DRL方案，为移动网络AI驱动优化提供了新范式，显著提升终端设备能效。
  key_points_zh:
  - 提出深度强化学习框架解决蜂窝网络联合频谱与功率分配问题
  - 创新性处理离散频谱选择与连续功率分配的混合变量优化
  - 设计双DRL算法并行机制实现分布式、自适应资源管理
  - 算法无需全局信道信息，适应时变网络条件提升鲁棒性
  - 仿真显示能量效率显著优于传统方法，有效降低移动设备功耗
  - 为AI代理在移动系统功耗优化中提供实用技术路径
  queries:
  - reinforcement learning mobile power
  source: arxiv
  created_at: '2026-03-19T01:16:38+08:00'
- id: arxiv:2012.10246v1
  title_zh: 基于智能手机用户使用模式的能耗模型构建
  title_en: Building Energy Consumption Models Based On Smartphone User's Usage Patterns
  pdf_url: https://arxiv.org/pdf/2012.10246v1.pdf
  publish_time: '2020-12-15'
  update_time: '2020-12-15'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着智能手机使用普及，能耗优化对提升设备效能和延长使用时间至关重要。本研究构建基于用户使用模式的能耗模型，为应用开发者和自动优化提供依据。我们识别了影响手机能耗的关键组件及其状态，并验证了模型在硬件不准确条件下的鲁棒性。通过分析用户数据，开发了自动模型构建方法，能生成智能能耗模型。实验表明，当手机平均功耗为1970.1mW时，模型平均绝对误差低至158.57mW。该模型可识别高耗电组件，指导优化策略，如减少屏幕亮屏时间或调整后台进程，从而有效降低系统功耗，延长电池续航。本方法为AI驱动的手机功耗降低提供了数据基础。
  key_points_zh:
  - 识别智能手机中主要能耗组件及其工作状态特征。
  - 开发自动模型构建方法，基于用户数据生成个性化能耗模型。
  - 模型在平均功耗1970.1mW时误差仅158.57mW。
  - 验证模型在硬件限制下的鲁棒性和准确性。
  - 通过分析使用模式，优化组件调度以减少能耗。
