  summary_zh: 移动边缘计算与密集小小区基站部署的融合，为用户提供了真实邻近性和超低延迟云功能访问，但移动性管理成为系统性能的关键瓶颈。现有方案因用户附近基站覆盖高度重叠及同时提供无线接入和计算服务而表现欠佳。本文提出用户中心的E2M2移动性管理方案，基于李亚普诺夫优化和多臂赌博机理论，在保持用户通信能量消耗低于约束的同时，最大化边缘计算性能。该方案有效处理系统中多级不确定性，包括网络动态变化和用户移动性，并提供短期和长期性能保证。通过仿真实验，E2M2在严格满足通信能量约束的条件下，显著提升了计算性能，相比现有技术有明显优势。该研究为移动设备在密集网络环境中的功耗优化提供了新方法，通过AI驱动的移动性管理降低系统能耗，促进能效提升。
  key_points_zh:
