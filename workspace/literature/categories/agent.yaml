  summary_zh: 本文研究无人机辅助移动边缘计算平台中的能量优化问题，聚焦于最小化用户设备能耗，通过联合优化用户关联、资源分配及无人机轨迹实现高效计算卸载。针对环境动态性（如无人机不同起飞点）带来的实时决策挑战，提出两种算法：基于凸优化的轨迹控制算法（CAT）采用块坐标下降法迭代求解，而深度强化学习轨迹控制算法（RAT）则利用优先经验回放加速训练收敛。RAT算法摆脱了对初始点的依赖，无需迭代过程，训练完成后能快速适应任意起飞点并生成轨迹方案。仿真结果表明，CAT与RAT性能相当且均优于传统算法，在动态环境中显著降低用户设备能耗。该方法通过优化无人机移动路径减少通信距离和计算负载，有效降低终端功耗，为移动边缘计算系统提供低能耗运行保障，尤其适用于资源受限的移动场景。
  key_points_zh:
  - 提出CAT算法，基于凸优化迭代求解用户关联、资源分配和轨迹控制问题。
  - 开发RAT算法，采用深度强化学习结合优先经验回放实现实时动态轨迹决策。
  - RAT算法适应不同起飞点，训练后求解速度优于CAT，避免初始点敏感性问题。
  - 仿真验证CAT和RAT性能均超越传统算法，显著降低用户设备整体能耗。
  - 通过优化无人机轨迹减少通信距离，间接降低移动终端计算功耗。
  - 为无人机辅助边缘计算提供低延迟、低能耗的实时控制解决方案。
