  summary_zh: 视频超分辨率是移动设备上广泛使用的功能，用于自动提升低比特率和低分辨率视频流的质量。尽管已有多种解决方案，但它们通常计算密集，在移动设备上帧率低且能效差。本研究针对这一问题，设计了端到端实时视频超分辨率方案，专为移动NPU优化以降低能耗。参与者使用REDS数据集进行4倍视频上采样训练。所有模型在MediaTek
