  summary_zh: 基于移动边缘计算（MEC）的边缘智能范式可有效支持移动AI应用，但需优化AI服务放置与资源分配以提升能效。本文针对多用户MEC系统，研究接入点如何智能决策向哪些用户设备推送最新AI程序以启用本地计算，仅在提升系统性能时才进行传输，从而充分利用有限无线频谱和边缘计算资源。我们构建混合整数非线性规划（MINLP）模型，联合优化服务放置（用户选择）和资源分配（本地CPU频率、上行带宽及边缘CPU频率），目标是最小化所有用户的总计算时间与能耗。为高效求解，推导解析表达式简化资源分配决策，并结合元启发式或贪婪搜索算法获取最优服务放置方案。进一步提出ADMM分解方法，将问题拆分为并行子问题，消除高维搜索需求，使计算复杂度随用户数线性增长。仿真验证算法性能接近理论最优，显著优于基准方法，为手机系统低功耗AI服务部署提供可扩展解决方案。
  key_points_zh:
  - 联合优化AI服务放置与资源分配，最小化移动用户的总计算能耗
  - 构建MINLP模型精准刻画服务决策与资源约束的耦合关系
  - 推导解析表达式降低资源分配复杂度，提升求解效率
  - ADMM分解方法实现问题并行化，计算复杂度线性增长
  - 仅在本地计算收益时推送服务，避免无效资源消耗
  - 仿真证明算法接近最优性能，显著降低系统功耗
  queries:
  - Mobile system AI optimization
  source: arxiv
  created_at: '2026-03-19T04:04:53+08:00'
