- id: arxiv:2505.12132v1
  title_zh: 面向6G网络切片的可持续性：节能与优化方法
  title_en: Towards Sustainability in 6G Network Slicing with Energy-Saving and Optimization
    Methods
  pdf_url: https://arxiv.org/pdf/2505.12132v1.pdf
  publish_time: '2025-05-17'
