- id: arxiv:1904.09274v1
  title_zh: 移动设备上的深度学习：综述
  title_en: Deep Learning on Mobile Devices - A Review
  pdf_url: https://arxiv.org/pdf/1904.09274v1.pdf
  publish_time: '2019-03-21'
  update_time: '2019-03-21'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 本文系统综述了移动设备上深度学习技术的最新进展，重点聚焦于降低系统功耗的创新方法。随着人工智能技术的突破，移动应用日益普及，但传统云依赖模式导致高带宽消耗和资源浪费。在设备端部署深度学习可显著减少通信开销、降低云服务成本、提升响应速度并保障数据隐私。文章深入分析了适用于移动场景的硬件架构，包括现场可编程门阵列（FPGA）、专用集成电路（ASIC）和移动图形处理器（GPU），并探讨了尺寸、重量、面积与功耗（SWaP）约束对算法优化的影响。核心内容涵盖量化、剪枝、压缩及近似等技术，这些方法通过简化计算流程而维持精度，有效降低能耗。同时，回顾了TensorFlow
    Lite、MXNet、Mobile AI Compute Engine和Paddle-mobile等平台的行业现状，评估了工具库、模型资源及性能基准。应用案例涉及机器人、医疗健康、多媒体、生物识别、自动驾驶和国防领域，展示了本地化处理对功耗的优化效果。最后，指出了低质量数据和小规模训练集等挑战，为研究者提供了全面的实践参考，助力移动系统能效提升。
  key_points_zh:
  - 移动设备端深度学习减少通信带宽需求，避免云端传输高能耗，显著降低整体系统功耗。
  - 硬件架构优化如FPGA和ASIC专为低功耗设计，提升能效比并适应移动设备资源限制。
  - 算法技术如量化、剪枝和压缩简化计算复杂度，在保持精度的同时大幅削减能耗。
  - 主流深度学习平台集成功耗管理工具，动态优化资源分配以延长电池续航。
  - 应用领域通过本地数据处理减少外部依赖，有效缓解移动系统功耗压力。
  queries:
  - Reinforcement learning mobile systems
  source: arxiv
  created_at: '2026-03-18T20:28:01+08:00'
- id: arxiv:1810.01732v1
  title_zh: 2018年低功耗图像识别挑战赛
  title_en: 2018 Low-Power Image Recognition Challenge
  pdf_url: https://arxiv.org/pdf/1810.01732v1.pdf
  publish_time: '2018-10-03'
  update_time: '2018-10-03'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 低功耗图像识别挑战赛（LPIRC）自2015年起作为年度国际竞赛举办，核心目标是发掘能在图像分类与目标检测任务中实现高效能（执行时间短、能耗低）与高精度（识别准确率高）的先进计算机视觉技术。随着竞赛持续开展，参赛技术性能显著提升，过去四年内获胜者综合评分增长超过24倍，充分反映该领域技术的飞速进步。鉴于计算机视觉在无人机、智能手机等电池供电系统中的广泛应用，开发低功耗视觉算法已成为当前研究热点和未来发展的关键方向。本文系统性地总结2018年LPIRC赛事，详细描述竞赛设立的三个技术赛道（包括图像分类、目标检测和能效优化）及其具体规则，并深入分析各赛道获胜团队的创新解决方案。这些成果不仅展示了低功耗AI技术的最新进展，还为移动设备节能优化提供了实践指导和宝贵参考，对推动电池供电系统的可持续发展具有重要意义。
  key_points_zh:
  - LPIRC是2015年启动的年度竞赛，聚焦低功耗高效的图像识别技术开发。
  - 竞赛评估标准涵盖执行时间短、能耗低和识别精度高三大核心指标。
  - 四年内获胜成绩提升24倍以上，体现低功耗AI技术的快速演进。
  - 低功耗计算机视觉对手机、无人机等电池供电系统至关重要。
  - 本文全面总结2018年赛事，详细解析三个技术赛道的设置与要求。
  - 深入探讨获胜方案，为后续移动AI节能研究提供实践参考。
  queries:
  - Low power mobile AI
  source: arxiv
  created_at: '2026-03-18T21:12:34+08:00'
- id: arxiv:1808.01977v6
  title_zh: 基于深度强化学习的无线供电移动边缘计算网络在线计算卸载方法
  title_en: Deep Reinforcement Learning for Online Computation Offloading in Wireless
    Powered Mobile-Edge Computing Networks
  pdf_url: https://arxiv.org/pdf/1808.01977v6.pdf
  publish_time: '2018-08-06'
  update_time: '2020-07-15'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 本文针对无线供电移动边缘计算网络中的低功耗设备数据处理能力提升问题，提出一种深度强化学习在线卸载框架（DROO），旨在优化任务卸载决策与无线资源分配以适应时变信道条件。传统数值优化方法难以在信道相干时间内快速求解组合优化问题，而DROO通过深度神经网络直接学习二进制卸载决策，避免了复杂优化过程，显著降低计算复杂度，尤其适用于大规模网络场景。该框架引入自适应参数调整机制，动态优化算法性能。实验结果表明，在30用户网络中，DROO的CPU执行延迟低于0.1秒，计算时间比现有方法减少一个数量级以上，同时实现接近最优的性能表现。该方法有效解决了无线传感器网络和物联网等低功耗网络在快速衰落环境中的实时卸载难题，通过减少本地计算负载显著降低设备能耗，为移动系统功耗优化提供了高效可行的解决方案。
  key_points_zh:
  - 提出DROO框架，利用深度神经网络学习二进制卸载决策，消除组合优化问题求解需求，大幅降低计算复杂度。
  - 设计自适应参数调整机制，动态优化算法性能，特别适用于大规模网络环境。
  - 在30用户网络中实现CPU执行延迟低于0.1秒，计算时间减少一个数量级以上，确保实时决策能力。
  - 数值实验验证接近最优性能，有效提升无线传感器网络和物联网的数据处理效率。
  - 通过减少本地计算负载显著降低设备能耗，为移动系统功耗优化提供新思路。
  - 适用于快速衰落环境，解决传统方法难以应对的时变信道条件挑战。
  queries:
  - Deep learning mobile efficiency
  source: arxiv
  created_at: '2026-03-18T17:16:22+08:00'
- id: arxiv:1805.00361v1
  title_zh: 超低功耗CNN领域专用加速器：9.3TOPS/Watt用于移动和嵌入式应用
  title_en: Ultra Power-Efficient CNN Domain Specific Accelerator with 9.3TOPS/Watt
    for Mobile and Embedded Applications
  pdf_url: https://arxiv.org/pdf/1805.00361v1.pdf
  publish_time: '2018-04-30'
  update_time: '2018-04-30'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 近年来，卷积神经网络（CNN）在计算机视觉领域取得显著突破，但其在移动和嵌入式设备上的部署面临功耗、速度、精度及内存占用等多重挑战。通用硬件如CPU、GPU或FPGA难以满足低功耗需求，而领域专用架构（DSA）为此提供了高效解决方案。本研究设计并实现了基于28纳米工艺的二维CNN-DSA加速器，其功耗效率高达9.3TOPS/Watt，所有数据处理均在内部内存完成，避免了外部DRAM访问带来的能耗与延迟。该加速器以低于300毫瓦的峰值功耗处理224x224
    RGB图像，分类速度超过140帧每秒，同时保持与VGG基准相当的精度。加速器支持可重配置性，能适应卷积、深度卷积、短路连接、最大池化及ReLU等多种CNN层类型。为优化资源受限场景，特别是低端移动平台和微控制器单元（MCU），我们开发了专用算法，在加速器内部实现全连接层并压缩特征数据，显著减少对外部计算资源的依赖。实际系统演示验证了其在移动设备中的广泛适用性，有效降低系统功耗并提升能效比，为绿色移动计算提供了实用技术路径。
  key_points_zh:
  - 提出28纳米CNN-DSA加速器，实现9.3TOPS/Watt超低功耗效率，所有处理在内部内存完成以避免外部DRAM能耗
  - 支持224x224图像实时分类，速度超140fps且功耗低于300mW，精度媲美VGG基准
  - 可重配置架构兼容多种CNN层类型，包括卷积、深度卷积、短路连接及激活函数
  - 设计专用算法在加速器内实现全连接层和特征压缩，减少对外部资源依赖
  - 针对低端移动平台和MCU优化部署，实测验证广泛实用性
  - 通过现场演示证明其在移动系统中有效降低功耗并提升能效
  queries:
  - Energy efficient mobile AI
  source: arxiv
  created_at: '2026-03-19T02:40:57+08:00'
