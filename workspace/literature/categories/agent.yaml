- id: arxiv:2207.02052v1
  title_zh: 多小区移动边缘计算中的双时间尺度移动性管理方法
  title_en: A Two-Timescale Approach to Mobility Management for Multi-Cell Mobile
    Edge Computing
  pdf_url: https://arxiv.org/pdf/2207.02052v1.pdf
  publish_time: '2022-07-05'
  update_time: '2022-07-05'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 移动边缘计算（MEC）通过将复杂计算任务卸载至边缘服务器，有效提升移动用户的计算能力与功能体验。然而，用户移动性对低延迟关键应用的可靠服务构成双重挑战：一方面，移动性管理需应对用户位置变化与任务到达在不同时间尺度上的动态波动；另一方面，服务迁移可能因延迟导致可靠性下降。本文提出一种双时间尺度移动性管理框架，通过联合优化服务迁移与传输功率来解决上述问题。具体而言，服务迁移在大时间尺度上运行以适应多小区网络中的用户移动，而功率控制则在小时间尺度上实时调整任务卸载过程。该联合控制被建模为长期移动能量最小化优化问题，同时严格满足计算卸载的可靠性约束。基于Lyapunov理论，我们设计了问题分解框架，并据此开发出低复杂度的双时间尺度在线算法，充分利用问题结构特性。理论分析证实该算法具有渐近最优性，并进一步扩展至多用户场景。仿真结果表明，所提方法能显著降低系统能耗，同时提升服务可靠性，为AI驱动的手机功耗管理提供了有效技术路径。
  key_points_zh:
  - 提出双时间尺度框架，联合控制服务迁移与传输功率以优化手机系统功耗
  - 服务迁移在大时间尺度操作，有效应对多小区网络中的用户移动性挑战
  - 功率控制在小时间尺度执行，实现任务卸载过程的实时动态调整
  - 优化目标聚焦长期移动能量最小化，同时严格保障计算卸载的可靠性要求
  - 基于Lyapunov理论开发低复杂度在线算法，具备理论上的渐近最优性能
  - 仿真验证算法显著提升能量效率与系统可靠性，适用于AI手机功耗管理场景
  queries:
  - AI mobile power management
  source: arxiv
  created_at: '2026-03-19T11:50:28+08:00'
- id: arxiv:2205.13770v1
  title_zh: LEAF + AIO：面向移动增强现实的边缘辅助能量感知目标检测
  title_en: 'LEAF + AIO: Edge-Assisted Energy-Aware Object Detection for Mobile Augmented
    Reality'
  pdf_url: https://arxiv.org/pdf/2205.13770v1.pdf
  publish_time: '2022-05-27'
  update_time: '2022-05-27'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 当前，基于深度学习的移动增强现实（MAR）应用在移动设备上应用较少，主要因其能耗过高。本文设计了一个基于边缘的能量感知MAR系统，使MAR设备能够根据用户偏好、相机采样率和可用无线资源动态调整配置，如CPU频率、计算模型大小和图像卸载频率。所提出的动态MAR配置适应机制能在不降低用户偏好的性能指标（如延迟和检测精度）的前提下，最小化多个MAR客户端的每帧能耗。为深入分析MAR配置、用户偏好、相机采样率与能耗之间的交互关系，我们提出了首个全面的MAR设备能量分析模型。基于该模型，设计了LEAF优化算法来指导MAR配置适应和服务器无线资源分配，并开发了图像卸载频率协调器，自适应调节基于边缘的目标检测调用以进一步提升能效。通过广泛的实验评估，验证了该系统在多客户端场景下显著降低能耗的有效性，同时确保用户体验不受影响。
  key_points_zh:
  - 提出了首个全面的MAR设备能量分析模型，用于量化配置参数、用户偏好与能耗的交互关系
  - 设计了LEAF优化算法，动态调整CPU频率、模型大小等配置以最小化每帧能耗
  - 开发了图像卸载频率协调器，自适应控制边缘目标检测调用次数提升能效
  - 系统在不牺牲延迟和检测精度的前提下，实现多客户端能耗的协同优化
  - 实验验证了模型和算法在真实场景中的有效性，适用于多样化MAR应用
  queries:
  - Mobile agent energy optimization
  source: arxiv
  created_at: '2026-03-18T18:17:43+08:00'
- id: arxiv:2205.11832v1
  title_zh: 基于神经上下文赌博机的动态传感器选择用于低功耗体域网络
  title_en: Neural Contextual Bandits Based Dynamic Sensor Selection for Low-Power
    Body-Area Networks
  pdf_url: https://arxiv.org/pdf/2205.11832v1.pdf
  publish_time: '2022-05-24'
  update_time: '2022-05-24'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着移动医疗应用的快速发展，为健康监测设备集成机器智能对实现自动化服务至关重要，但设备资源稀缺性带来了显著挑战。本研究提出一种基于神经上下文赌博机的动态传感器选择方法，旨在构建高性能且资源高效的体域网络，以支持下一代移动健康监测设备。该方法在运行时利用上下文赌博机算法动态筛选最具信息量的传感器组合，主动忽略冗余数据流，从而有效降低体域网络中的数据传输功耗和计算能耗。研究以心脏活动监测这一典型健康应用为验证场景，将所提方案与现有工作在分类性能和能耗指标上进行系统对比。实验结果表明，在PTB-XL
    ECG数据集上，该方法实现了78.8%的AU-PRC心脏异常检测准确率，同时整体能耗降低3.7倍，计算能耗降低4.3倍。这一成果为资源受限的移动AI系统提供了可落地的低功耗优化路径，显著提升了健康监测设备的续航能力与实用性。
  key_points_zh:
  - 提出基于神经上下文赌博机的动态传感器选择机制，实时优化数据采集过程
  - 通过筛选高信息量传感器组合并剔除冗余数据，有效降低传输与计算功耗
  - 在心脏监测应用中验证，达到78.8% AU-PRC的异常检测准确率
  - 整体能耗降低3.7倍，计算能耗降低4.3倍，显著提升能效比
