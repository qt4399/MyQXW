- id: arxiv:1703.10340v1
  title_zh: 利用大规模设备到设备协作实现节能移动边缘计算
  title_en: Exploiting Massive D2D Collaboration for Energy-Efficient Mobile Edge
    Computing
  pdf_url: https://arxiv.org/pdf/1703.10340v1.pdf
  publish_time: '2017-03-30'
  update_time: '2017-03-30'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 本文提出了一种创新的设备到设备（D2D）协作框架，专为5G移动边缘计算环境设计，旨在显著降低手机系统功耗。该框架通过网络边缘的海量设备集群，利用网络辅助的D2D协作机制实现设备间计算与通信资源的动态共享，核心目标是优化移动用户的任务执行能效。研究首先详细构建了D2D
    Crowd系统模型，涵盖设备发现、资源调度和协作协议等关键组件；随后，基于实际约束条件（如设备电量、网络带宽和任务截止时间），形式化定义了节能导向的D2D
    Crowd任务分配问题。在此基础上，设计了一种基于图匹配理论的最优任务分配策略，通过将任务与设备能力精准匹配，最小化整体能耗。通过大规模数值仿真和对比实验，该策略展现出卓越性能，在典型场景下相比传统本地任务执行方式，能耗降低超过50%，同时保障任务完成率。此外，本文深入探讨了框架的扩展路径，包括适应动态网络拓扑、支持异构设备类型以及集成隐私保护机制，为移动边缘计算的绿色化发展提供了系统性解决方案，对推动低功耗移动AI应用具有重要实践价值。
  key_points_zh:
  - 提出D2D Crowd框架，利用网络边缘设备集群实现计算与通信资源的动态共享，减少本地处理能耗
  - 构建节能任务分配问题模型，综合考虑设备电量、带宽和任务时限等实际约束条件
  - 开发基于图匹配的最优任务分配策略，通过精准匹配任务与设备能力显著降低能耗
  - 实验验证在典型场景下能耗降低50%以上，同时维持高任务完成率
  - 探讨框架扩展方向，包括动态网络适应、异构设备支持和隐私保护集成
  queries:
  - Energy efficient AI agents mobile
  source: arxiv
