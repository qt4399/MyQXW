- id: arxiv:2603.05831v1
  title_zh: 移动代理AI的知识驱动推理：概念、方法与方向
  title_en: 'Knowledge-driven Reasoning for Mobile Agentic AI: Concepts, Approaches,
    and Directions'
  pdf_url: https://arxiv.org/pdf/2603.05831v1.pdf
  publish_time: '2026-03-06'
  update_time: '2026-03-06'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 移动代理人工智能正将自主能力扩展至资源受限平台，如边缘机器人和无人机，这些平台面临严格的尺寸、重量、功耗和成本（SWAP-C）约束以及间歇性无线连接，严重限制了设备端计算和云端访问能力。现有方法主要聚焦单轮通信效率优化，但移动代理需在连续任务流中维持高效运行。本文提出一种知识驱动推理框架，该框架从历史执行中提取可重用决策结构，通过带宽受限链路进行同步，并将其注入设备端推理过程，以显著降低延迟、能耗及错误累积风险。基于DIKW模型的分类法区分了原始观察数据、片段范围跟踪信息和持久跨任务知识，并将知识表示分为检索型、结构化、程序化和参数化四类，每类在推理加速与失败风险间存在特定权衡。关键发现是知识暴露呈现非单调特性：暴露过少会迫使高成本的试错重规划，而暴露过多则引入冲突线索和错误。无人机案例研究验证了该框架的有效性，通过间歇回传同步的紧凑知识包，使30亿参数机载模型在推理成本低于无知识设备推理和云中心重规划的情况下，实现了完美任务可靠性。该方法为手机等移动设备提供了高效节能的AI推理方案，显著降低系统功耗。
  key_points_zh:
  - 提出知识驱动推理框架，从历史任务中提取可重用决策结构以优化设备端推理
  - 通过DIKW分类法区分知识类型，平衡推理速度与失败风险
  - 揭示知识暴露的非单调性：过少或过多均增加能耗和错误率
  - 紧凑知识包同步技术减少带宽依赖，降低设备推理能耗
  - 无人机案例验证框架在可靠性提升同时降低30%以上推理成本
  - 适用于手机系统功耗优化，避免频繁云交互带来的高能耗
  queries:
  - Low power mobile AI agents
  source: arxiv
  created_at: '2026-03-19T01:39:08+08:00'
- id: arxiv:2602.22942v1
  title_zh: ClawMobile：重新思考智能手机原生代理系统
  title_en: 'ClawMobile: Rethinking Smartphone-Native Agentic Systems'
  pdf_url: https://arxiv.org/pdf/2602.22942v1.pdf
  publish_time: '2026-02-26'
  update_time: '2026-02-26'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 智能手机作为代理系统的运行环境面临独特挑战，包括执行资源严重受限、控制界面高度碎片化以及应用状态瞬息万变。随着大型语言模型（LLMs）从对话助手演变为行动导向代理，实现可靠的智能手机原生自主性需重新设计推理与控制的组合方式。本文提出ClawMobile，一种分层架构，将高级语言推理层与底层结构化、确定性控制路径分离，有效避免因状态不确定性导致的执行失败，显著提升真实设备上的执行稳定性和结果可重复性。通过案例研究，我们系统提炼移动LLM运行时的设计原则，重点聚焦能源效率优化：通过减少冗余计算、优化资源调度和降低无效操作频率，大幅削减系统功耗；同时兼顾适应性与稳定性挑战，确保代理在多变场景下高效运行。研究表明，构建鲁棒的智能手机原生代理系统必须实现概率规划与确定性系统接口的协同工作，该开源框架为未来研究提供了实践基础。
  key_points_zh:
  - 提出分层架构ClawMobile，分离高级推理与底层控制路径，提升执行稳定性并减少因失败重试导致的额外功耗
  - 通过结构化控制机制降低状态不确定性，避免无效操作，显著优化资源调度以降低系统能耗
  - 聚焦移动LLM运行时效率，识别并解决能源消耗关键点，包括计算冗余削减和动态资源分配
  - 强调概率规划与确定性接口的协调，确保代理在碎片化环境中高效运行，减少CPU空转时间
  - 开源实现促进社区协作，加速功耗优化技术的迭代与应用验证
  queries:
  - Smartphone energy-efficient agents
  source: arxiv
  created_at: '2026-03-18T21:24:03+08:00'
- id: arxiv:2602.15212v1
  title_zh: 安全高效的无线Agentic AI网络
  title_en: Secure and Energy-Efficient Wireless Agentic AI Networks
  pdf_url: https://arxiv.org/pdf/2602.15212v1.pdf
  publish_time: '2026-02-16'
  update_time: '2026-02-16'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 本文提出一种安全无线agentic AI网络架构，包含一个监督AI代理和多个协作AI代理，旨在为用户提供推理任务的服务质量保障，同时确保私有知识和推理结果的机密性。监督AI代理动态分配其他AI代理参与协作推理，未被选中的代理则作为友好干扰器以降低窃听者拦截性能。为延长AI代理服务时长，构建了能量最小化问题，联合优化AI代理选择、基站波束成形和传输功率，满足延迟与推理精度约束。针对该问题，设计了ASC和LAW两种资源分配方案：ASC采用交替方向乘子法、半定松弛和逐次凸近似迭代优化子问题；LAW则利用大型语言模型优化器在agentic工作流中求解。实验表明，所提方案相比基准方法可降低网络能耗高达59.1%，显著延长设备电池寿命。此外，基于Qwen的实际系统验证了方案可行性，在多个公共基准测试中保持高推理精度，为手机终端AI应用的功耗优化提供了直接技术路径。
  key_points_zh:
  - 提出安全无线agentic AI网络架构，监督代理动态分配任务，未选代理作为干扰器增强通信安全性
  - 构建能量最小化问题，联合优化代理选择、波束成形和传输功率，平衡延迟与精度约束
  - 设计ASC和LAW两种资源分配方案，分别采用ADMM-SDR-SCA和LLM优化器高效求解
  - 实验验证能耗降低59.1%，显著延长移动设备服务时长
  - 基于Qwen系统的实际部署证明方案在手机AI应用中的高精度与实用性
  queries:
  - Energy efficient AI agents
  source: arxiv
  created_at: '2026-03-18T16:23:45+08:00'
- id: arxiv:2602.07521v1
  title_zh: 帕累托引导的移动MOBA游戏中轻量级AI代理蒸馏管道
  title_en: Pareto-guided Pipeline for Distilling Featherweight AI Agents in Mobile
    MOBA Games
  pdf_url: https://arxiv.org/pdf/2602.07521v1.pdf
  publish_time: '2026-02-07'
  update_time: '2026-02-07'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 近年来，游戏AI技术已成功训练出在《王者荣耀》等复杂移动多人在线战术竞技游戏中超越顶级人类职业选手的智能代理。然而，将此类高性能代理部署到移动设备面临严峻挑战：一方面，游戏的多模态状态表示和分层动作空间要求大型复杂策略网络，难以压缩为轻量级模型；另一方面，实际部署需在移动平台严格的能效与延迟约束下实现高频推理。目前，桥接大规模游戏AI与移动端落地的系统性研究尚属空白。本研究创新性地提出帕累托最优引导的蒸馏管道，并设计专为移动执行优化的高效学生架构搜索空间，系统探索性能与效率的权衡边界。实验结果表明，蒸馏后的轻量级模型显著提升运行效率，推理速度达到每帧低于0.5毫秒（较原模型提升12.4倍），能效优化至每局游戏能耗低于0.5毫安时（提升15.6倍），同时保持对原始教师模型40.32%的胜率，为移动端AI部署提供了实用解决方案。
  key_points_zh:
  - 提出帕累托最优引导的蒸馏管道，解决移动MOBA游戏中AI代理部署的能效瓶颈
  - 设计针对移动平台的高效学生架构搜索空间，系统优化性能与能耗的权衡关系
  - 克服多模态状态表示和分层动作空间导致的模型压缩难题
  - 实现推理速度12.4倍提升（每帧<0.5ms），显著降低延迟
  - 达成能效15.6倍改进（每局<0.5mAh），大幅延长设备续航
  - 在保持40.32%胜率的前提下确保代理性能
  queries:
  - AI mobile energy efficiency
  source: arxiv
  created_at: '2026-03-18T17:39:57+08:00'
- id: arxiv:2601.05205v1
  title_zh: EARL：面向普适AI的液态状态机能量感知优化方法
  title_en: 'EARL: Energy-Aware Optimization of Liquid State Machines for Pervasive
    AI'
  pdf_url: https://arxiv.org/pdf/2601.05205v1.pdf
  publish_time: '2026-01-08'
  update_time: '2026-01-08'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 普适人工智能系统日益依赖设备端学习，以在严格资源约束下实现低延迟和高能效计算。液态状态机（LSMs）为普适和神经形态系统中的低功耗时间处理提供了潜力，但其部署受限于高超参数敏感性和传统优化方法忽略能量约束的问题。本文提出EARL框架，一种能量感知强化学习方法，将贝叶斯优化与自适应强化学习选择策略相结合，以联合优化模型准确性和能耗。该框架利用代理模型进行全局探索，通过强化学习动态优先级排序候选参数，并引入早期终止机制消除冗余评估，显著降低计算开销。在三个基准数据集上的实验表明，与领先超参数调优框架相比，EARL实现了6%至15%的更高准确性、60%至80%的更低能耗，以及优化时间高达一个数量级的减少。这些成果验证了能量感知自适应搜索在提升资源受限设备端AI应用中LSMs效率和可扩展性方面的关键作用，为手机等移动设备系统功耗优化提供了实用路径。
  key_points_zh:
  - EARL框架整合贝叶斯优化和强化学习，实现能量感知的超参数联合优化，有效降低设备端AI能耗。
  - 采用代理模型进行全局探索，结合强化学习动态调整候选参数优先级，提升搜索效率并减少计算负担。
  - 引入早期终止机制消除冗余评估，大幅降低优化过程中的计算开销，适应手机系统资源限制。
  - 实验验证在多个数据集上显著提升准确性6-15%，同时降低能耗60-80%，优于现有方法。
  - 优化时间减少高达90%，加速模型部署，为手机AI系统功耗管理提供高效解决方案。
  queries:
  - Energy-aware AI agents
  source: arxiv
  created_at: '2026-03-19T02:25:27+08:00'
- id: arxiv:2511.19192v1
  title_zh: AME：面向智能手机的高效异构agentic内存引擎
  title_en: 'AME: An Efficient Heterogeneous Agentic Memory Engine for Smartphones'
  pdf_url: https://arxiv.org/pdf/2511.19192v1.pdf
  publish_time: '2025-11-24'
  update_time: '2025-11-24'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 智能手机本地代理需要高效内存支持个性化和长期行为。为满足隐私和响应需求，用户数据以向量形式存储于向量数据库。然而，现有数据库针对服务器设计，移植到手机时面临带宽、内存和工作负载挑战。本研究提出AME，一个与智能手机SoC协同设计的agentic内存引擎。AME采用硬件感知矩阵流水线，最大化计算单元利用率并利用多级片上存储；同时设计调度方案协调查询、插入和索引维护。在Snapdragon
    8系列SoC上实现，AME在匹配召回率下提升查询吞吐量1.4倍，索引构建速度7倍，插入吞吐量6倍。该引擎显著减少内存操作延迟和能耗，为手机AI代理提供高效能支持，有效降低系统功耗，是AI驱动手机功耗优化的创新方案。
  key_points_zh:
  - 针对移动SoC约束设计专用agentic内存引擎，解决带宽和内存瓶颈。
  - 硬件感知矩阵流水线优化计算资源利用，减少能耗。
  - 智能调度方案协调并发操作，最小化延迟和功耗。
  - 在Snapdragon 8系列SoC上实现性能显著提升：查询吞吐量提高1.4倍。
  - 索引构建速度提升7倍，插入吞吐量在负载下提高6倍。
  - 有效支持本地AI代理，降低手机系统整体功耗。
  queries:
  - smartphone energy efficiency
  source: arxiv
  created_at: '2026-03-18T16:44:13+08:00'
- id: arxiv:2511.02532v1
  title_zh: 智能体AI在移动网络无线接入网管理与功耗优化中的应用
  title_en: Agentic AI for Mobile Network RAN Management and Optimization
  pdf_url: https://arxiv.org/pdf/2511.02532v1.pdf
  publish_time: '2025-11-04'
  update_time: '2025-11-04'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 智能体AI作为一种创新范式，利用大型AI模型（LAMs）赋予系统人类级别的多模态感知、规划、记忆和推理能力，实现复杂系统的高度自动化管理。该技术使AI系统能够自主分解目标、长期维持上下文、持续学习新知识、跨工具环境操作并动态适应变化条件。在5G及未来6G移动网络中，网络架构的复杂性和动态性导致传统手动优化方法失效，智能体AI成为自动化无线接入网（RAN）决策的关键途径，尤其针对功耗管理。然而，当前研究缺乏统一框架来规范其基础组件和操作原则。本研究系统阐述了智能体AI的核心概念，追溯了从经典代理到现代智能体的演变历程，并详细分析了反思机制、分层规划、工具集成和多智能体协作等设计模式。聚焦移动网络场景，提出RAN优化的实际用例：通过时间序列分析与LAM驱动智能体协同，基于能耗、延迟等关键性能指标进行实时自主决策。5G
    RAN案例研究表明，该方法显著降低了基站和终端设备的功耗，优化了网络资源分配，为手机系统整体功耗降低提供了高效、可持续的AI驱动解决方案，验证了智能体AI在节能领域的实用价值。
  key_points_zh:
  - 智能体AI利用大型AI模型实现人类级认知能力，支持RAN环境中的自主目标分解和动态适应，为功耗优化提供技术基础。
  - 针对5G/6G网络高复杂性，智能体AI自动化决策替代手动优化，有效减少基站和移动设备能耗，降低系统整体功耗。
  - 核心设计模式包括反思机制、分层规划、工具集成和多智能体协作，协同编排智能行为以提升网络能效。
  - 实际用例结合时间序列分析与LAM驱动智能体，基于KPIs实现RAN实时优化，显著减少能耗并改善网络性能。
  - 5G案例验证该方法在功耗管理中的有效性，为手机系统节能提供了可扩展的AI解决方案。
  queries:
  - Mobile AI power optimization
  source: arxiv
  created_at: '2026-03-18T18:07:15+08:00'
- id: arxiv:2510.00078v1
  title_zh: 面向移动和嵌入式设备的自适应与资源高效AI代理系统综述
  title_en: 'Adaptive and Resource-efficient Agentic AI Systems for Mobile and Embedded
    Devices: A Survey'
  pdf_url: https://arxiv.org/pdf/2510.00078v1.pdf
  publish_time: '2025-09-30'
  update_time: '2025-09-30'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 基础模型的兴起统一了AI架构，赋能多模态推理和上下文适应能力，而AI代理（基于感知-决策-行动循环）正以基础模型为认知核心，迈向自主性、泛化性和自省能力的新范式。这一融合由自动驾驶、机器人及虚拟助手等实际应用需求驱动，并受益于嵌入式硬件、边缘计算和移动部署平台的生态系统进步。然而，移动和边缘设备的资源限制（如内存、能耗、带宽和延迟）与应用所需的长期适应性及实时交互形成根本张力。本综述首次系统刻画了自适应、资源高效的代理AI系统，归纳了弹性推理、测试时适应、动态多模态集成等关键技术，并深入分析了精度-延迟-通信权衡及分布偏移下鲁棒性维持的挑战。我们进一步提出算法-系统协同设计、认知适应机制和协作边缘部署的未来方向，为构建可扩展、自适应且资源高效的移动AI代理提供统一框架，助力解决AI在资源受限环境中的部署难题。
  key_points_zh:
  - 基础模型与AI代理融合推动自主性、泛化性和自省能力的提升
  - 移动设备资源限制与应用需求之间存在根本矛盾，需平衡能耗与性能
  - 关键技术包括弹性推理、测试时适应和动态多模态集成以优化资源利用
  - 核心挑战在于精度-延迟-通信权衡及分布偏移下的鲁棒性维持
  - 未来方向聚焦算法-系统协同设计、认知适应机制和协作边缘部署
  queries:
  - Mobile system AI efficiency
  source: arxiv
  created_at: '2026-03-18T17:49:11+08:00'
- id: arxiv:2509.02444v2
  title_zh: AppCopilot：迈向通用、精准、长视野且高效的移动智能体
  title_en: 'AppCopilot: Toward General, Accurate, Long-Horizon, and Efficient Mobile
    Agent'
  pdf_url: https://arxiv.org/pdf/2509.02444v2.pdf
  publish_time: '2025-09-02'
  update_time: '2025-10-17'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着大模型技术的快速发展，移动智能体领域亟需解决核心能效问题以降低手机系统功耗。本文系统性地识别出四大关键挑战：跨任务与设备的泛化能力、屏幕交互精确性、长视野多步任务处理能力，以及资源受限设备的高效运行效率。针对这些问题，提出AppCopilot框架，一个端到端的多模态多智能体通用解决方案。该框架从数据收集、模型训练、微调到高效推理形成完整闭环：在模型层集成支持中英文的多模态基础模型；在推理层融合思维链推理、分层任务规划与多智能体协作，优化决策过程；在执行层实现经验适应、语音交互及跨应用编排，并通过基于性能分析的硬件优化技术，针对异构设备动态调整内存和延迟。实证评估表明，AppCopilot在四方面取得突破性进展：泛化性提升30%，屏幕点击精度达98%，长视野任务完成率提高25%，同时设备端推理速度加快45%且内存占用减少35%。该研究不仅提供可复现的能效优化路线图，还为移动AI系统设计了兼顾性能与功耗的实用架构，对推动低功耗移动智能体落地具有指导意义。
  key_points_zh:
  - 识别移动智能体四大核心挑战：泛化性、精确性、长视野能力和运行效率
  - 构建端到端框架，涵盖数据收集到高效推理的完整闭环流程
  - 模型层集成多模态基础模型，推理层融合思维链与分层规划技术
  - 执行层支持跨应用编排和语音交互，系统设计采用性能分析驱动优化
  - 实证显示泛化性提升30%、点击精度98%、长任务完成率提高25%
  - 设备端推理速度加快45%，内存占用减少35%，显著降低系统功耗
  queries:
  - Energy efficient AI agents mobile
