- id: arxiv:1904.00601v2
  title_zh: 基于多智能体深度强化学习的大规模能量收集网络分布式功率控制方法
  title_en: 'Distributed Power Control for Large Energy Harvesting Networks: A Multi-Agent
    Deep Reinforcement Learning Approach'
  pdf_url: https://arxiv.org/pdf/1904.00601v2.pdf
  publish_time: '2019-04-01'
  update_time: '2019-10-22'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 本文提出了一种多智能体强化学习框架，用于大规模能量收集多址信道的在线功率控制策略设计，仅需因果信息。该框架将功率控制问题建模为离散时间平均场博弈，并证明其存在唯一平稳解。利用平均场博弈的虚构博弈特性和深度强化学习技术，以完全分布式方式学习该解。分析表明所提方法收敛到唯一平稳解，确保最优策略可分布式学习。为评估性能，还开发了基于深度神经网络的集中式和分布式在线功率控制方案。仿真结果显示，所提功率控制策略有效；基于DNN的集中式策略在大规模能量收集网络中性能优异，而传统方法如马尔可夫决策过程难以处理；分布式策略的性能接近集中式策略的吞吐量，适用于实际手机系统功耗优化场景。
  key_points_zh:
  - 提出多智能体深度强化学习框架用于能量收集网络的分布式功率控制，仅需因果信息实现在线策略优化
  - 将功率控制问题建模为离散时间平均场博弈，并严格证明其存在唯一平稳解
  - 利用虚构博弈特性和深度强化学习技术，实现完全分布式的最优策略学习过程
  - 分析证明所提方法收敛到唯一平稳解，确保分布式学习的理论可靠性
  - 开发基于深度神经网络的集中式和分布式方案作为性能基准，验证大规模网络适用性
  - 仿真表明分布式策略性能接近集中式方案，显著降低系统功耗且适用于手机网络场景
  queries:
  - Reinforcement learning power control agents
  source: arxiv
  created_at: '2026-03-19T03:32:24+08:00'
- id: arxiv:1903.08969v1
  title_zh: 一种面向移动自组织云的节能资源管理系统
  title_en: An Energy-Efficient Resource Management System for a Mobile Ad Hoc Cloud
  pdf_url: https://arxiv.org/pdf/1903.08969v1.pdf
  publish_time: '2019-03-21'
  update_time: '2019-03-21'
  topics:
