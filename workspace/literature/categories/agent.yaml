- id: arxiv:2507.21385v1
  title_zh: 基于深度强化学习的小区DTX/DRX配置实现网络节能
  title_en: Deep Reinforcement Learning-based Cell DTX/DRX Configuration for Network
    Energy Saving
  pdf_url: https://arxiv.org/pdf/2507.21385v1.pdf
  publish_time: '2025-07-28'
  update_time: '2025-07-28'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 3GPP Release 18引入的小区不连续传输与接收（cell DTX/DRX）是5G网络关键节能技术，通过周期性聚合用户数据传输并启用静默期，使基站进入高级睡眠模式以关闭射频组件，从而显著降低能耗。然而，静默期不可避免地增加数据包延迟，影响服务质量。本文研究如何动态配置cell
    DTX/DRX参数以最优平衡节能与延迟，尤其针对延迟敏感流量实现最大节能同时最小化QoS降级。鉴于网络条件和流量负载的复杂性，我们设计深度强化学习框架训练AI代理：采用上下文赌博机模型实现深度Q网络学习算法，并创新使用平滑近似奖励函数解决理论最优但不连续的问题。仿真结果表明，相比未启用DTX/DRX的场景，该代理在不同流量负载下最高实现45%的节能效果，同时将QoS降级严格控制在1%以内，为移动网络提供了自适应节能方案。
  key_points_zh:
  - cell DTX/DRX技术通过周期性静默期关闭射频组件，是5G网络核心节能手段
  - 深度强化学习框架动态优化配置参数，平衡能耗节省与数据包延迟
  - 采用深度Q网络在上下文赌博机模型上实现高效学习算法
  - 奖励函数设计使用平滑近似技术确保训练稳定性和性能
  - 实测最高节能45%且QoS降级不超过1%，满足严格服务质量要求
  - 自适应适配不同网络条件，为移动基站提供智能节能策略
  queries:
  - Energy saving AI techniques
  source: arxiv
  created_at: '2026-03-19T04:04:52+08:00'
- id: arxiv:2507.02135v1
  title_zh: 剖析移动DVFS调控器对大语言模型推理性能和能效的影响
  title_en: Dissecting the Impact of Mobile DVFS Governors on LLM Inference Performance
    and Energy Efficiency
  pdf_url: https://arxiv.org/pdf/2507.02135v1.pdf
  publish_time: '2025-07-02'
  update_time: '2025-07-02'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 大语言模型（LLMs）在移动设备上的快速普及面临高计算、内存及能耗挑战。本文深入研究了现代智能手机中CPU、GPU和内存的DVFS（动态电压频率缩放）调控器独立运行机制，揭示其互不协调导致的能效瓶颈。通过系统测量发现，现有三重调控器配置在相同能耗下，可使LLM预填充和解码延迟增加高达40.4%，严重制约推理效率。研究进一步剖析了调控器间缺乏协同的深层原因，并据此设计了FUSE——一种统一的能效感知调控器框架。FUSE通过智能优化频率组合，动态协调三大组件资源分配。基于ShareGPT数据集的实证评估表明，该方案在保持每令牌能耗不变的前提下，平均将首令牌延迟降低7.0%-16.9%，输出令牌延迟减少25.4%-36.8%，显著提升移动LLM推理的能效比，为AI驱动的移动应用提供了关键优化路径。
  key_points_zh:
  - 揭示移动设备DVFS调控器独立运行导致LLM推理能效低下，相同能耗下延迟增加40.4%
  - 通过深度测量分析，阐明调控器间缺乏协同的机制及其对推理性能的影响
  - 提出FUSE统一调控器框架，实现CPU、GPU和内存频率的智能协同优化
  - 实验证明FUSE在恒定能耗下显著降低推理延迟，首令牌延迟减少7.0%-16.9%
  - 输出令牌延迟平均改善25.4%-36.8%，大幅提升移动AI应用能效
  - 为资源受限设备部署高效LLM推理提供了可落地的技术方案
  queries:
  - Agent-based mobile energy efficiency
  source: arxiv
  created_at: '2026-03-18T16:57:25+08:00'
- id: arxiv:2507.00491v1
  title_zh: Twill：异构移动边缘平台上复合AI系统的调度框架
  title_en: 'Twill: Scheduling Compound AI Systems on Heterogeneous Mobile Edge Platforms'
  pdf_url: https://arxiv.org/pdf/2507.00491v1.pdf
  publish_time: '2025-07-01'
  update_time: '2025-07-01'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 复合AI（cAI）系统通过链式连接深度神经网络、Transformer和大语言模型等组件解决复杂问题，其计算多样性高且工作负载动态变化，给移动边缘平台部署带来调度挑战。现有方法仅支持单一类型模型推理，无法处理cAI所需的并发DNN-Transformer任务调度。本文提出Twill运行时框架，创新性地结合任务亲和性感知集群映射与迁移、优先级感知任务冻结/解冻机制以及动态电压频率调整技术，在严格功耗预算约束下最小化推理延迟。该框架在Nvidia
    Jetson Orin NX平台实现并验证，针对现代DNN和LLM工作负载进行测试，相比前沿边缘AI推理技术，平均降低推理延迟54%，同时确保功耗不超标。研究解决了移动设备上复合AI服务的实时调度难题，为低功耗边缘计算提供了实用方案，显著提升能效比。
  key_points_zh:
  - Twill框架专为移动边缘平台设计，解决复合AI系统并发推理的动态调度挑战
  - 采用任务亲和性感知集群映射技术优化异构计算资源分配
  - 引入优先级感知任务冻结/解冻机制动态管理任务执行顺序
  - 结合动态电压频率调整在功耗预算内最小化推理延迟
  - 在Jetson Orin NX平台实测平均降低延迟54%，验证高效节能性
  - 克服现有方法仅支持单一模型类型的局限，支持DNN与Transformer混合负载
  queries:
