  summary_zh: 深度估计模型在移动和物联网设备中广泛应用于图像分割、背景虚化及目标跟踪等任务，开发高效准确的模型对低功耗移动芯片组至关重要。2022年Mobile
    AI挑战赛聚焦于构建实时单图像深度估计解决方案，以适配智能手机和物联网平台。参赛者利用基于ZED立体相机收集的大规模RGB-to-depth数据集，该数据集能生成最远50米物体的高精度深度图。所有模型在Raspberry
