- id: arxiv:2206.02525v2
  title_zh: 动态深度神经网络在移动及嵌入式平台上的运行时资源管理优化
  title_en: Dynamic DNNs Meet Runtime Resource Management on Mobile and Embedded Platforms
  pdf_url: https://arxiv.org/pdf/2206.02525v2.pdf
  publish_time: '2022-05-17'
  update_time: '2022-06-07'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着深度神经网络（DNN）推理在移动和嵌入式平台上的广泛应用，其低延迟和隐私保护优势日益凸显，但计算和内存访问密集的特性使得高效部署面临严峻挑战。本文提出一种创新的整体系统设计，通过深度融合算法与硬件的权衡机会来优化DNN性能和能耗。该系统架构清晰分为三层：设备层整合异构计算资源；应用层管理多个并发工作负载；运行时资源管理层实时监控动态变化的算法性能目标和硬件资源约束，并智能调整算法与硬件配置以满足需求。作为核心实现，我们开发了动态版'一次为所有网络'（Dynamic-OFA），该技术能高效缩放卷积神经网络架构以适应多样化的异构计算资源，并对Transformer等不同模型架构展现出卓越的泛化能力。在Jetson
    Xavier NX嵌入式平台上，基于ImageNet数据集的全面实验验证表明，与当前最先进的动态DNN方法相比，Dynamic-OFA在保持相似Top-1准确率时，CPU和GPU推理速度分别提升3.5倍和2.4倍；或在相似延迟条件下，CPU和GPU的准确率分别提高3.8%和5.1%。此外，与Linux标准调度器（如performance和schedutil）相比，本方法在维持相似延迟的同时，显著降低系统能耗达16.5%，为移动设备的能效优化提供了有效解决方案。
  key_points_zh:
  - 提出三层系统架构（设备层、应用层、运行时资源管理层），实现算法与硬件的协同优化，提升DNN部署效率。
  - 开发动态版'一次为所有网络'（Dynamic-OFA），支持高效缩放卷积神经网络架构，适应异构计算资源，并对Transformer等模型具有良好泛化性。
  - 实验显示在Jetson Xavier NX平台上，Dynamic-OFA显著提升推理速度：CPU快3.5倍，GPU快2.4倍（相似准确率）。
  - 在相似延迟下，Dynamic-OFA提高ImageNet Top-1准确率：CPU高3.8%，GPU高5.1%。
  - 相比Linux调度器，该方法降低能耗16.5%，同时保持相似延迟，有效优化移动设备能效。
  queries:
  - Agent-based power management mobile
  source: arxiv
  created_at: '2026-03-19T11:37:44+08:00'
- id: arxiv:2203.12925v1
  title_zh: 超低功耗时间序列边缘推理的TCN映射优化
  title_en: TCN Mapping Optimization for Ultra-Low Power Time-Series Edge Inference
  pdf_url: https://arxiv.org/pdf/2203.12925v1.pdf
  publish_time: '2022-03-24'
  update_time: '2022-03-24'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 时间卷积网络（TCN）作为一种新兴的轻量级深度学习模型，广泛应用于时间序列分析任务。本文提出了一种自动化探索方法和一套优化内核库，专门用于将TCN高效映射到并行超低功耗（PULP）微控制器上，以解决移动设备中AI推理的高能耗问题。该方法通过层平铺优化器联合优化平铺维度，并智能选择因果和扩张一维卷积操作的替代实现方案，从而显著降低推理延迟和系统能耗。在商用PULP设备上的基准测试表明，与STM32L4微控制器上运行的Cube-AI工具包相比，本方法实现了高达103倍的延迟降低和20.3倍的能耗降低；同时，相较于相同硬件目标上的商业闭源及学术开源方法，能耗降低幅度达到2.9倍至26.6倍。这一成果为智能手机等移动设备的低功耗AI应用提供了实用解决方案，有效延长了电池续航时间并提升了边缘推理效率。
  key_points_zh:
  - 提出自动化探索方法和优化内核库，实现TCN在PULP微控制器上的高效映射，专为超低功耗场景设计。
  - 利用层平铺优化器联合优化平铺维度和卷积操作实现方案，显著减少推理延迟和系统能耗。
  - 在商用PULP设备测试中，延迟比Cube-AI工具包低103倍，能耗降低20.3倍，性能优势突出。
  - 相较于其他商业和学术方法，能耗降低范围在2.9倍至26.6倍之间，验证了方法的广泛适用性。
  - 为智能手机等移动设备的时间序列AI推理提供低功耗解决方案，有效提升电池续航能力。
  queries:
  - Low power AI smartphone
  source: arxiv
  created_at: '2026-03-18T20:51:41+08:00'
- id: arxiv:2201.07888v1
  title_zh: 面向移动健康的自适应能量管理实现可穿戴设备自维持
  title_en: Adaptive Energy Management for Self-Sustainable Wearables in Mobile Health
  pdf_url: https://arxiv.org/pdf/2201.07888v1.pdf
  publish_time: '2022-01-16'
  update_time: '2022-01-16'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 可穿戴设备集成了多种传感器、处理器和通信技术，在移动健康领域具有变革远程健康参数监测的潜力。然而，设备的小型化设计严重限制了电池容量和运行寿命，导致频繁充电需求，阻碍了大规模普及。能量收集技术虽被视为可持续运行的有效途径，但单独应用往往无法完全满足设备能量需求。本文针对这一挑战，研究了自适应能量管理问题，目标是通过收集能量补充电池能量，显著减少用户手动充电频率。为此，提出AdaEM算法：首先，采用机器学习方法构建用户活动和能量使用模式的预测模型，以估计基于用户活动的每日能量收集潜力；其次，针对模型预测中的不确定性，运用动态鲁棒优化框架优化能量管理决策，并设计轻量级求解方案以适应实际部署约束。在集成太阳能和运动能量收集的可穿戴设备原型上，利用真实用户活动数据进行了全面验证。实验结果表明，AdaEM能提供接近最优解（误差在5%以内）的方案，同时执行时间和能量开销极低（低于0.005%），有效提升了设备自维持能力，为移动健康应用中的功耗优化提供了新思路。
  key_points_zh:
  - 提出AdaEM算法，结合机器学习预测用户活动和能量使用模式，动态估计能量收集潜力
  - 利用动态鲁棒优化处理预测不确定性，优化能量分配决策以减少手动充电需求
  - 设计轻量级求解方案，确保算法在资源受限设备上的低开销和实时部署可行性
  - 在真实可穿戴设备原型上验证，集成太阳能和运动能量收集技术
  - 实验显示方案接近最优解（5%误差内），执行时间和能量开销低于0.005%
  - 显著提升设备自维持能力，为移动健康领域功耗管理提供实用解决方案
  queries:
  - AI energy management mobile
  source: arxiv
  created_at: '2026-03-19T02:09:27+08:00'
- id: arxiv:2112.07269v1
  title_zh: MCDS：移动边缘云计算系统中AI增强的工作流调度
  title_en: 'MCDS: AI Augmented Workflow Scheduling in Mobile Edge Cloud Computing
    Systems'
  pdf_url: https://arxiv.org/pdf/2112.07269v1.pdf
  publish_time: '2021-12-14'
  update_time: '2021-12-14'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 工作流调度是并行与分布式计算中的核心问题，旨在高效利用计算资源以满足用户服务质量需求。近年来，研究者利用边缘计算平台的低延迟特性优化应用QoS，但在移动边缘-云计算系统中，调度面临计算资源异构性、移动设备延迟动态变化及工作负载需求波动等挑战。为克服这些困难，亟需开发具有前瞻性的优化方案，以精准建模QoS目标。本文提出MCDS（蒙特卡洛学习使用深度代理模型），一种基于人工智能的工作流调度方法，该方法结合树状搜索策略与深度神经网络代理模型，实时估计即时调度决策对长期QoS的影响，从而实现鲁棒优化。在物理和模拟边缘-云测试平台上的实验表明，MCDS在能耗、响应时间、服务级别协议违规率和成本方面分别比现有最先进方法提升至少6.13%、4.56%、45.09%和30.71%。该方法通过智能资源分配显著降低移动设备功耗，尤其适用于手机系统在边缘计算场景下的节能需求，为AI驱动的低功耗调度提供了实用解决方案。
  key_points_zh:
  - MCDS方法融合蒙特卡洛学习与深度代理模型，实现工作流智能调度
  - 解决移动边缘-云系统中计算异构性和动态延迟导致的调度难题
  - 树搜索策略结合DNN代理模型预测长期QoS影响，优化决策
  - 实验验证在能耗指标上提升6.13%，显著降低手机系统运行功耗
  - 减少服务级别协议违规率达45.09%，提升资源利用效率
  - 适用于手机边缘计算场景，通过动态调度避免资源浪费
  queries:
  - Energy efficient mobile AI systems
  source: arxiv
  created_at: '2026-03-19T01:39:09+08:00'
- id: arxiv:2110.00424v1
  title_zh: 基于相关性的移动设备节能动态多任务卸载策略研究
  title_en: Correlation-Based Device Energy-Efficient Dynamic Multi-Task Offloading
    for Mobile Edge Computing
  pdf_url: https://arxiv.org/pdf/2110.00424v1.pdf
  publish_time: '2021-08-21'
  update_time: '2021-08-21'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着移动计算需求的激增，移动边缘计算（MEC）通过任务卸载技术有效缓解了手机等移动设备的计算负载并降低了服务延迟，但设备电池寿命成为关键制约因素。本研究聚焦于AI驱动的功耗优化，提出一种创新的动态多任务卸载策略，旨在显著降低手机系统能耗。该策略深入挖掘任务在时间维度和任务类型维度的相关性，智能筛选冗余任务，从而减少传输至边缘服务器的数据量，降低通信能耗。同时，设计了一种基于二进制决策树的联合优化算法，动态调整手机处理器的时钟频率、无线传输功率、任务分解结构及卸载数量，实现资源的高效协同管理。通过MATLAB仿真实验，在多种传输功率与噪声功率比场景下，该策略与传统单任务卸载方法相比，设备总能耗平均降低25%以上，最高节能效果达32%。研究成果为AI赋能的手机系统功耗管理提供了新思路，尤其适用于计算密集型应用的实时能效优化，对延长移动设备续航具有重要实践价值。
  key_points_zh:
  - 创新利用任务在时间域和任务域的相关性，智能识别并减少冗余任务传输量，显著降低通信过程中的能量消耗。
  - 开发基于二进制决策树的AI优化算法，动态协同调整手机时钟频率、传输功率、任务结构及卸载数量，实现多参数联合节能。
  - MATLAB仿真验证表明，该策略在不同传输功率与噪声比条件下，设备总能耗较传统方法降低25%-32%，节能效果突出。
  - 针对计算密集型应用，有效平衡计算负载与能耗，提升移动边缘计算环境下的系统响应速度和电池续航能力。
  - 为AI驱动的手机功耗管理提供实用框架，支持实时自适应卸载决策，适用于资源受限的移动设备场景。
  - 研究成果直接响应AI降低系统功耗主题，通过智能化任务调度减少硬件资源浪费，具有广泛的应用前景。
  queries:
  - Mobile energy efficiency
  source: arxiv
  created_at: '2026-03-20T14:49:50+08:00'
- id: arxiv:2105.08629v1
  title_zh: 基于深度学习的移动GPU快速相机图像去噪：Mobile AI 2021挑战赛报告
  title_en: 'Fast Camera Image Denoising on Mobile GPUs with Deep Learning, Mobile
    AI 2021 Challenge: Report'
  pdf_url: https://arxiv.org/pdf/2105.08629v1.pdf
  publish_time: '2021-05-17'
  update_time: '2021-05-17'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 图像去噪是移动照片处理的核心难题，现有方案多依赖合成数据且计算成本过高，难以在移动设备实时运行。为此，本文发起首届Mobile AI挑战赛，旨在开发端到端深度学习去噪方案以适配智能手机GPU。参赛者基于野外捕获的大规模真实噪声-干净图像对数据集进行模型训练，确保方案实用性。所有模型在搭载Mali
    GPU的三星Exynos 2100芯片组上严格评估，该GPU支持浮点与量化神经网络加速。最终方案完全兼容主流移动GPU，可在40-80毫秒内处理480p分辨率图像，同时保持高保真视觉效果。详细分析了各参赛模型的架构创新与效率优化策略，证明深度学习方法能有效平衡移动端去噪的实时性与质量需求，为行业提供可落地的高效解决方案。
  key_points_zh:
  - 针对移动设备推出首个真实场景图像去噪挑战赛，解决合成数据泛化性不足问题
  - 构建大规模野外噪声-干净图像对数据集，提升模型实际部署可靠性
  - 开发的深度学习模型兼容各类移动GPU，480p图像处理仅需40-80毫秒
  - 在三星Exynos 2100平台验证高能效性，兼顾实时性能与图像保真度
  - 总结模型优化策略，为移动端AI图像处理提供可复用的技术路径
  queries:
