  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着多模态大语言模型（MLLM）在智能手机代理领域的兴起，开发高效节能的代理系统成为降低设备功耗的关键。然而，公平评估这些代理面临任务多样性、实现差异和标准化缺失等挑战。本研究推出SPA-Bench——一个全面的智能手机代理评估基准，专为模拟真实交互环境设计。其核心贡献包括：构建覆盖中英文系统设置及主流第三方应用的多样化任务库，聚焦用户日常高频操作；开发即插即用框架，支持实时代理与Android设备交互，已集成十余种代理模型并便于扩展；设计多维度自动评估管道，综合测量任务成功率、响应时间、内存占用及能耗等七项指标。大规模实验揭示当前代理在用户界面解析、动作精准执行、长期记忆维持及资源效率方面存在瓶颈，尤其指出复杂任务执行时功耗激增问题。研究进一步提出轻量级模型优化和智能调度算法等未来方向，旨在显著降低系统功耗，推动代理技术实用化。SPA-Bench已开源，为AI驱动的手机节能研究提供重要工具。
  key_points_zh:
  - 提供中英文任务库覆盖系统及第三方应用，聚焦日常高频操作场景
  - 即插即用框架支持实时代理交互，集成十余种模型并便于扩展
  - 多维度评估管道自动测量任务完成度与资源消耗等七项关键指标
  - 实验揭示代理在UI理解、动作执行和能耗控制方面的核心挑战
  - 资源分析显示复杂任务执行时功耗问题突出，亟需优化
  - 提出轻量级模型与智能调度算法，直接针对降低系统功耗
  queries:
  - Energy efficient smartphone agents
  source: arxiv
