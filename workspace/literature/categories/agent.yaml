- id: arxiv:1907.02774v1
  title_zh: 面向移动LTE设备的自适应预测功耗管理
  title_en: Adaptive Predictive Power Management for Mobile LTE Devices
  pdf_url: https://arxiv.org/pdf/1907.02774v1.pdf
  publish_time: '2019-07-05'
  update_time: '2019-07-05'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 降低手机能耗是LTE和5G标准下蜂窝调制解调器设计的核心目标之一。当前硬件设计不仅依赖组件结构和工艺改进提升功耗效率，还需优化动态功耗管理策略以增强能源利用。然而，现有移动设备功耗管理技术多采用反应式机制，仅在系统空闲时被动上下电，缺乏前瞻性。本文创新性地提出主动式功耗管理框架，通过预测环境信息和通信协议状态实现智能决策。具体设计并对比了两种轻量级机器学习算法：基于监督学习的预测模型和基于强化学习的自适应策略，用于精准识别传输空闲时隙，使设备更频繁进入低功耗睡眠状态。考虑到机器学习实现本身会带来额外能耗，研究全面评估了预测精度与净能耗节省的平衡关系。实验表明，该技术在保证系统稳定性的前提下，可实现高达17%的能源节省，显著延长移动设备电池续航，为5G时代智能功耗管理提供了实用化路径。
  key_points_zh:
  - 提出主动式功耗管理框架，利用预测技术优化移动设备睡眠状态触发机制
  - 设计两种轻量级机器学习算法：监督学习用于历史数据分析，强化学习实现动态自适应决策
  - 重点评估预测准确性与净能耗节省的平衡，避免学习开销抵消节能收益
  - 实验验证在LTE设备中可实现最高17%的能源节省，提升电池续航能力
  - 适用于5G移动通信场景，解决传统反应式管理的滞后性问题
  - 为未来AI驱动的智能功耗管理提供可扩展的技术基础
  queries:
  - mobile system power saving
  source: arxiv
  created_at: '2026-03-19T01:24:35+08:00'
- id: arxiv:1906.08167v1
  title_zh: PABO：基于伪代理的多目标贝叶斯超参数优化用于高效神经加速器设计
  title_en: 'PABO: Pseudo Agent-Based Multi-Objective Bayesian Hyperparameter Optimization
    for Efficient Neural Accelerator Design'
  pdf_url: https://arxiv.org/pdf/1906.08167v1.pdf
  publish_time: '2019-06-11'
  update_time: '2019-06-11'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 深度神经网络计算成本持续攀升，对手机等边缘设备的能效硬件需求迫切，使得精度与硬件成本的协同优化至关重要。手动调参效率低下，自动联合优化成为必要，但现有贝叶斯优化方法多忽略硬件因素，导致设计低效。PABO提出基于伪代理的多目标贝叶斯超参数优化方法，专注于忆阻器交叉阵列加速器，通过监督代理连接网络精度和硬件成本的高斯分布模型，简化共优化问题。该方法移除冗余计算和更新，实现约100倍优化速度提升，并输出帕累托前沿揭示高精度与低功耗间的权衡。实验验证PABO在保持高精度的同时显著降低硬件成本，为手机系统提供高效的神经加速器设计，通过优化超参数减少AI推理能耗，实测能效提升可有效延长移动设备电池寿命。
  key_points_zh:
  - PABO实现DNN精度与硬件成本的协同优化，专为手机等边缘设备能效设计
  - 伪代理机制简化贝叶斯优化，加速计算过程约100倍，降低调参能耗
  - 聚焦忆阻器交叉阵列加速器，提升硬件能效并减少功耗
  - 输出帕累托前沿指导高精度与低功耗设计的权衡决策
  - 显著降低AI推理能耗，为手机系统提供可落地的功耗优化方案
  queries:
  - Agent-based smartphone energy efficiency
