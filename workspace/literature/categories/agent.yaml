- id: arxiv:2401.04491v1
  title_zh: SpiNNaker2：面向事件驱动和异步机器学习的大规模神经形态系统
  title_en: 'SpiNNaker2: A Large-Scale Neuromorphic System for Event-Based and Asynchronous
    Machine Learning'
  pdf_url: https://arxiv.org/pdf/2401.04491v1.pdf
  publish_time: '2024-01-09'
  update_time: '2024-01-09'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着人工神经网络与专用硬件加速器的快速发展，机器学习在多个领域取得突破，但大型模型和海量数据导致计算需求激增，尤其在手机等移动设备中，高能耗成为关键瓶颈。神经形态计算系统通过模拟神经生物学原理，整合低功耗模拟与数字技术，有效降低能耗和延迟。SpiNNaker2作为一款数字神经形态芯片，专为可扩展机器学习设计，其事件驱动和异步架构支持数千个芯片的大规模集成，显著减少冗余计算。本文详细阐述了SpiNNaker2的工作原理，展示了从人工神经网络到生物启发脉冲神经网络等多种应用的原型。通过优化事件处理机制，该系统在保持高性能的同时大幅降低功耗，为手机系统提供高效的低功耗解决方案，推动事件驱动算法在下一代移动AI中的应用，实测显示其能效优势可有效延长设备续航时间。
  key_points_zh:
  - SpiNNaker2采用事件驱动和异步设计，通过稀疏计算显著降低手机等移动设备的系统功耗
  - 系统支持大规模扩展，可集成数千个芯片，提升处理能力而不增加能耗
  - 兼容人工神经网络、脉冲神经网络等多种模型，适应多样化AI应用场景
  - 神经形态计算原理减少延迟和能耗，优化手机实时任务处理效率
  - 为移动设备提供硬件基础，促进低功耗AI算法在边缘计算中的部署
