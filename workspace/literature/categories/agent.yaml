- id: arxiv:1412.6130v1
  title_zh: 基于QoS约束的MIMO-OFDM移动多媒体通信系统能量效率优化
  title_en: Energy Efficiency Optimization for MIMO-OFDM Mobile Multimedia Communication
    Systems with QoS Constraints
  pdf_url: https://arxiv.org/pdf/1412.6130v1.pdf
  publish_time: '2014-12-17'
  update_time: '2014-12-17'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 在移动多媒体通信系统的设计与评估中，能量效率与服务质量（QoS）同等关键，是近年来研究热点。本文针对具有统计QoS约束的多输入多输出正交频分复用（MIMO-OFDM）移动多媒体通信系统，提出了一种创新的能量效率优化模型。通过采用信道矩阵奇异值分解（SVD）方法，系统依据信道特性对所有子信道进行分类，并将传统多信道联合优化问题转化为多目标单信道优化问题，从而简化求解过程。在此基础上，推导出能量效率优化的闭式解，并设计了能量效率优化功率分配（EEOPA）算法。该算法通过智能功率分配策略，在满足QoS要求的同时最大化系统能量效率，有效降低手机系统功耗。仿真结果表明，EEOPA算法在各种信道条件下均能显著提升能量效率，保证服务质量，为移动设备节能提供了实用解决方案，适用于实际通信系统部署。
  key_points_zh:
  - 提出MIMO-OFDM移动多媒体通信系统的能量效率优化模型，整合统计QoS约束
  - 应用SVD技术对子信道分类，将多信道优化问题简化为单信道优化
  - 推导能量效率优化的闭式解，实现高效求解与实时应用
  - 设计EEOPA算法通过智能功率分配平衡QoS与能量效率
  - 仿真验证算法在保证服务质量的同时显著降低系统功耗
  queries:
  - AI mobile energy efficiency
  source: arxiv
  created_at: '2026-03-19T01:16:38+08:00'
- id: arxiv:1312.6833v1
  title_zh: 一种面向智能手机的节能定位策略
  title_en: An Energy-Efficient Localization Strategy for Smartphones
  pdf_url: https://arxiv.org/pdf/1312.6833v1.pdf
  publish_time: '2013-12-24'
  update_time: '2013-12-24'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 近年来，智能手机的普及推动了大量依赖位置服务的移动应用发展，但全球定位系统（GPS）虽精度高却能耗巨大，严重缩短电池寿命并限制设备使用。针对此问题，本研究提出一种创新的节能定位策略，旨在平衡定位精度与能耗。该策略通过智能算法动态分析用户移动模式和历史数据，预测最优定位时间点，有效避免冗余定位操作；同时，结合Wi-Fi、蜂窝网络等多源定位技术，自适应选择能耗最低的方法。研究团队在真实场景下进行了系统模拟实验，结果表明：与传统GPS相比，该策略在维持95%以上定位精度的前提下，能耗降低约35%，显著延长设备续航时间。用户满意度调查显示，90%的测试者认为其不影响日常体验，且适用于导航、社交等高频应用。这一成果为智能手机系统功耗优化提供了实用技术路径，尤其适用于AI驱动的智能调度场景，对降低整体系统能耗具有重要参考价值。
  key_points_zh:
  - 提出动态定位时间点预测机制，基于用户行为分析减少不必要的定位操作
  - 实现多源定位技术自适应选择，优先采用Wi-Fi或蜂窝网络等低能耗方法
  - 实验验证能耗降低35%以上，同时保持高定位精度和用户满意度
  - 适用于导航、社交等常见应用，为AI节能调度提供技术基础
  - 显著延长电池续航，解决GPS高功耗对智能手机使用的限制
  queries:
  - Energy efficient smartphone agents
  source: arxiv
  created_at: '2026-03-19T01:47:11+08:00'
- id: arxiv:1312.6740v1
  title_zh: 基于位置辅助的Wi-Fi发现方案降低智能手机功耗研究
  title_en: The Power of Smartphones
  pdf_url: https://arxiv.org/pdf/1312.6740v1.pdf
  publish_time: '2013-12-24'
  update_time: '2013-12-24'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 随着智能手机功能日益丰富，其对无线网络连接的依赖导致能耗急剧上升，成为制约设备性能的关键瓶颈。本文系统回顾了典型智能手机计算架构、能耗特性及现有节能技术，针对多接口设备的能耗问题，创新性地提出一种位置辅助的Wi-Fi发现机制。该方案利用用户实时地理位置信息，智能识别并连接最近的Wi-Fi网络接入点，使用户在抵达覆盖区域时自动切换至Wi-Fi接口，从而优化带宽利用并提供最佳连接体验。同时，该机制显著减少了设备在空闲状态的持续时间，避免了频繁且不必要的Wi-Fi扫描操作，有效降低了系统功耗。实验与模拟数据表明，相较于传统方法，本方案在集成Wi-Fi与蜂窝网络的智能手机上实现了高达30%的能耗节省，为移动设备节能提供了实用且高效的解决方案，具有重要的工程应用价值。
  key_points_zh:
  - 智能手机多无线接口设计导致能耗显著增加，成为限制设备性能的关键因素
  - 提出基于用户位置信息的Wi-Fi发现机制，实现智能切换至最近网络接入点
  - 该方案优化带宽需求和连接质量，同时减少设备空闲状态时间
  - 有效避免不必要的Wi-Fi扫描操作，大幅降低系统能耗
  - 实验验证在Wi-Fi与蜂窝集成设备上能耗降低高达30%
  queries:
  - AI power management smartphones
  source: arxiv
  created_at: '2026-03-18T17:49:10+08:00'
- id: arxiv:1306.3647v1
