  publish_time: '2020-12-21'
  update_time: '2022-05-22'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 联邦学习（FL）作为一种在移动设备上协作的分布式机器学习范式，面临本地训练和模型更新耗电及占用无线资源的挑战。本文针对资源受限的移动设备，提出将FL融入未来无线网络设计，开发一种联合设计无线传输和权重量化的新型方案，以实现能效优化的联邦学习。具体而言，我们设计了灵活的权重量化机制，以适应异构移动设备的本地训练需求。基于本地计算能耗与模型更新能耗相当的观察，我们将能效FL问题建模为混合整数规划问题，联合确定量化策略和频谱资源分配，旨在最小化整体FL能耗（包括计算和传输），同时确保模型性能和训练延迟。由于问题变量强耦合，我们提出了一种高效迭代算法，推导出最优带宽分配和权重量化级别。通过广泛的仿真实验，验证了所提方案在降低能耗方面的有效性，为移动设备上的高效联邦学习提供了实用解决方案，显著减少了系统功耗。
  key_points_zh:
  - 提出联合设计权重量化和无线传输的方案，优化移动设备联邦学习的能效
  - 开发灵活权重量化机制，适应异构设备的本地训练需求以降低计算功耗
  - 将能耗最小化问题建模为混合整数规划，联合优化量化策略与频谱资源分配
  - 设计高效迭代算法解决变量强耦合问题，推导最优带宽和量化级别
  - 通过仿真实验证明方案有效降低整体能耗（计算+传输），同时保障模型性能
  queries:
  - mobile device energy optimization
  source: arxiv
