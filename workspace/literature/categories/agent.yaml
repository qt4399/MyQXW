- id: arxiv:2209.13873v3
  title_zh: InFi：面向移动端推理的端到端输入过滤学习以提升资源效率
  title_en: 'InFi: End-to-End Learning to Filter Input for Resource-Efficiency in
    Mobile-Centric Inference'
  pdf_url: https://arxiv.org/pdf/2209.13873v3.pdf
  publish_time: '2022-09-28'
  update_time: '2023-06-07'
  topics:
  - AI降低手机系统功耗办法
  summary_zh: 移动端AI应用对模型推理的资源效率要求极高，输入过滤作为一种消除冗余以降低推理成本的有效方法，仍面临两大关键挑战：推理工作负载的理论可过滤性指导不足，导致资源受限应用需反复试错；特征嵌入缺乏鲁棒区分性，难以适应多样化任务与输入内容。本文首先形式化输入过滤问题，通过理论比较推理模型与过滤器的假设复杂度，揭示优化潜力。进而提出首个端到端可学习的输入过滤框架InFi，该框架覆盖主流方法并显著增强特征嵌入的鲁棒性，支持六种输入模态及多种移动端部署方案。综合实验验证了理论分析的正确性，结果表明InFi在适用性、准确率和效率上全面超越基线模型。在移动平台视频分析应用中，InFi实现8.5倍吞吐量提升，节省95%网络带宽，同时保持90%以上的高精度，为资源受限场景提供了高效解决方案。
  key_points_zh:
  - 形式化输入过滤问题，理论分析推理模型与过滤器的假设复杂度差异，明确优化边界
  - 提出端到端可学习框架InFi，通过增强特征嵌入的鲁棒区分性提升过滤效果
  - 支持六种输入模态及多平台部署，显著扩展技术适用范围
  - 实验显示吞吐量提升8.5倍，带宽节省95%，兼顾高精度与低资源消耗
  - 为移动端AI提供免试错的理论指导，降低资源受限应用的开发成本
