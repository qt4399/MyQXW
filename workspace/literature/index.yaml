    summary_en: Deep neural network (DNN) has driven extensive applications in mobile
      technology. However, for long-running mobile apps like voice assistants or video
      applications on smartphones, energy efficiency is critical for battery-powered
      devices. The rise of heterogeneous processors in mobile devices today has introduced
      new challenges for optimizing energy efficiency. Our key insight is that partitioning
      computations across different processors for parallelism and speedup doesn't
      necessarily correlate with energy consumption optimization and may even increase
      it. To address this, we present AdaOper, an energy-efficient concurrent DNN
      inference system. It optimizes energy efficiency on mobile heterogeneous processors
      while maintaining responsiveness. AdaOper includes a runtime energy profiler
      that dynamically adjusts operator partitioning to optimize energy efficiency
      based on dynamic device conditions. We conduct preliminary experiments, which
      show that AdaOper reduces energy consumption by 16.88% compared to the existing
      concurrent method while ensuring real-time performance.
    summary_zh: 深度神经网络在移动技术中广泛应用，但语音助手或视频应用等长运行场景对电池设备的能效提出严苛要求。当前移动设备异构处理器的普及使能效优化面临新挑战：计算任务分区虽提升并行速度，却未必降低能耗甚至可能增加消耗。本文提出AdaOper系统，专为移动异构处理器设计节能高效并发DNN推理方案。其核心创新在于运行时能耗分析器，能动态监测设备状态并实时调整算子分区策略，平衡能效与响应性。系统通过细粒度能耗建模，避免传统分区方法的能耗陷阱，在保证实时性能的前提下优化整体功耗。初步实验表明，相比现有并发方法，AdaOper在智能手机上实现16.88%的能耗降低，同时维持毫秒级响应延迟，为移动AI应用提供实用化能效解决方案。
    key_points_zh:
    - 异构处理器环境下，计算分区策略与能耗优化无必然关联，可能反向增加功耗。
    - AdaOper系统引入运行时能耗分析器，动态调整算子分区适应设备状态变化。
    - 通过细粒度能耗建模实现能效与响应性的协同优化。
    - 实验验证能耗降低16.88%，同时确保实时推理性能不受影响。
    - 为语音助手等长运行移动应用提供电池续航优化新路径。
