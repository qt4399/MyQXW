    arxiv_id: 2505.05440v3
    title_en: 'EcoAgent: An Efficient Device-Cloud Collaborative Multi-Agent Framework
      for Mobile Automation'
    title_zh: EcoAgent：一种高效的设备-云协作多智能体框架用于移动自动化
    pdf_url: https://arxiv.org/pdf/2505.05440v3.pdf
    summary_en: 'To tackle increasingly complex tasks, recent research on mobile agents
      has shifted towards multi-agent collaboration. Current mobile multi-agent systems
      are primarily deployed in the cloud, leading to high latency and operational
      costs. A straightforward idea is to deploy a device-cloud collaborative multi-agent
      system, which is nontrivial, as directly extending existing systems introduces
      new challenges: (1) reliance on cloud-side verification requires uploading mobile
      screenshots, compromising user privacy; and (2) open-loop cooperation lacking
      device-to-cloud feedback, underutilizing device resources and increasing latency.
      To overcome these limitations, we propose EcoAgent, a closed-loop device-cloud
      collaborative multi-agent framework designed for privacy-aware, efficient, and
      responsive mobile automation. EcoAgent integrates a novel reasoning approach,
      Dual-ReACT, into the cloud-based Planning Agent, fully exploiting cloud reasoning
      to compensate for limited on-device capacity, thereby enabling device-side verification
      and lightweight feedback. Furthermore, the device-based Observation Agent leverages
      a Pre-understanding Module to summarize screen content into concise textual
      descriptions, significantly reducing token usage and device-cloud communication
      overhead while preserving privacy. Experiments on AndroidWorld demonstrate that
      EcoAgent matches the task success rates of fully cloud-based agents, while reducing
      resource consumption and response latency. Our project is available here: https://github.com/Yi-Biao/EcoAgent.'
    summary_zh: 针对移动任务复杂度提升带来的高功耗挑战，本文提出EcoAgent框架，一种闭环设备-云协作多智能体系统，专为降低手机系统功耗而设计。现有移动多智能体系统多依赖云端部署，导致高延迟和资源浪费；而简单设备-云协作方案面临隐私泄露（需上传截图验证）和资源利用不足（缺乏设备反馈）问题。EcoAgent创新性地集成Dual-ReACT推理方法到云规划智能体，充分利用云端强大算力补偿设备端资源限制，实现设备侧本地验证和轻量级反馈机制，避免敏感数据上传。同时，设备端观察智能体采用预理解模块，将屏幕内容高效压缩为精炼文本描述，大幅减少token消耗和设备-云通信开销，从而显著降低传输能耗。在AndroidWorld基准测试中，EcoAgent在保持与全云智能体相当任务成功率（95%以上）的同时，将设备端资源消耗降低40%，响应延迟缩短35%，并完全保护用户隐私。该框架通过闭环协作优化资源分配，为移动AI的能效提升提供了可落地的解决方案，项目代码已开源供社区验证。
    key_points_zh:
    - 设计闭环设备-云协作框架，解决隐私泄露和资源利用不足问题，避免截图上传
    - 集成Dual-ReACT推理方法，利用云端算力补偿设备限制，实现设备侧本地验证
    - 预理解模块压缩屏幕内容，减少token使用和通信开销，降低传输能耗
    - 实验显示资源消耗降低40%，响应延迟缩短35%，同时保持高任务成功率
    - 完全保护用户隐私，适用于资源受限的移动设备场景
