    arxiv_id: 2211.05256v1
    title_en: 'Power Efficient Video Super-Resolution on Mobile NPUs with Deep Learning,
      Mobile AI & AIM 2022 challenge: Report'
    title_zh: 基于深度学习的移动NPU高效视频超分辨率：Mobile AI与AIM 2022挑战赛报告
    pdf_url: https://arxiv.org/pdf/2211.05256v1.pdf
    summary_en: Video super-resolution is one of the most popular tasks on mobile
      devices, being widely used for an automatic improvement of low-bitrate and low-resolution
      video streams. While numerous solutions have been proposed for this problem,
      they are usually quite computationally demanding, demonstrating low FPS rates
      and power efficiency on mobile devices. In this Mobile AI challenge, we address
      this problem and propose the participants to design an end-to-end real-time
      video super-resolution solution for mobile NPUs optimized for low energy consumption.
      The participants were provided with the REDS training dataset containing video
      sequences for a 4X video upscaling task. The runtime and power efficiency of
      all models was evaluated on the powerful MediaTek Dimensity 9000 platform with
      a dedicated AI processing unit capable of accelerating floating-point and quantized
      neural networks. All proposed solutions are fully compatible with the above
      NPU, demonstrating an up to 500 FPS rate and 0.2 [Watt / 30 FPS] power consumption.
      A detailed description of all models developed in the challenge is provided
      in this paper.
    summary_zh: 视频超分辨率是移动设备上广泛使用的功能，用于自动提升低比特率和低分辨率视频流的质量。尽管已有多种解决方案，但它们通常计算密集，在移动设备上帧率低且能效差。本研究针对这一问题，设计了端到端实时视频超分辨率方案，专为移动NPU优化以降低能耗。参与者使用REDS数据集进行4倍视频上采样训练。所有模型在MediaTek
      Dimensity 9000平台评估，该平台配备专用AI处理单元，支持浮点和量化神经网络加速。实验表明，所提方案兼容NPU，实现高达500 FPS的帧率和0.2瓦/30
      FPS的功耗，显著提升移动设备能效。本文详细描述了挑战赛中开发的模型及其优化策略，为手机系统功耗降低提供了实用AI方案。
    key_points_zh:
    - 针对移动设备视频超分辨率任务，提出低功耗深度学习解决方案。
    - 使用REDS训练数据集进行4倍视频上采样优化。
    - 在MediaTek Dimensity 9000平台上实现500 FPS处理速度。
    - 功耗优化至0.2瓦/30 FPS，大幅降低能耗。
    - 所有模型兼容移动NPU，支持高效神经网络推理。
    - 挑战赛成果推动移动端AI模型能效提升。
