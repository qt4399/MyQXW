    arxiv_id: 1904.00601v2
    title_en: 'Distributed Power Control for Large Energy Harvesting Networks: A Multi-Agent
      Deep Reinforcement Learning Approach'
    title_zh: 基于多智能体深度强化学习的大规模能量收集网络分布式功率控制方法
    pdf_url: https://arxiv.org/pdf/1904.00601v2.pdf
    summary_en: In this paper, we develop a multi-agent reinforcement learning (MARL)
      framework to obtain online power control policies for a large energy harvesting
      (EH) multiple access channel, when only causal information about the EH process
      and wireless channel is available. In the proposed framework, we model the online
      power control problem as a discrete-time mean-field game (MFG), and analytically
      show that the MFG has a unique stationary solution. Next, we leverage the fictitious
      play property of the mean-field games, and the deep reinforcement learning technique
      to learn the stationary solution of the game, in a completely distributed fashion.
      We analytically show that the proposed procedure converges to the unique stationary
      solution of the MFG. This, in turn, ensures that the optimal policies can be
      learned in a completely distributed fashion. In order to benchmark the performance
      of the distributed policies, we also develop a deep neural network (DNN) based
      centralized as well as distributed online power control schemes. Our simulation
      results show the efficacy of the proposed power control policies. In particular,
      the DNN based centralized power control policies provide a very good performance
      for large EH networks for which the design of optimal policies is intractable
      using the conventional methods such as Markov decision processes. Further, performance
      of both the distributed policies is close to the throughput achieved by the
      centralized policies.
    summary_zh: 本文提出了一种多智能体强化学习框架，用于大规模能量收集多址信道的在线功率控制策略设计，仅需因果信息。该框架将功率控制问题建模为离散时间平均场博弈，并证明其存在唯一平稳解。利用平均场博弈的虚构博弈特性和深度强化学习技术，以完全分布式方式学习该解。分析表明所提方法收敛到唯一平稳解，确保最优策略可分布式学习。为评估性能，还开发了基于深度神经网络的集中式和分布式在线功率控制方案。仿真结果显示，所提功率控制策略有效；基于DNN的集中式策略在大规模能量收集网络中性能优异，而传统方法如马尔可夫决策过程难以处理；分布式策略的性能接近集中式策略的吞吐量，适用于实际手机系统功耗优化场景。
    key_points_zh:
    - 提出多智能体深度强化学习框架用于能量收集网络的分布式功率控制，仅需因果信息实现在线策略优化
    - 将功率控制问题建模为离散时间平均场博弈，并严格证明其存在唯一平稳解
    - 利用虚构博弈特性和深度强化学习技术，实现完全分布式的最优策略学习过程
    - 分析证明所提方法收敛到唯一平稳解，确保分布式学习的理论可靠性
    - 开发基于深度神经网络的集中式和分布式方案作为性能基准，验证大规模网络适用性
    - 仿真表明分布式策略性能接近集中式方案，显著降低系统功耗且适用于手机网络场景
