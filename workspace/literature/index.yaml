    title_en: Smart, Adaptive Energy Optimization for Mobile Web Interactions
    title_zh: 面向移动Web交互的智能自适应能量优化
    pdf_url: https://arxiv.org/pdf/2005.00749v1.pdf
    summary_en: Web technology underpins many interactive mobile applications. However,
      energy-efficient mobile web interactions is an outstanding challenge. Given
      the increasing diversity and complexity of mobile hardware, any practical optimization
      scheme must work for a wide range of users, mobile platforms and web workloads.
      This paper presents CAMEL , a novel energy optimization system for mobile web
      interactions. CAMEL leverages machine learning techniques to develop a smart,
      adaptive scheme to judiciously trade performance for reduced power consumption.
      Unlike prior work, C AMEL directly models how a given web content affects the
      user expectation and uses this to guide energy optimization. It goes further
      by employing transfer learning and conformal predictions to tune a previously
      learned model in the end-user environment and improve it over time. We apply
      CAMEL to Chromium and evaluate it on four distinct mobile systems involving
      1,000 testing webpages and 30 users. Compared to four state-of-the-art web-event
      optimizers, CAMEL delivers 22% more energy savings, but with 49% fewer violations
      on the quality of user experience, and exhibits orders of magnitudes less overhead
      when targeting a new computing environment.
    summary_zh: Web技术是许多交互式移动应用的基础，但实现能效的移动Web交互仍是一个突出挑战。鉴于移动硬件日益多样化和复杂化，任何实用的优化方案必须适用于广泛的用户、平台和Web工作负载。本文提出CAMEL系统，一种基于机器学习的移动Web交互能量优化方案，通过智能自适应机制在性能与功耗之间进行权衡。CAMEL直接建模Web内容对用户期望的影响，并以此指导能量优化决策；同时采用迁移学习和保形预测技术，在终端用户环境中动态调优模型并持续改进。我们在Chromium浏览器上实现CAMEL，并在四个不同移动系统上测试了1000个网页和30名用户。结果表明，相比四种最先进的Web事件优化器，CAMEL实现了22%更多的能量节省，用户体验质量违规减少49%，且在新计算环境中开销降低数个数量级，显著提升了移动Web的能效和适应性。
    key_points_zh:
    - 利用机器学习开发智能自适应方案，在性能与功耗间实现最优权衡
    - 直接建模Web内容对用户期望的影响，作为能量优化的核心依据
    - 采用迁移学习和保形预测技术，在用户环境中动态调优模型并持续进化
    - 在Chromium上大规模测试，覆盖1000网页和30用户，验证系统普适性
    - 相比现有优化器，能量节省提升22%，用户体验违规减少49%
    - 新环境部署开销降低数个数量级，具有高效适应性和低迁移成本
