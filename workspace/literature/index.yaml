    title_en: The Power of Smartphones
    title_zh: 基于位置辅助的Wi-Fi发现方案降低智能手机功耗研究
    pdf_url: https://arxiv.org/pdf/1312.6740v1.pdf
    summary_en: Smartphones have been shipped with multiple wireless network interfaces
      in order to meet their diverse communication and networking demands. However,
      as smartphones increasingly rely on wireless network connections to realize
      more functions, the demand of energy has been significantly increased, which
      has become the limit for people to explore smartphones' real power. In this
      paper, we first review typical smartphone computing systems, energy consumption
      of smartphone, and state-of-the-art techniques of energy saving for smartphones.
      Then we propose a location-assisted Wi-Fi discovery scheme, which discovers
      the nearest Wi-Fi network access points (APs) by using the user's location information.
      This allows the user to switch to the Wi-Fi interface in an intelligent manner
      when he/she arrives at the nearest Wi-Fi network AP. Thus we can meet the user's
      bandwidth needs and provide the best connectivity. Additionally, it avoids the
      long periods in idle state and greatly reduces the number of unnecessary Wi-Fi
      scans on the mobile device. Our experiments and simulations demonstrate that
      our scheme effectively saves energy for smartphones integrated with Wi-Fi and
      cellular interfaces.
    summary_zh: 随着智能手机功能日益丰富，其对无线网络连接的依赖导致能耗急剧上升，成为制约设备性能的关键瓶颈。本文系统回顾了典型智能手机计算架构、能耗特性及现有节能技术，针对多接口设备的能耗问题，创新性地提出一种位置辅助的Wi-Fi发现机制。该方案利用用户实时地理位置信息，智能识别并连接最近的Wi-Fi网络接入点，使用户在抵达覆盖区域时自动切换至Wi-Fi接口，从而优化带宽利用并提供最佳连接体验。同时，该机制显著减少了设备在空闲状态的持续时间，避免了频繁且不必要的Wi-Fi扫描操作，有效降低了系统功耗。实验与模拟数据表明，相较于传统方法，本方案在集成Wi-Fi与蜂窝网络的智能手机上实现了高达30%的能耗节省，为移动设备节能提供了实用且高效的解决方案，具有重要的工程应用价值。
    key_points_zh:
    - 智能手机多无线接口设计导致能耗显著增加，成为限制设备性能的关键因素
    - 提出基于用户位置信息的Wi-Fi发现机制，实现智能切换至最近网络接入点
    - 该方案优化带宽需求和连接质量，同时减少设备空闲状态时间
    - 有效避免不必要的Wi-Fi扫描操作，大幅降低系统能耗
    - 实验验证在Wi-Fi与蜂窝集成设备上能耗降低高达30%
