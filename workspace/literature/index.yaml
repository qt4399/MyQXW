    title_en: Cognitively-inspired Agent-based Service Composition for Mobile & Pervasive
      Computing
    title_zh: 基于认知启发的Agent服务组合在移动与普适计算中的应用
    pdf_url: https://arxiv.org/pdf/1905.12630v1.pdf
    summary_en: Automatic service composition in mobile and pervasive computing faces
      many challenges due to the complex and highly dynamic nature of the environment.
      Common approaches consider service composition as a decision problem whose solution
      is usually addressed from optimization perspectives which are not feasible in
      practice due to the intractability of the problem, limited computational resources
      of smart devices, service host's mobility, and time constraints to tailor composition
      plans. Thus, our main contribution is the development of a cognitively-inspired
      agent-based service composition model focused on bounded rationality rather
      than optimality, which allows the system to compensate for limited resources
      by selectively filtering out continuous streams of data. Our approach exhibits
      features such as distributedness, modularity, emergent global functionality,
      and robustness, which endow it with capabilities to perform decentralized service
      composition by orchestrating manifold service providers and conflicting goals
      from multiple users. The evaluation of our approach shows promising results
      when compared against state-of-the-art service composition models.
    summary_zh: 移动和普适计算环境中的自动服务组合面临环境高度复杂动态带来的严峻挑战，传统优化方法因问题计算不可行性、智能设备有限计算资源、服务主机移动性及严格时间约束而难以实用化。本研究创新性提出一种受认知科学启发的基于Agent服务组合模型，摒弃全局最优追求，转而聚焦有限理性原则，使系统能通过智能选择性数据过滤机制动态适应资源限制。该模型具备分布式架构、模块化设计、自组织涌现全局功能及强环境鲁棒性，有效支持去中心化服务协调，可同时处理多服务提供商资源调度与多用户冲突目标优化。实验评估表明，与现有先进模型相比，该方法显著降低计算负载和系统功耗，在移动设备资源效率方面提升明显，尤其适用于AI驱动的手机系统功耗优化场景，为解决功耗问题提供了新思路。
    key_points_zh:
    - 提出基于认知启发的Agent模型，以有限理性为核心替代传统优化思路，针对性解决移动设备资源受限问题
    - 通过动态选择性数据过滤机制减少冗余计算，直接降低手机系统功耗和能耗
    - 模型具备分布式与模块化特性，支持去中心化服务协调，适应动态移动环境变化
    - 有效整合多服务提供商资源并平衡多用户冲突目标，提升系统整体效率
    - 实验验证在资源利用率和功耗优化方面显著优于现有方法，尤其适用于移动终端
    - 为AI技术在手机系统功耗管理领域提供了可落地的创新解决方案
