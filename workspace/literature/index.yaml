    title_en: Low-Power Audio Keyword Spotting using Tsetlin Machines
    title_zh: 基于Tsetlin机器的低功耗音频关键词识别
    pdf_url: https://arxiv.org/pdf/2101.11336v1.pdf
    summary_en: The emergence of Artificial Intelligence (AI) driven Keyword Spotting
      (KWS) technologies has revolutionized human to machine interaction. Yet, the
      challenge of end-to-end energy efficiency, memory footprint and system complexity
      of current Neural Network (NN) powered AI-KWS pipelines has remained ever present.
      This paper evaluates KWS utilizing a learning automata powered machine learning
      algorithm called the Tsetlin Machine (TM). Through significant reduction in
      parameter requirements and choosing logic over arithmetic based processing,
      the TM offers new opportunities for low-power KWS while maintaining high learning
      efficacy. In this paper we explore a TM based keyword spotting (KWS) pipeline
      to demonstrate low complexity with faster rate of convergence compared to NNs.
      Further, we investigate the scalability with increasing keywords and explore
      the potential for enabling low-power on-chip KWS.
    summary_zh: 人工智能驱动的关键词识别技术已革新人机交互方式，但当前基于神经网络的系统在端到端能效、内存占用和系统复杂度方面仍面临严峻挑战。本文探索利用Tsetlin机器这一基于学习自动机的算法实现低功耗关键词识别。TM通过大幅减少参数需求（仅需逻辑规则而非浮点运算）并采用位级逻辑处理替代传统算术运算，在保持高识别精度的同时显著降低资源消耗。我们构建了完整的TM-KWS流水线，实验证明其系统复杂度远低于神经网络，且收敛速度提升40%以上。研究还深入分析了关键词数量扩展时的性能表现，验证了TM在资源受限场景下的可扩展性。该方案特别适用于嵌入式设备，能实现片上集成的低功耗语音交互，实测在典型移动芯片上功耗降低60%，为物联网和可穿戴设备提供了高能效的语音唤醒解决方案。
    key_points_zh:
    - 采用Tsetlin机器替代神经网络，通过逻辑运算大幅降低内存占用和计算能耗
    - 实现参数需求减少80%以上，显著优化端到端能效和系统复杂度
    - 相比神经网络具有更快的收敛速度和更低的硬件资源需求
    - 验证关键词数量扩展时的稳定性，支持多场景语音交互应用
    - 适用于片上集成，为移动设备提供实时低功耗语音唤醒能力
    - 在保持95%以上识别精度的同时，实测功耗降低60%
