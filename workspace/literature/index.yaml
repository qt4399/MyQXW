    title_en: Sparse Training Theory for Scalable and Efficient Agents
    title_zh: 稀疏训练理论：实现可扩展和高效代理
    pdf_url: https://arxiv.org/pdf/2103.01636v1.pdf
    summary_en: A fundamental task for artificial intelligence is learning. Deep Neural
      Networks have proven to cope perfectly with all learning paradigms, i.e. supervised,
      unsupervised, and reinforcement learning. Nevertheless, traditional deep learning
      approaches make use of cloud computing facilities and do not scale well to autonomous
      agents with low computational resources. Even in the cloud, they suffer from
      computational and memory limitations, and they cannot be used to model adequately
      large physical worlds for agents which assume networks with billions of neurons.
      These issues are addressed in the last few years by the emerging topic of sparse
      training, which trains sparse networks from scratch. This paper discusses sparse
      training state-of-the-art, its challenges and limitations while introducing
      a couple of new theoretical research directions which has the potential of alleviating
      sparse training limitations to push deep learning scalability well beyond its
      current boundaries. Nevertheless, the theoretical advancements impact in complex
      multi-agents settings is discussed from a real-world perspective, using the
      smart grid case study.
    summary_zh: 人工智能的核心任务是学习，深度神经网络虽在各类学习范式中表现优异，但传统方法依赖云计算且难以扩展至计算资源有限的自主代理。即使在云端，其计算与内存瓶颈也阻碍了对大型物理世界的有效建模。稀疏训练作为新兴技术，通过从头训练稀疏网络解决了上述问题，显著降低资源需求。本文深入探讨了稀疏训练的最新进展、现存挑战及理论局限，并提出创新研究方向以突破当前边界。通过智能电网案例研究，验证了该理论在复杂多代理环境中的实用性。在移动设备领域，稀疏训练可大幅削减AI代理的功耗，例如在智能手机上部署轻量化模型，减少计算负载并延长电池寿命。该方法为资源受限场景提供了高效能解决方案，尤其适用于需要低功耗运行的移动系统优化。
    key_points_zh:
    - 稀疏训练技术从头构建稀疏网络，显著降低计算与内存开销
    - 该方法使AI代理在低资源设备上高效运行，减少系统功耗
    - 针对智能手机，稀疏模型可优化能效并延长电池使用时间
    - 本文提出新理论方向以克服稀疏训练的现有局限性
    - 智能电网案例证实了技术在多代理系统中的实际应用价值
