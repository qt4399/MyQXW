    title_en: 'The Two Faces of AI in Green Mobile Computing: A Literature Review'
    title_zh: 绿色移动计算中AI的双重面孔：文献综述
    pdf_url: https://arxiv.org/pdf/2308.04436v1.pdf
    summary_en: "Artificial intelligence is bringing ever new functionalities to the\
      \ realm of mobile devices that are now considered essential (e.g., camera and\
      \ voice assistants, recommender systems). Yet, operating artificial intelligence\
      \ takes up a substantial amount of energy. However, artificial intelligence\
      \ is also being used to enable more energy-efficient solutions for mobile systems.\
      \ Hence, artificial intelligence has two faces in that regard, it is both a\
      \ key enabler of desired (efficient) mobile functionalities and a major power\
      \ draw on these devices, playing a part in both the solution and the problem.\
      \ In this paper, we present a review of the literature of the past decade on\
      \ the usage of artificial intelligence within the realm of green mobile computing.\
      \ From the analysis of 34 papers, we highlight the emerging patterns and map\
      \ the field into 13 main topics that are summarized in details.\n  Our results\
      \ showcase that the field is slowly increasing in the past years, more specifically,\
      \ since 2019. Regarding the double impact AI has on the mobile energy consumption,\
      \ the energy consumption of AI-based mobile systems is under-studied in comparison\
      \ to the usage of AI for energy-efficient mobile computing, and we argue for\
      \ more exploratory studies in that direction. We observe that although most\
      \ studies are framed as solution papers (94%), the large majority do not make\
      \ those solutions publicly available to the community. Moreover, we also show\
      \ that most contributions are purely academic (28 out of 34 papers) and that\
      \ we need to promote the involvement of the mobile software industry in this\
      \ field."
    summary_zh: 人工智能为现代移动设备提供了相机助手、语音交互和推荐系统等关键功能，但其运行过程消耗大量能量，同时AI技术也被用于设计更节能的移动系统解决方案，形成双重角色：既是功能使能者，又是主要功耗源。本研究系统回顾了过去十年绿色移动计算领域的34篇核心文献，揭示了研究趋势并划分为13个主题，包括AI能耗建模、动态资源调度及硬件协同优化等。分析显示，该领域自2019年起缓慢增长，但针对AI系统自身能耗的研究严重不足，远少于利用AI实现节能的探索，亟需加强实证性研究。94%的论文虽提出解决方案，却未公开代码或模型，限制了实际应用；28篇纯学术研究凸显行业参与缺失，移动软件企业贡献有限。综述指出，当前工作过度侧重理论验证，缺乏真实设备测试和标准化评估指标。建议未来研究应平衡AI功能与能耗，推动开源实践并促进产学研合作，以解决移动设备中AI驱动的功耗矛盾，实现可持续绿色计算发展。
    key_points_zh:
    - AI在移动设备中具双重角色：提供必需功能但消耗大量能量，同时用于节能方案设计
    - 文献综述分析34篇论文，识别13个研究主题，自2019年起领域缓慢增长
    - AI系统自身能耗研究不足，相比AI用于节能的研究存在显著差距
    - 94%的解决方案未公开，限制社区复现和实际应用
    - 28篇纯学术论文表明行业参与度低，需加强移动软件企业合作
    - 呼吁更多探索性研究、开源实践及标准化评估以推动绿色移动计算
