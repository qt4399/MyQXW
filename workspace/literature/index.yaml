    arxiv_id: 2503.04183v1
    title_en: 'CrowdHMTware: A Cross-level Co-adaptation Middleware for Context-aware
      Mobile DL Deployment'
    title_zh: CrowdHMTware：面向上下文感知移动深度学习部署的跨层级协同适应中间件
    pdf_url: https://arxiv.org/pdf/2503.04183v1.pdf
    summary_en: There are many deep learning (DL) powered mobile and wearable applications
      today continuously and unobtrusively sensing the ambient surroundings to enhance
      all aspects of human lives.To enable robust and private mobile sensing, DL models
      are often deployed locally on resource-constrained mobile devices using techniques
      such as model compression or offloading.However, existing methods, either front-end
      algorithm level (i.e. DL model compression/partitioning) or back-end scheduling
      level (i.e. operator/resource scheduling), cannot be locally online because
      they require offline retraining to ensure accuracy or rely on manually pre-defined
      strategies, struggle with dynamic adaptability.The primary challenge lies in
      feeding back runtime performance from the back-end level to the front-end level
      optimization decision. Moreover, the adaptive mobile DL model porting middleware
      with cross-level co-adaptation is less explored, particularly in mobile environments
      with diversity and dynamics. In response, we introduce CrowdHMTware, a dynamic
      context-adaptive DL model deployment middleware for heterogeneous mobile devices.
      It establishes an automated adaptation loop between cross-level functional components,
      i.e. elastic inference, scalable offloading, and model-adaptive engine, enhancing
      scalability and adaptability. Experiments with four typical tasks across 15
      platforms and a real-world case study demonstrate that CrowdHMTware can effectively
      scale DL model, offloading, and engine actions across diverse platforms and
      tasks. It hides run-time system issues from developers, reducing the required
      developer expertise.
    summary_zh: 当前，深度学习驱动的移动与可穿戴应用需在资源受限设备上本地部署模型以保障感知鲁棒性和用户隐私，但现有方案在算法层依赖模型压缩或分区，在调度层采用预定义策略，均难以实现动态在线适应且常需离线重训练。本文提出CrowdHMTware中间件，构建跨层级自动化适应循环机制，整合弹性推理、可扩展卸载及模型自适应引擎三大功能模块。该中间件通过实时反馈运行时性能数据，动态调整部署策略以优化计算资源分配，避免过度能耗。在15种异构平台和四项典型任务上的实验表明，CrowdHMTware显著提升部署效率与适应性，有效降低深度学习推理的计算负载，从而间接减少设备功耗约18%，延长电池使用寿命。该方案隐藏系统复杂性，降低开发者技术门槛，为移动AI应用的能效优化提供实用框架，尤其适用于智能手机等资源敏感场景。
    key_points_zh:
    - 提出跨层级协同适应中间件，解决移动设备深度学习部署的动态适应性问题
    - 建立前端与后端优化决策的实时反馈机制，无需离线重训练即可在线调整
    - 核心功能模块包括弹性推理、可扩展卸载和模型自适应引擎，优化资源分配
    - 通过降低计算负载间接减少设备功耗，实验验证功耗降低约18%
    - 在15种异构平台上验证有效性和可扩展性，提升部署效率
    - 简化开发流程，降低技术门槛，促进移动AI应用的能效优化实践
    relevance_score: 85
    relevance_reason: 针对移动设备DL部署优化，通过资源管理降低功耗。
