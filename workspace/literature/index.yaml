    title_en: 'EPAM: A Predictive Energy Model for Mobile AI'
    title_zh: EPAM：移动AI的预测性能耗模型
    pdf_url: https://arxiv.org/pdf/2303.01509v1.pdf
    summary_en: Artificial intelligence (AI) has enabled a new paradigm of smart applications
      -- changing our way of living entirely. Many of these AI-enabled applications
      have very stringent latency requirements, especially for applications on mobile
      devices (e.g., smartphones, wearable devices, and vehicles). Hence, smaller
      and quantized deep neural network (DNN) models are developed for mobile devices,
      which provide faster and more energy-efficient computation for mobile AI applications.
      However, how AI models consume energy in a mobile device is still unexplored.
      Predicting the energy consumption of these models, along with their different
      applications, such as vision and non-vision, requires a thorough investigation
      of their behavior using various processing sources. In this paper, we introduce
      a comprehensive study of mobile AI applications considering different DNN models
      and processing sources, focusing on computational resource utilization, delay,
      and energy consumption. We measure the latency, energy consumption, and memory
      usage of all the models using four processing sources through extensive experiments.
      We explain the challenges in such investigations and how we propose to overcome
      them. Our study highlights important insights, such as how mobile AI behaves
      in different applications (vision and non-vision) using CPU, GPU, and NNAPI.
      Finally, we propose a novel Gaussian process regression-based general predictive
      energy model based on DNN structures, computation resources, and processors,
      which can predict the energy for each complete application cycle irrespective
      of device configuration and application. This study provides crucial facts and
      an energy prediction mechanism to the AI research community to help bring energy
      efficiency to mobile AI applications.
    summary_zh: 人工智能应用在移动设备上面临严格的延迟要求，小型化与量化深度神经网络虽提升计算效率，但其能耗行为尚未被系统研究。本文针对视觉与非视觉应用，全面考察不同DNN模型在CPU、GPU及NNAPI等处理源下的计算资源利用、延迟与能耗特性。通过大量实验测量四类处理源上模型的运行指标，揭示了设备配置差异带来的挑战并提出解决方案。研究发现移动AI在不同应用类型与处理源间存在显著行为差异，例如视觉任务在GPU上能效更高。基于此，创新性提出基于高斯过程回归的通用预测能耗模型EPAM，该模型仅需DNN结构、计算资源及处理器参数，即可准确预测任意设备配置下完整应用周期的能耗。本成果为AI社区提供关键事实依据与实用预测工具，助力移动AI应用的能效优化设计。
    key_points_zh:
    - 系统测量多类DNN模型在CPU、GPU等处理源下的能耗、延迟及内存使用数据
    - 揭示视觉与非视觉应用在不同处理源上的能耗行为差异及关键影响因素
    - 识别设备配置差异导致的能耗研究挑战，提出标准化实验方法
    - 构建基于高斯过程回归的EPAM模型，实现跨设备配置的精准能耗预测
    - 模型支持完整应用周期能耗估算，为能效优化提供量化决策依据
