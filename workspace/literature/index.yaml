    title_en: Adaptive Energy Management for Self-Sustainable Wearables in Mobile
      Health
    title_zh: 面向移动健康的自适应能量管理实现可穿戴设备自维持
    pdf_url: https://arxiv.org/pdf/2201.07888v1.pdf
    summary_en: Wearable devices that integrate multiple sensors, processors, and
      communication technologies have the potential to transform mobile health for
      remote monitoring of health parameters. However, the small form factor of the
      wearable devices limits the battery size and operating lifetime. As a result,
      the devices require frequent recharging, which has limited their widespread
      adoption. Energy harvesting has emerged as an effective method towards sustainable
      operation of wearable devices. Unfortunately, energy harvesting alone is not
      sufficient to fulfill the energy requirements of wearable devices. This paper
      studies the novel problem of adaptive energy management towards the goal of
      self-sustainable wearables by using harvested energy to supplement the battery
      energy and to reduce manual recharging by users. To solve this problem, we propose
      a principled algorithm referred as AdaEM. There are two key ideas behind AdaEM.
      First, it uses machine learning (ML) methods to learn predictive models of user
      activity and energy usage patterns. These models allow us to estimate the potential
      of energy harvesting in a day as a function of the user activities. Second,
      it reasons about the uncertainty in predictions and estimations from the ML
      models to optimize the energy management decisions using a dynamic robust optimization
      (DyRO) formulation. We propose a light-weight solution for DyRO to meet the
      practical needs of deployment. We validate the AdaEM approach on a wearable
      device prototype consisting of solar and motion energy harvesting using real-world
      data of user activities. Experiments show that AdaEM achieves solutions that
      are within 5% of the optimal with less than 0.005% execution time and energy
      overhead.
    summary_zh: 可穿戴设备集成了多种传感器、处理器和通信技术，在移动健康领域具有变革远程健康参数监测的潜力。然而，设备的小型化设计严重限制了电池容量和运行寿命，导致频繁充电需求，阻碍了大规模普及。能量收集技术虽被视为可持续运行的有效途径，但单独应用往往无法完全满足设备能量需求。本文针对这一挑战，研究了自适应能量管理问题，目标是通过收集能量补充电池能量，显著减少用户手动充电频率。为此，提出AdaEM算法：首先，采用机器学习方法构建用户活动和能量使用模式的预测模型，以估计基于用户活动的每日能量收集潜力；其次，针对模型预测中的不确定性，运用动态鲁棒优化框架优化能量管理决策，并设计轻量级求解方案以适应实际部署约束。在集成太阳能和运动能量收集的可穿戴设备原型上，利用真实用户活动数据进行了全面验证。实验结果表明，AdaEM能提供接近最优解（误差在5%以内）的方案，同时执行时间和能量开销极低（低于0.005%），有效提升了设备自维持能力，为移动健康应用中的功耗优化提供了新思路。
    key_points_zh:
    - 提出AdaEM算法，结合机器学习预测用户活动和能量使用模式，动态估计能量收集潜力
    - 利用动态鲁棒优化处理预测不确定性，优化能量分配决策以减少手动充电需求
    - 设计轻量级求解方案，确保算法在资源受限设备上的低开销和实时部署可行性
    - 在真实可穿戴设备原型上验证，集成太阳能和运动能量收集技术
    - 实验显示方案接近最优解（5%误差内），执行时间和能量开销低于0.005%
    - 显著提升设备自维持能力，为移动健康领域功耗管理提供实用解决方案
