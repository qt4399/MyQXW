    pdf_url: https://arxiv.org/pdf/1810.01732v1.pdf
    summary_en: The Low-Power Image Recognition Challenge (LPIRC, https://rebootingcomputing.ieee.org/lpirc)
      is an annual competition started in 2015. The competition identifies the best
      technologies that can classify and detect objects in images efficiently (short
      execution time and low energy consumption) and accurately (high precision).
      Over the four years, the winners' scores have improved more than 24 times. As
      computer vision is widely used in many battery-powered systems (such as drones
      and mobile phones), the need for low-power computer vision will become increasingly
      important. This paper summarizes LPIRC 2018 by describing the three different
      tracks and the winners' solutions.
    summary_zh: 低功耗图像识别挑战赛（LPIRC）自2015年起作为年度国际竞赛举办，核心目标是发掘能在图像分类与目标检测任务中实现高效能（执行时间短、能耗低）与高精度（识别准确率高）的先进计算机视觉技术。随着竞赛持续开展，参赛技术性能显著提升，过去四年内获胜者综合评分增长超过24倍，充分反映该领域技术的飞速进步。鉴于计算机视觉在无人机、智能手机等电池供电系统中的广泛应用，开发低功耗视觉算法已成为当前研究热点和未来发展的关键方向。本文系统性地总结2018年LPIRC赛事，详细描述竞赛设立的三个技术赛道（包括图像分类、目标检测和能效优化）及其具体规则，并深入分析各赛道获胜团队的创新解决方案。这些成果不仅展示了低功耗AI技术的最新进展，还为移动设备节能优化提供了实践指导和宝贵参考，对推动电池供电系统的可持续发展具有重要意义。
    key_points_zh:
    - LPIRC是2015年启动的年度竞赛，聚焦低功耗高效的图像识别技术开发。
    - 竞赛评估标准涵盖执行时间短、能耗低和识别精度高三大核心指标。
    - 四年内获胜成绩提升24倍以上，体现低功耗AI技术的快速演进。
    - 低功耗计算机视觉对手机、无人机等电池供电系统至关重要。
    - 本文全面总结2018年赛事，详细解析三个技术赛道的设置与要求。
    - 深入探讨获胜方案，为后续移动AI节能研究提供实践参考。
