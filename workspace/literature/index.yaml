    title_en: 'EARL: Energy-Aware Optimization of Liquid State Machines for Pervasive
      AI'
    title_zh: EARL：面向普适AI的液态状态机能量感知优化方法
    pdf_url: https://arxiv.org/pdf/2601.05205v1.pdf
    summary_en: Pervasive AI increasingly depends on on-device learning systems that
      deliver low-latency and energy-efficient computation under strict resource constraints.
      Liquid State Machines (LSMs) offer a promising approach for low-power temporal
      processing in pervasive and neuromorphic systems, but their deployment remains
      challenging due to high hyperparameter sensitivity and the computational cost
      of traditional optimization methods that ignore energy constraints. This work
      presents EARL, an energy-aware reinforcement learning framework that integrates
      Bayesian optimization with an adaptive reinforcement learning based selection
      policy to jointly optimize accuracy and energy consumption. EARL employs surrogate
      modeling for global exploration, reinforcement learning for dynamic candidate
      prioritization, and an early termination mechanism to eliminate redundant evaluations,
      substantially reducing computational overhead. Experiments on three benchmark
      datasets demonstrate that EARL achieves 6 to 15 percent higher accuracy, 60
      to 80 percent lower energy consumption, and up to an order of magnitude reduction
      in optimization time compared to leading hyperparameter tuning frameworks. These
      results highlight the effectiveness of energy-aware adaptive search in improving
      the efficiency and scalability of LSMs for resource-constrained on-device AI
      applications.
    summary_zh: 普适人工智能系统日益依赖设备端学习，以在严格资源约束下实现低延迟和高能效计算。液态状态机（LSMs）为普适和神经形态系统中的低功耗时间处理提供了潜力，但其部署受限于高超参数敏感性和传统优化方法忽略能量约束的问题。本文提出EARL框架，一种能量感知强化学习方法，将贝叶斯优化与自适应强化学习选择策略相结合，以联合优化模型准确性和能耗。该框架利用代理模型进行全局探索，通过强化学习动态优先级排序候选参数，并引入早期终止机制消除冗余评估，显著降低计算开销。在三个基准数据集上的实验表明，与领先超参数调优框架相比，EARL实现了6%至15%的更高准确性、60%至80%的更低能耗，以及优化时间高达一个数量级的减少。这些成果验证了能量感知自适应搜索在提升资源受限设备端AI应用中LSMs效率和可扩展性方面的关键作用，为手机等移动设备系统功耗优化提供了实用路径。
    key_points_zh:
    - EARL框架整合贝叶斯优化和强化学习，实现能量感知的超参数联合优化，有效降低设备端AI能耗。
    - 采用代理模型进行全局探索，结合强化学习动态调整候选参数优先级，提升搜索效率并减少计算负担。
    - 引入早期终止机制消除冗余评估，大幅降低优化过程中的计算开销，适应手机系统资源限制。
    - 实验验证在多个数据集上显著提升准确性6-15%，同时降低能耗60-80%，优于现有方法。
    - 优化时间减少高达90%，加速模型部署，为手机AI系统功耗管理提供高效解决方案。
