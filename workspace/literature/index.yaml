    arxiv_id: 2212.12620v1
    title_en: 'Mantis: Enabling Energy-Efficient Autonomous Mobile Agents with Spiking
      Neural Networks'
    title_zh: Mantis：利用脉冲神经网络实现节能自主移动智能体
    pdf_url: https://arxiv.org/pdf/2212.12620v1.pdf
    summary_en: Autonomous mobile agents such as unmanned aerial vehicles (UAVs) and
      mobile robots have shown huge potential for improving human productivity. These
      mobile agents require low power/energy consumption to have a long lifespan since
      they are usually powered by batteries. These agents also need to adapt to changing/dynamic
      environments, especially when deployed in far or dangerous locations, thus requiring
      efficient online learning capabilities. These requirements can be fulfilled
      by employing Spiking Neural Networks (SNNs) since SNNs offer low power/energy
      consumption due to sparse computations and efficient online learning due to
      bio-inspired learning mechanisms. However, a methodology is still required to
      employ appropriate SNN models on autonomous mobile agents. Towards this, we
      propose a Mantis methodology to systematically employ SNNs on autonomous mobile
      agents to enable energy-efficient processing and adaptive capabilities in dynamic
      environments. The key ideas of our Mantis include the optimization of SNN operations,
      the employment of a bio-plausible online learning mechanism, and the SNN model
      selection. The experimental results demonstrate that our methodology maintains
      high accuracy with a significantly smaller memory footprint and energy consumption
      (i.e., 3.32x memory reduction and 2.9x energy saving for an SNN model with 8-bit
      weights) compared to the baseline network with 32-bit weights. In this manner,
      our Mantis enables the employment of SNNs for resource- and energy-constrained
      mobile agents.
    summary_zh: 自主移动智能体如无人机和移动机器人通常由电池供电，需低功耗以延长使用寿命，并能适应动态环境，尤其在远程或危险区域部署时需高效在线学习能力。脉冲神经网络（SNN）因其稀疏计算和生物启发学习机制，能提供低功耗处理及高效在线学习。然而，缺乏系统化方法将SNN应用于移动智能体。本文提出Mantis方法，系统化部署SNN于自主移动智能体，以实现动态环境中的节能处理和自适应能力。Mantis的核心包括优化SNN操作以提升计算效率、采用生物可解释的在线学习机制增强环境适应性、以及基于任务需求的SNN模型选择策略。实验结果表明，与32位权重基线网络相比，Mantis在保持高准确率的同时，显著减少内存占用（8位权重SNN模型内存减少3.32倍）和能耗（能耗节省2.9倍），从而为资源受限的移动智能体提供可行的SNN部署方案，有效平衡性能与资源消耗。
    key_points_zh:
    - Mantis系统化部署SNN于自主移动智能体，支持动态环境中的节能与自适应能力
    - 优化SNN操作流程，提升计算效率并降低资源开销
    - 采用生物可解释的在线学习机制，增强智能体对环境变化的实时适应性
    - 基于任务需求进行SNN模型选择，确保高效资源利用
    - 实验显示8位权重模型内存减少3.32倍，能耗节省2.9倍
    - 在保持高准确率的同时，显著降低移动智能体的功耗和存储需求
