    title_en: 'Twill: Scheduling Compound AI Systems on Heterogeneous Mobile Edge
      Platforms'
    title_zh: Twill：异构移动边缘平台上复合AI系统的调度框架
    pdf_url: https://arxiv.org/pdf/2507.00491v1.pdf
    summary_en: Compound AI (cAI) systems chain multiple AI models to solve complex
      problems. cAI systems are typically composed of deep neural networks (DNNs),
      transformers, and large language models (LLMs), exhibiting a high degree of
      computational diversity and dynamic workload variation. Deploying cAI services
      on mobile edge platforms poses a significant challenge in scheduling concurrent
      DNN-transformer inference tasks, which arrive dynamically in an unknown sequence.
      Existing mobile edge AI inference strategies manage multi-DNN or transformer-only
      workloads, relying on design-time profiling, and cannot handle concurrent inference
      of DNNs and transformers required by cAI systems. In this work, we address the
      challenge of scheduling cAI systems on heterogeneous mobile edge platforms.
      We present Twill, a run-time framework to handle concurrent inference requests
      of cAI workloads through task affinity-aware cluster mapping and migration,
      priority-aware task freezing/unfreezing, and DVFS, while minimizing inference
      latency within power budgets. We implement and deploy our Twill framework on
      the Nvidia Jetson Orin NX platform. We evaluate Twill against state-of-the-art
      edge AI inference techniques over contemporary DNNs and LLMs, reducing inference
      latency by 54% on average, while honoring power budgets.
    summary_zh: 复合AI（cAI）系统通过链式连接深度神经网络、Transformer和大语言模型等组件解决复杂问题，其计算多样性高且工作负载动态变化，给移动边缘平台部署带来调度挑战。现有方法仅支持单一类型模型推理，无法处理cAI所需的并发DNN-Transformer任务调度。本文提出Twill运行时框架，创新性地结合任务亲和性感知集群映射与迁移、优先级感知任务冻结/解冻机制以及动态电压频率调整技术，在严格功耗预算约束下最小化推理延迟。该框架在Nvidia
      Jetson Orin NX平台实现并验证，针对现代DNN和LLM工作负载进行测试，相比前沿边缘AI推理技术，平均降低推理延迟54%，同时确保功耗不超标。研究解决了移动设备上复合AI服务的实时调度难题，为低功耗边缘计算提供了实用方案，显著提升能效比。
    key_points_zh:
    - Twill框架专为移动边缘平台设计，解决复合AI系统并发推理的动态调度挑战
    - 采用任务亲和性感知集群映射技术优化异构计算资源分配
    - 引入优先级感知任务冻结/解冻机制动态管理任务执行顺序
    - 结合动态电压频率调整在功耗预算内最小化推理延迟
    - 在Jetson Orin NX平台实测平均降低延迟54%，验证高效节能性
    - 克服现有方法仅支持单一模型类型的局限，支持DNN与Transformer混合负载
