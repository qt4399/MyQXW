    title_en: Adaptive Predictive Power Management for Mobile LTE Devices
    title_zh: 面向移动LTE设备的自适应预测功耗管理
    pdf_url: https://arxiv.org/pdf/1907.02774v1.pdf
    summary_en: Reducing the energy consumption of mobile phones is a crucial design
      goal for cellular modem solutions for LTE and 5G standards. In addition to improving
      the power efficiency of components through structural and technological advances,
      optimizing the energy efficiency through improved dynamic power management is
      an integral part in contemporary hardware design. Most techniques targeting
      mobile devices proposed so far, however, are purely reactive in powering down
      and up system components. Promising approaches extend this, by predicting and
      using information from the environment and the communication protocol to take
      proactive decisions. In this paper, we propose and compare two proactive algorithmic
      approaches for light-weight machine learning to predict the control information
      needed to allow a mobile device to go to sleep states more often, e.g., in time
      slots of transmission inactivity in a cell. The first approach is based on supervised
      learning, the second one based on reinforcement learning. As the implementation
      of learning techniques also creates energy and resource costs, both approaches
      are carefully evaluated not only in terms of prediction accuracy, but also overall
      energy savings. Using the presented technique, we observe achievable energy
      savings of up to 17%.
    summary_zh: 降低手机能耗是LTE和5G标准下蜂窝调制解调器设计的核心目标之一。当前硬件设计不仅依赖组件结构和工艺改进提升功耗效率，还需优化动态功耗管理策略以增强能源利用。然而，现有移动设备功耗管理技术多采用反应式机制，仅在系统空闲时被动上下电，缺乏前瞻性。本文创新性地提出主动式功耗管理框架，通过预测环境信息和通信协议状态实现智能决策。具体设计并对比了两种轻量级机器学习算法：基于监督学习的预测模型和基于强化学习的自适应策略，用于精准识别传输空闲时隙，使设备更频繁进入低功耗睡眠状态。考虑到机器学习实现本身会带来额外能耗，研究全面评估了预测精度与净能耗节省的平衡关系。实验表明，该技术在保证系统稳定性的前提下，可实现高达17%的能源节省，显著延长移动设备电池续航，为5G时代智能功耗管理提供了实用化路径。
    key_points_zh:
    - 提出主动式功耗管理框架，利用预测技术优化移动设备睡眠状态触发机制
    - 设计两种轻量级机器学习算法：监督学习用于历史数据分析，强化学习实现动态自适应决策
    - 重点评估预测准确性与净能耗节省的平衡，避免学习开销抵消节能收益
    - 实验验证在LTE设备中可实现最高17%的能源节省，提升电池续航能力
    - 适用于5G移动通信场景，解决传统反应式管理的滞后性问题
    - 为未来AI驱动的智能功耗管理提供可扩展的技术基础
