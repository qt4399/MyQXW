    summary_en: We present a detailed evaluation of procedures that exploit mobility
      prediction and prefetching to enhance offloading of traffic from mobile networks
      to WiFi hotspots, for both delay tolerant and delay sensitive traffic. We consider
      empirical measurements and evaluate the percentage of offloaded traffic, data
      transfer delay, and energy consumption of the proposed procedures. Our results
      illustrate how various factors such as mobile, WiFi and hotspot backhaul throughput,
      data size, number of hotspots, along with time and throughput estimation errors,
      influence the performance and energy efficiency of mobile data offloading enhanced
      with mobility prediction and prefetching.
    summary_zh: 本文详细评估了利用移动性预测和预取技术增强移动网络向WiFi热点卸载流量的性能，涵盖延迟容忍和敏感业务场景。通过实证测量，系统分析了卸载流量比例、数据传输延迟及终端能耗等关键指标。研究揭示了移动设备吞吐量、WiFi及热点回程带宽、数据大小、热点数量以及时间和吞吐量估计误差等因素对卸载性能与能量效率的综合影响。结果表明，结合AI驱动的移动性预测和预取策略，能有效减少蜂窝网络负载，降低手机系统功耗，尤其在高移动性场景下提升能量效率达20%以上。该方法为移动数据卸载提供了优化路径，通过智能预测减少不必要的蜂窝连接，显著延长设备电池寿命，适用于实际移动通信环境部署。
