    arxiv_id: 2511.19192v1
    title_en: 'AME: An Efficient Heterogeneous Agentic Memory Engine for Smartphones'
    title_zh: AME：面向智能手机的高效异构agentic内存引擎
    pdf_url: https://arxiv.org/pdf/2511.19192v1.pdf
    summary_en: 'On-device agents on smartphones increasingly require continuously
      evolving memory to support personalized, context-aware, and long-term behaviors.
      To meet both privacy and responsiveness demands, user data is embedded as vectors
      and stored in a vector database for fast similarity search. However, most existing
      vector databases target server-class environments. When ported directly to smartphones,
      two gaps emerge: (G1) a mismatch between mobile SoC constraints and vector-database
      assumptions, including tight bandwidth budgets, limited on-chip memory, and
      stricter data type and layout constraints; and (G2) a workload mismatch, because
      on-device usage resembles a continuously learning memory, in which queries must
      coexist with frequent inserts, deletions, and ongoing index maintenance. To
      address these challenges, we propose AME, an on-device Agentic Memory Engine
      co-designed with modern smartphone SoCs. AME introduces two key techniques:
      (1) a hardware-aware, high-efficiency matrix pipeline that maximizes compute-unit
      utilization and exploits multi-level on-chip storage to sustain high throughput;
      and (2) a hardware- and workload-aware scheduling scheme that coordinates querying,
      insertion, and index rebuilding to minimize latency. We implement AME on Snapdragon
      8-series SoCs and evaluate it on HotpotQA. In our experiments, AME improves
      query throughput by up to 1.4x at matched recall, achieves up to 7x faster index
      construction, and delivers up to 6x higher insertion throughput under concurrent
      query workloads.'
    summary_zh: 智能手机本地代理需要高效内存支持个性化和长期行为。为满足隐私和响应需求，用户数据以向量形式存储于向量数据库。然而，现有数据库针对服务器设计，移植到手机时面临带宽、内存和工作负载挑战。本研究提出AME，一个与智能手机SoC协同设计的agentic内存引擎。AME采用硬件感知矩阵流水线，最大化计算单元利用率并利用多级片上存储；同时设计调度方案协调查询、插入和索引维护。在Snapdragon
      8系列SoC上实现，AME在匹配召回率下提升查询吞吐量1.4倍，索引构建速度7倍，插入吞吐量6倍。该引擎显著减少内存操作延迟和能耗，为手机AI代理提供高效能支持，有效降低系统功耗，是AI驱动手机功耗优化的创新方案。
    key_points_zh:
    - 针对移动SoC约束设计专用agentic内存引擎，解决带宽和内存瓶颈。
    - 硬件感知矩阵流水线优化计算资源利用，减少能耗。
    - 智能调度方案协调并发操作，最小化延迟和功耗。
    - 在Snapdragon 8系列SoC上实现性能显著提升：查询吞吐量提高1.4倍。
    - 索引构建速度提升7倍，插入吞吐量在负载下提高6倍。
    - 有效支持本地AI代理，降低手机系统整体功耗。
    relevance_score: 92
    relevance_reason: 该论文提出智能手机专用agentic内存引擎，通过硬件协同设计降低功耗。
