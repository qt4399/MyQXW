    title_en: 'Advancing Mobile GUI Agents: A Verifier-Driven Approach to Practical
      Deployment'
    title_zh: 推进移动GUI代理：一种基于验证器的实用部署方法
    pdf_url: https://arxiv.org/pdf/2503.15937v5.pdf
    summary_en: 'We propose V-Droid, a mobile GUI task automation agent. Unlike previous
      mobile agents that utilize Large Language Models (LLMs) as generators to directly
      generate actions at each step, V-Droid employs LLMs as verifiers to evaluate
      candidate actions before making final decisions. To realize this novel paradigm,
      we introduce a comprehensive framework for constructing verifier-driven mobile
      agents: the discretized action space construction coupled with the prefilling-only
      workflow to accelerate the verification process, the pair-wise progress preference
      training to significantly enhance the verifier''s decision-making capabilities,
      and the scalable human-agent joint annotation scheme to efficiently collect
      the necessary data at scale. V-Droid obtains a substantial task success rate
      across several public mobile task automation benchmarks: 59.5% on AndroidWorld,
      38.3% on AndroidLab, and 49% on MobileAgentBench, surpassing existing agents
      by 5.2%, 2.1%, and 9%, respectively. Furthermore, V-Droid achieves a remarkably
      low latency of 4.3s per step, which is 6.1x faster compared with existing mobile
      agents. The source code is available at https://github.com/V-Droid-Agent/V-Droid.'
    summary_zh: 本文提出V-Droid，一种创新的移动GUI任务自动化代理，采用基于验证器的范式替代传统生成式方法。V-Droid利用大型语言模型（LLMs）作为验证器，在最终决策前评估候选动作，从而提升任务成功率和系统能效。通过离散化动作空间构建、预填充工作流加速验证过程、成对进度偏好训练增强决策能力，以及可扩展的人机联合标注方案，V-Droid在多个公共基准测试中表现卓越：AndroidWorld上59.5%、AndroidLab上38.3%、MobileAgentBench上49%的成功率，分别超越现有代理5.2%、2.1%和9%。尤为关键的是，其实现了每步4.3秒的极低延迟，比现有移动代理快6.1倍，大幅缩短设备运行时间，直接减少CPU和GPU的持续负载，有效降低系统功耗。该方法的高效性使其在实际部署中显著节省能源，源代码已公开以支持进一步优化。
    key_points_zh:
