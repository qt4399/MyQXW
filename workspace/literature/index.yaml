    arxiv_id: 2012.10246v1
    title_en: Building Energy Consumption Models Based On Smartphone User's Usage
      Patterns
    title_zh: 基于智能手机用户使用模式的能耗模型构建
    pdf_url: https://arxiv.org/pdf/2012.10246v1.pdf
    summary_en: The increasing usage of smartphones in everyday tasks has been motivated
      many studies on energy consumption characterization aiming to improve smartphone
      devices' effectiveness and increase user usage time. In this scenario, it is
      essential to study mechanisms capable of characterizing user usage patterns,
      so smartphones' components can be adapted to promote the best user experience
      with lower energy consumption. The goal of this study is to build an energy
      consumption model based on user usage patterns aiming to provide the best accurate
      model to be used by application developers and automated optimization. To develop
      the energy consumption models, we established a method to identify the components
      with the most influence in the smartphone's energy consumption and identify
      the states of each influential device. Besides that, we established a method
      to prove the robustness of the models constructed using inaccurate hardware
      and a strategy to assess the accuracy of the model built. After training and
      testing each strategy to model the energy consumption based on the user's usage
      and perform the Nemenyi test, we demonstrated that it is possible to get a Mean
      Absolute Error of 158.57mW when the smartphone's average power is 1970.1mW.
      Some studies show that the leading smartphone's workload is the user. Based
      on this fact, we developed an automatic model building methodology that is capable
      of analyzing the user's usage data and build smart models that can estimate
      the smartphone's energy consumption based on the user's usage pattern. With
      the automatic model building methodology, we can adopt strategies to minimize
      the usage of components that drain the battery.
    summary_zh: 随着智能手机使用普及，能耗优化对提升设备效能和延长使用时间至关重要。本研究构建基于用户使用模式的能耗模型，为应用开发者和自动优化提供依据。我们识别了影响手机能耗的关键组件及其状态，并验证了模型在硬件不准确条件下的鲁棒性。通过分析用户数据，开发了自动模型构建方法，能生成智能能耗模型。实验表明，当手机平均功耗为1970.1mW时，模型平均绝对误差低至158.57mW。该模型可识别高耗电组件，指导优化策略，如减少屏幕亮屏时间或调整后台进程，从而有效降低系统功耗，延长电池续航。本方法为AI驱动的手机功耗降低提供了数据基础。
    key_points_zh:
    - 识别智能手机中主要能耗组件及其工作状态特征。
    - 开发自动模型构建方法，基于用户数据生成个性化能耗模型。
    - 模型在平均功耗1970.1mW时误差仅158.57mW。
    - 验证模型在硬件限制下的鲁棒性和准确性。
    - 通过分析使用模式，优化组件调度以减少能耗。
    - 为应用层提供工具，实现针对性的功耗降低策略。
