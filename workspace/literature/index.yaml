    arxiv_id: 2011.05708v3
    title_en: Optimizing AI Service Placement and Resource Allocation in Mobile Edge
      Intelligence Systems
    title_zh: 移动边缘智能系统中AI服务放置与资源分配的优化
    pdf_url: https://arxiv.org/pdf/2011.05708v3.pdf
    summary_en: Leveraging recent advances on mobile edge computing (MEC), edge intelligence
      has emerged as a promising paradigm to support mobile artificial intelligence
      (AI) applications at the network edge. In this paper, we consider the AI service
      placement problem in a multi-user MEC system, where the access point (AP) places
      the most up-to-date AI program at user devices to enable local computing/task
      execution at the user side. To fully utilize the stringent wireless spectrum
      and edge computing resources, the AP sends the AI service program to a user
      only when enabling local computing at the user yields a better system performance.
      We formulate a mixed-integer non-linear programming (MINLP) problem to minimize
      the total computation time and energy consumption of all users by jointly optimizing
      the service placement (i.e., which users to receive the program) and resource
      allocation (on local CPU frequencies, uplink bandwidth, and edge CPU frequency).
      To tackle the MINLP problem, we derive analytical expressions to calculate the
      optimal resource allocation decisions with low complexity. This allows us to
      efficiently obtain the optimal service placement solution by search-based algorithms
      such as meta-heuristic or greedy search algorithms. To enhance the algorithm
      scalability in large-sized networks, we further propose an ADMM (alternating
      direction method of multipliers) based method to decompose the optimization
      problem into parallel tractable MINLP subproblems. The ADMM method eliminates
      the need of searching in a high-dimensional space for service placement decisions
      and thus has a low computational complexity that grows linearly with the number
      of users. Simulation results show that the proposed algorithms perform extremely
      close to the optimum and significantly outperform the other representative benchmark
      algorithms.
    summary_zh: 基于移动边缘计算（MEC）的边缘智能范式可有效支持移动AI应用，但需优化AI服务放置与资源分配以提升能效。本文针对多用户MEC系统，研究接入点如何智能决策向哪些用户设备推送最新AI程序以启用本地计算，仅在提升系统性能时才进行传输，从而充分利用有限无线频谱和边缘计算资源。我们构建混合整数非线性规划（MINLP）模型，联合优化服务放置（用户选择）和资源分配（本地CPU频率、上行带宽及边缘CPU频率），目标是最小化所有用户的总计算时间与能耗。为高效求解，推导解析表达式简化资源分配决策，并结合元启发式或贪婪搜索算法获取最优服务放置方案。进一步提出ADMM分解方法，将问题拆分为并行子问题，消除高维搜索需求，使计算复杂度随用户数线性增长。仿真验证算法性能接近理论最优，显著优于基准方法，为手机系统低功耗AI服务部署提供可扩展解决方案。
    key_points_zh:
    - 联合优化AI服务放置与资源分配，最小化移动用户的总计算能耗
    - 构建MINLP模型精准刻画服务决策与资源约束的耦合关系
    - 推导解析表达式降低资源分配复杂度，提升求解效率
    - ADMM分解方法实现问题并行化，计算复杂度线性增长
    - 仅在本地计算收益时推送服务，避免无效资源消耗
    - 仿真证明算法接近最优性能，显著降低系统功耗
