    title_en: 'MCDS: AI Augmented Workflow Scheduling in Mobile Edge Cloud Computing
      Systems'
    title_zh: MCDS：移动边缘云计算系统中AI增强的工作流调度
    pdf_url: https://arxiv.org/pdf/2112.07269v1.pdf
    summary_en: 'Workflow scheduling is a long-studied problem in parallel and distributed
      computing (PDC), aiming to efficiently utilize compute resources to meet user''s
      service requirements. Recently proposed scheduling methods leverage the low
      response times of edge computing platforms to optimize application Quality of
      Service (QoS). However, scheduling workflow applications in mobile edge-cloud
      systems is challenging due to computational heterogeneity, changing latencies
      of mobile devices and the volatile nature of workload resource requirements.
      To overcome these difficulties, it is essential, but at the same time challenging,
      to develop a long-sighted optimization scheme that efficiently models the QoS
      objectives. In this work, we propose MCDS: Monte Carlo Learning using Deep Surrogate
      Models to efficiently schedule workflow applications in mobile edge-cloud computing
      systems. MCDS is an Artificial Intelligence (AI) based scheduling approach that
      uses a tree-based search strategy and a deep neural network-based surrogate
      model to estimate the long-term QoS impact of immediate actions for robust optimization
      of scheduling decisions. Experiments on physical and simulated edge-cloud testbeds
      show that MCDS can improve over the state-of-the-art methods in terms of energy
      consumption, response time, SLA violations and cost by at least 6.13, 4.56,
      45.09 and 30.71 percent respectively.'
    summary_zh: 工作流调度是并行与分布式计算中的核心问题，旨在高效利用计算资源以满足用户服务质量需求。近年来，研究者利用边缘计算平台的低延迟特性优化应用QoS，但在移动边缘-云计算系统中，调度面临计算资源异构性、移动设备延迟动态变化及工作负载需求波动等挑战。为克服这些困难，亟需开发具有前瞻性的优化方案，以精准建模QoS目标。本文提出MCDS（蒙特卡洛学习使用深度代理模型），一种基于人工智能的工作流调度方法，该方法结合树状搜索策略与深度神经网络代理模型，实时估计即时调度决策对长期QoS的影响，从而实现鲁棒优化。在物理和模拟边缘-云测试平台上的实验表明，MCDS在能耗、响应时间、服务级别协议违规率和成本方面分别比现有最先进方法提升至少6.13%、4.56%、45.09%和30.71%。该方法通过智能资源分配显著降低移动设备功耗，尤其适用于手机系统在边缘计算场景下的节能需求，为AI驱动的低功耗调度提供了实用解决方案。
    key_points_zh:
    - MCDS方法融合蒙特卡洛学习与深度代理模型，实现工作流智能调度
    - 解决移动边缘-云系统中计算异构性和动态延迟导致的调度难题
    - 树搜索策略结合DNN代理模型预测长期QoS影响，优化决策
    - 实验验证在能耗指标上提升6.13%，显著降低手机系统运行功耗
    - 减少服务级别协议违规率达45.09%，提升资源利用效率
    - 适用于手机边缘计算场景，通过动态调度避免资源浪费
