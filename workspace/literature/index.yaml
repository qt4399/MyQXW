    arxiv_id: 2207.02052v1
    title_en: A Two-Timescale Approach to Mobility Management for Multi-Cell Mobile
      Edge Computing
    title_zh: 多小区移动边缘计算中的双时间尺度移动性管理方法
    pdf_url: https://arxiv.org/pdf/2207.02052v1.pdf
    summary_en: Mobile edge computing (MEC) is a promising technology for enhancing
      the computation capacities and features of mobile users by offloading complex
      computation tasks to the edge servers. However, mobility poses great challenges
      on delivering reliable MEC service required for latency-critical applications.
      First, mobility management has to tackle the dynamics of both user's location
      changes and task arrivals that vary in different timescales. Second, user mobility
      could induce service migration, leading to reliability loss due to the migration
      delay. In this paper, we propose a two-timescale mobility management framework
      by joint control of service migration and transmission power to address the
      above challenges. Specifically, the service migration operates at a large timescale
      to support user mobility in the multi-cell network, while the power control
      is performed at a small timescale for real-time task offloading. Their joint
      control is formulated as an optimization problem aiming at the long-term mobile
      energy minimization subject to the reliability requirement of computation offloading.
      To solve the problem, we propose a Lyapunov-based framework to decompose the
      problem into different timescales, based on which a low-complexity two-timescale
      online algorithm is developed by exploiting the problem structure. The proposed
      online algorithm is shown to be asymptotically optimal via theoretical analysis,
      and is further developed to accommodate the multiuser management. The simulation
      results demonstrate that our proposed algorithm can significantly improve the
      energy and reliability performance.
    summary_zh: 移动边缘计算（MEC）通过将复杂计算任务卸载至边缘服务器，有效提升移动用户的计算能力与功能体验。然而，用户移动性对低延迟关键应用的可靠服务构成双重挑战：一方面，移动性管理需应对用户位置变化与任务到达在不同时间尺度上的动态波动；另一方面，服务迁移可能因延迟导致可靠性下降。本文提出一种双时间尺度移动性管理框架，通过联合优化服务迁移与传输功率来解决上述问题。具体而言，服务迁移在大时间尺度上运行以适应多小区网络中的用户移动，而功率控制则在小时间尺度上实时调整任务卸载过程。该联合控制被建模为长期移动能量最小化优化问题，同时严格满足计算卸载的可靠性约束。基于Lyapunov理论，我们设计了问题分解框架，并据此开发出低复杂度的双时间尺度在线算法，充分利用问题结构特性。理论分析证实该算法具有渐近最优性，并进一步扩展至多用户场景。仿真结果表明，所提方法能显著降低系统能耗，同时提升服务可靠性，为AI驱动的手机功耗管理提供了有效技术路径。
    key_points_zh:
    - 提出双时间尺度框架，联合控制服务迁移与传输功率以优化手机系统功耗
    - 服务迁移在大时间尺度操作，有效应对多小区网络中的用户移动性挑战
    - 功率控制在小时间尺度执行，实现任务卸载过程的实时动态调整
    - 优化目标聚焦长期移动能量最小化，同时严格保障计算卸载的可靠性要求
    - 基于Lyapunov理论开发低复杂度在线算法，具备理论上的渐近最优性能
