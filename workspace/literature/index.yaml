    arxiv_id: 2309.13643v1
    title_en: 'REWAFL: Residual Energy and Wireless Aware Participant Selection for
      Efficient Federated Learning over Mobile Devices'
    title_zh: REWAFL：面向移动设备的节能高效联邦学习参与者选择机制
    pdf_url: https://arxiv.org/pdf/2309.13643v1.pdf
    summary_en: Participant selection (PS) helps to accelerate federated learning
      (FL) convergence, which is essential for the practical deployment of FL over
      mobile devices. While most existing PS approaches focus on improving training
      accuracy and efficiency rather than residual energy of mobile devices, which
      fundamentally determines whether the selected devices can participate. Meanwhile,
      the impacts of mobile devices' heterogeneous wireless transmission rates on
      PS and FL training efficiency are largely ignored. Moreover, PS causes the staleness
      issue. Prior research exploits isolated functions to force long-neglected devices
      to participate, which is decoupled from original PS designs. In this paper,
      we propose a residual energy and wireless aware PS design for efficient FL training
      over mobile devices (REWAFL). REW AFL introduces a novel PS utility function
      that jointly considers global FL training utilities and local energy utility,
      which integrates energy consumption and residual battery energy of candidate
      mobile devices. Under the proposed PS utility function framework, REW AFL further
      presents a residual energy and wireless aware local computing policy. Besides,
      REWAFL buries the staleness solution into its utility function and local computing
      policy. The experimental results show that REW AFL is effective in improving
      training accuracy and efficiency, while avoiding "flat battery" of mobile devices.
    summary_zh: 参与者选择对加速联邦学习收敛至关重要，但现有方法多聚焦训练精度而忽视设备剩余能量，后者直接决定设备能否持续参与。同时，移动设备异构无线传输速率对训练效率的影响常被忽略，且参与者选择易引发模型陈旧性问题。本文提出REWAFL机制，创新性设计剩余能量与无线感知的参与者选择框架。其核心是新型效用函数，联合优化全局训练目标与本地能量效用，整合设备能耗与剩余电量数据；在此基础上，制定无线感知的本地计算策略，动态调整任务分配。REWAFL将陈旧性解决方案内嵌于效用函数，避免传统孤立处理的脱节问题。实验表明，该机制显著提升训练精度与收敛速度，同时有效预防设备'电量耗尽'，为移动联邦学习提供可持续的能效优化方案，确保系统长期稳定运行。
    key_points_zh:
    - 现有参与者选择方法忽略设备剩余能量，导致部分设备无法持续参与训练。
    - 移动设备异构无线传输速率对训练效率的影响未被充分考虑。
    - REWAFL设计联合效用函数，同步优化全局训练目标与本地能量消耗。
    - 整合设备能耗与剩余电量数据，实现可持续的参与者选择机制。
    - 将陈旧性解决方案内嵌于效用函数，提升系统鲁棒性。
    - 实验验证能提高训练精度并避免设备电量耗尽问题。
