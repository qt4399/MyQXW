    arxiv_id: 2303.01826v2
    title_en: 'TopSpark: A Timestep Optimization Methodology for Energy-Efficient
      Spiking Neural Networks on Autonomous Mobile Agents'
    title_zh: TopSpark：一种用于自主移动智能体上节能脉冲神经网络的时间步优化方法
    pdf_url: https://arxiv.org/pdf/2303.01826v2.pdf
    summary_en: 'Autonomous mobile agents require low-power/energy-efficient machine
      learning (ML) algorithms to complete their ML-based tasks while adapting to
      diverse environments, as mobile agents are usually powered by batteries. These
      requirements can be fulfilled by Spiking Neural Networks (SNNs) as they offer
      low power/energy processing due to their sparse computations and efficient online
      learning with bio-inspired learning mechanisms for adapting to different environments.
      Recent works studied that the energy consumption of SNNs can be optimized by
      reducing the computation time of each neuron for processing a sequence of spikes
      (timestep). However, state-of-the-art techniques rely on intensive design searches
      to determine fixed timestep settings for only inference, thereby hindering the
      SNNs from achieving further energy efficiency gains in both training and inference.
      These techniques also restrict the SNNs from performing efficient online learning
      at run time. Toward this, we propose TopSpark, a novel methodology that leverages
      adaptive timestep reduction to enable energy-efficient SNN processing in both
      training and inference, while keeping its accuracy close to the accuracy of
      SNNs without timestep reduction. The ideas of TopSpark include: analyzing the
      impact of different timesteps on the accuracy; identifying neuron parameters
      that have a significant impact on accuracy in different timesteps; employing
      parameter enhancements that make SNNs effectively perform learning and inference
      using less spiking activity; and developing a strategy to trade-off accuracy,
      latency, and energy to meet the design requirements. The results show that,
      TopSpark saves the SNN latency by 3.9x as well as energy consumption by 3.5x
      (training) and 3.3x (inference) on average, across different network sizes,
      learning rules, and workloads, while maintaining the accuracy within 2% of SNNs
      without timestep reduction.'
    summary_zh: 自主移动智能体通常由电池供电，需低功耗机器学习算法以完成任务并适应多样化环境。脉冲神经网络（SNN）凭借稀疏计算和生物启发学习机制，能提供低功耗处理及高效在线学习能力。现有技术通过减少神经元处理脉冲序列的时间步优化SNN能耗，但依赖密集设计搜索确定固定时间步设置，仅适用于推理阶段，阻碍了训练和推理中的进一步节能，并限制了运行时的高效在线学习。为此，本文提出TopSpark方法，利用自适应时间步减少技术，在训练和推理中实现节能SNN处理，同时保持准确率接近无时间步减少的SNN。其核心思想包括：分析不同时间步对准确率的影响；识别关键神经元参数；采用参数增强策略减少脉冲活动以提升学习和推理效率；开发准确率、延迟和能量的权衡策略以满足设计需求。实验表明，TopSpark在不同网络规模、学习规则和工作负载下，平均节省延迟3.9倍，训练能耗降低3.5倍，推理能耗降低3.3倍，同时准确率维持在基准SNN的2%以内。
    key_points_zh:
    - TopSpark通过自适应时间步减少技术优化SNN能耗，适用于训练和推理双阶段
    - 分析时间步对准确率的影响并识别关键神经元参数，确保优化精准性
    - 采用参数增强策略减少脉冲活动，显著提升学习和推理效率
    - 开发准确率、延迟和能量的动态权衡策略，灵活满足设计需求
    - 实验验证平均延迟节省3.9倍，训练能耗降低3.5倍，推理能耗降低3.3倍
    - 在保持高准确率的同时，有效支持移动智能体的实时自适应能力
