    arxiv_id: 2404.09331v2
    title_en: 'SNN4Agents: A Framework for Developing Energy-Efficient Embodied Spiking
      Neural Networks for Autonomous Agents'
    title_zh: SNN4Agents：用于开发节能具身脉冲神经网络的自主代理框架
    pdf_url: https://arxiv.org/pdf/2404.09331v2.pdf
    summary_en: Recent trends have shown that autonomous agents, such as Autonomous
      Ground Vehicles (AGVs), Unmanned Aerial Vehicles (UAVs), and mobile robots,
      effectively improve human productivity in solving diverse tasks. However, since
      these agents are typically powered by portable batteries, they require extremely
      low power/energy consumption to operate in a long lifespan. To solve this challenge,
      neuromorphic computing has emerged as a promising solution, where bio-inspired
      Spiking Neural Networks (SNNs) use spikes from event-based cameras or data conversion
      pre-processing to perform sparse computations efficiently. However, the studies
      of SNN deployments for autonomous agents are still at an early stage. Hence,
      the optimization stages for enabling efficient embodied SNN deployments for
      autonomous agents have not been defined systematically. Toward this, we propose
      a novel framework called SNN4Agents that consists of a set of optimization techniques
      for designing energy-efficient embodied SNNs targeting autonomous agent applications.
      Our SNN4Agents employs weight quantization, timestep reduction, and attention
      window reduction to jointly improve the energy efficiency, reduce the memory
      footprint, optimize the processing latency, while maintaining high accuracy.
      In the evaluation, we investigate use cases of event-based car recognition,
      and explore the trade-offs among accuracy, latency, memory, and energy consumption.
      The experimental results show that our proposed framework can maintain high
      accuracy (i.e., 84.12% accuracy) with 68.75% memory saving, 3.58x speed-up,
      and 4.03x energy efficiency improvement as compared to the state-of-the-art
      work for NCARS dataset. In this manner, our SNN4Agents framework paves the way
      toward enabling energy-efficient embodied SNN deployments for autonomous agents.
    summary_zh: 自主代理如无人机和移动机器人在提升生产力方面表现突出，但受限于便携电池，需极低功耗以延长使用寿命，这对手机系统功耗优化具有重要参考价值。神经形态计算利用生物启发的脉冲神经网络，通过事件驱动摄像头进行稀疏计算，有效降低能耗，但其在自主代理中的部署研究尚不成熟。本文提出SNN4Agents框架，整合权重量化、时间步减少和注意力窗口减少等优化技术，系统化设计节能的具身脉冲神经网络。在事件驱动汽车识别用例中，该框架在保持高精度（84.12%）的同时，实现68.75%的内存节省、3.58倍处理速度提升和4.03倍能效改进。实验结果表明，SNN4Agents能显著降低计算资源消耗，为手机等移动设备提供可扩展的低功耗AI解决方案，通过减少冗余计算和优化数据流，有效延长电池续航。
    key_points_zh:
    - SNN4Agents框架针对自主代理应用，采用脉冲神经网络实现高效能低功耗计算
    - 优化技术包括权重量化、时间步减少和注意力窗口减少，协同提升能效
    - 在NCARS数据集上保持84.12%高精度的同时，实现4.03倍能效改进
    - 减少68.75%内存占用和3.58倍延迟，优化手机系统实时响应能力
    - 为移动设备提供系统化部署方案，显著降低AI推理过程中的功耗消耗
