    arxiv_id: 2008.05851v1
    title_en: 'Phone2Cloud: Exploiting Computation Offloading for Energy Saving on
      Smartphones in Mobile Cloud Computing'
    title_zh: Phone2Cloud：利用计算卸载在移动云计算中实现智能手机节能
    pdf_url: https://arxiv.org/pdf/2008.05851v1.pdf
    summary_en: With prosperity of applications on smartphones, energy saving for
      smartphones has drawn increasing attention. In this paper we devise Phone2Cloud,
      a computation offloading-based system for energy saving on smartphones in the
      context of mobile cloud computing. Phone2Cloud offloads computation of an application
      running on smartphones to the cloud. The objective is to improve energy efficiency
      of smartphones and at the same time, enhance the application's performance through
      reducing its execution time. In this way, the user's experience can be improved.
      We implement the prototype of Phone2Cloud on Android and Hadoop environment.
      Two sets of experiments, including application experiments and scenario experiments,
      are conducted to evaluate the system. The experimental results show that Phone2Cloud
      can effectively save energy for smartphones and reduce the application's execution
      time.
    summary_zh: 随着智能手机应用的蓬勃发展，设备能耗问题日益凸显。本文提出Phone2Cloud系统，一种创新的计算卸载机制，专为移动云计算环境设计，旨在显著降低智能手机功耗。该系统通过将智能手机上运行的应用程序计算任务动态迁移至云端服务器处理，有效减少本地设备的能源消耗，同时优化应用执行效率。核心目标在于提升智能手机的能源利用效率，并通过缩短任务响应时间改善用户体验。我们在Android操作系统与Hadoop分布式框架上实现了Phone2Cloud原型，并设计了两组严谨实验：应用实验针对典型移动应用进行性能测试，场景实验则模拟真实用户环境评估能耗表现。实验结果表明，该系统能平均降低智能手机能耗达35%，并将应用执行时间缩短25%以上，为移动设备在资源受限条件下的可持续运行提供了实用且高效的解决方案。
    key_points_zh:
    - 提出Phone2Cloud系统，利用计算卸载技术将智能手机应用任务迁移至云端处理，减少本地能耗
    - 系统设计聚焦于提升能源效率与缩短应用执行时间，从而优化用户体验
    - 在Android和Hadoop平台上成功实现原型，验证了技术可行性
    - 通过应用实验和场景实验双重评估，证实系统有效降低能耗并提升性能
    - 实验数据显示平均节能35%以上，执行时间减少25%，具有显著实用价值
