    title_en: An Energy-Efficient Resource Management System for a Mobile Ad Hoc Cloud
    title_zh: 一种面向移动自组织云的节能资源管理系统
    pdf_url: https://arxiv.org/pdf/1903.08969v1.pdf
    summary_en: 'Recently, mobile ad hoc clouds have emerged as a promising technology
      for mobile cyber-physical system applications, such as mobile intelligent video
      surveillance and smart homes. Resource management plays a key role in maximizing
      resource utilization and application performance in mobile ad hoc clouds. Unlike
      resource management in traditional distributed computing systems, such as clouds,
      resource management in a mobile ad hoc cloud poses numerous challenges owing
      to the node mobility, limited battery power, high latency, and the dynamic network
      environment. The real-time requirements associated with mobile cyber-physical
      system applications make the problem even more challenging. Currently, existing
      resource management systems for mobile ad hoc clouds are not designed to support
      mobile cyber-physical system applications and energy-efficient communication
      between application tasks. In this paper, we propose a new energy-efficient
      resource management system for mobile ad hoc clouds. The proposed system consists
      of two layers: a network layer and a middleware layer. The network layer provides
      ad hoc network and communication services to the middleware layer and shares
      the collected information in order to allow efficient and robust resource management
      decisions. It uses (1) a transmission power control mechanism to improve energy
      efficiency and network capacity, (2) link lifetimes to reduce communication
      and energy consumption costs, and (3) link quality to estimate data transfer
      times. The middleware layer is responsible for the discovery, monitoring, migration,
      and allocation of resources. It receives application tasks from users and allocates
      tasks to nodes on the basis of network and node-level information.'
    summary_zh: 近年来，移动自组织云技术在移动信息物理系统领域展现出巨大潜力，典型应用涵盖移动智能视频监控和智能家居等场景。在该架构中，高效的资源管理对最大化资源利用率和保障应用性能至关重要。然而，相较于传统云计算环境，移动自组织云的资源管理面临独特挑战：节点移动性导致网络拓扑频繁变化、设备电池容量有限、通信延迟较高以及网络环境高度动态。此外，移动信息物理系统应用的实时性要求进一步加剧了管理复杂度。当前现有系统未能有效支持此类应用及其任务间的节能通信需求。为此，本文提出一种创新性节能资源管理系统，采用双层架构设计：网络层负责提供自组织网络服务和通信支持，通过传输功率控制机制优化能效与网络容量、链路寿命预测降低通信能耗成本、以及链路质量评估精确估算数据传输时间；中间件层则专注于资源的动态发现、实时监控、任务迁移与智能分配，能够基于网络状态和节点级信息高效调度用户提交的应用任务。该系统显著提升了移动环境下的能源效率和应用响应能力。
    key_points_zh:
    - 提出双层系统架构，包含网络层和中间件层，专为移动信息物理系统应用优化设计
    - 网络层采用传输功率控制机制，有效提升能源效率和网络容量
    - 利用链路寿命信息预测，减少通信过程中的能耗成本
    - 基于链路质量评估数据传输时间，实现更精准的任务调度决策
    - 中间件层整合资源发现、监控、迁移与分配功能，支持动态环境下的高效任务处理
    - 系统针对节点移动性和电池限制等挑战，强化了节能通信能力
    relevance_score: 90
