    title_en: 'CrowdOS: A Ubiquitous Operating System for Crowdsourcing and Mobile
      Crowd Sensing'
    title_zh: CrowdOS：面向众包与移动群智感知的普适操作系统
    pdf_url: https://arxiv.org/pdf/1909.00805v1.pdf
    summary_en: With the rise of crowdsourcing and mobile crowdsensing techniques,
      a large number of crowdsourcing applications or platforms (CAP) have appeared.
      In the mean time, CAP-related models and frameworks based on different research
      hypotheses are rapidly emerging, and they usually address specific issues from
      a certain perspective. Due to different settings and conditions, different models
      are not compatible with each other. However, CAP urgently needs to combine these
      techniques to form a unified framework. In addition, these models needs to be
      learned and updated online with the extension of crowdsourced data and task
      types, thus requiring a unified architecture that integrates lifelong learning
      concepts and breaks down the barriers between different modules. This paper
      draws on the idea of ubiquitous operating systems and proposes a novel OS (CrowdOS),
      which is an abstract software layer running between native OS and application
      layer. In particular, based on an in-depth analysis of the complex crowd environment
      and diverse characteristics of heterogeneous tasks, we construct the OS kernel
      and three core frameworks including Task Resolution and Assignment Framework
      (TRAF), Integrated Resource Management (IRM), and Task Result quality Optimization
      (TRO). In addition, we validate the usability of CrowdOS, module correctness
      and development efficiency. Our evaluation further reveals TRO brings enormous
      improvement in efficiency and a reduction in energy consumption.
    summary_zh: 针对AI降低手机系统功耗的需求，本文提出CrowdOS——一种创新的普适操作系统，专为众包与移动群智感知设计。随着相关技术的普及，大量众包应用平台涌现，但现有模型因研究假设差异而互不兼容，亟需统一框架整合技术。模型需随众包数据和任务类型扩展进行在线学习更新，要求架构集成终身学习概念并消除模块壁垒。CrowdOS作为原生操作系统与应用层间的抽象软件层，基于对复杂群环境和异构任务特性的深入分析，构建了OS内核及三大核心框架：任务解析与分配框架（TRAF）优化任务调度，集成资源管理（IRM）提升资源利用率，任务结果质量优化（TRO）通过AI算法智能调整执行策略。实验验证了系统的可用性、模块正确性及开发效率。关键评估表明，TRO框架显著提升了系统运行效率，并有效降低了手机系统的能耗，为AI驱动的功耗管理提供了实用解决方案，尤其适用于移动设备场景。
    key_points_zh:
    - CrowdOS作为统一框架，解决了众包平台中模型互不兼容问题，促进技术整合与标准化
    - 系统集成终身学习机制，支持模型随数据扩展动态在线更新，适应任务类型变化
    - 构建三大核心框架：TRAF优化任务分配效率，IRM高效管理硬件资源，TRO通过AI算法降低能耗
    - TRO框架显著减少手机系统能耗，同时提升任务执行速度和结果质量
    - 实验验证了系统在可用性、模块正确性及开发效率方面的综合优势
