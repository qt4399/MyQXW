    arxiv_id: 2602.15212v1
    title_en: Secure and Energy-Efficient Wireless Agentic AI Networks
    title_zh: 安全高效的无线Agentic AI网络
    pdf_url: https://arxiv.org/pdf/2602.15212v1.pdf
    summary_en: In this paper, we introduce a secure wireless agentic AI network comprising
      one supervisor AI agent and multiple other AI agents to provision quality of
      service (QoS) for users' reasoning tasks while ensuring confidentiality of private
      knowledge and reasoning outcomes. Specifically, the supervisor AI agent can
      dynamically assign other AI agents to participate in cooperative reasoning,
      while the unselected AI agents act as friendly jammers to degrade the eavesdropper's
      interception performance. To extend the service duration of AI agents, an energy
      minimization problem is formulated that jointly optimizes AI agent selection,
      base station (BS) beamforming, and AI agent transmission power, subject to latency
      and reasoning accuracy constraints. To address the formulated problem, we propose
      two resource allocation schemes, ASC and LAW, which first decompose it into
      three sub-problems. Specifically, ASC optimizes each sub-problem iteratively
      using the proposed alternating direction method of multipliers (ADMM)-based
      algorithm, semi-definite relaxation (SDR), and successive convex approximation
      (SCA), while LAW tackles each sub-problem using the proposed large language
      model (LLM) optimizer within an agentic workflow. The experimental results show
      that the proposed solutions can reduce network energy consumption by up to 59.1%
      compared to other benchmark schemes. Furthermore, the proposed schemes are validated
      using a practical agentic AI system based on Qwen, demonstrating satisfactory
      reasoning accuracy across various public benchmarks.
    summary_zh: 本文提出一种安全无线agentic AI网络架构，包含一个监督AI代理和多个协作AI代理，旨在为用户提供推理任务的服务质量保障，同时确保私有知识和推理结果的机密性。监督AI代理动态分配其他AI代理参与协作推理，未被选中的代理则作为友好干扰器以降低窃听者拦截性能。为延长AI代理服务时长，构建了能量最小化问题，联合优化AI代理选择、基站波束成形和传输功率，满足延迟与推理精度约束。针对该问题，设计了ASC和LAW两种资源分配方案：ASC采用交替方向乘子法、半定松弛和逐次凸近似迭代优化子问题；LAW则利用大型语言模型优化器在agentic工作流中求解。实验表明，所提方案相比基准方法可降低网络能耗高达59.1%，显著延长设备电池寿命。此外，基于Qwen的实际系统验证了方案可行性，在多个公共基准测试中保持高推理精度，为手机终端AI应用的功耗优化提供了直接技术路径。
    key_points_zh:
    - 提出安全无线agentic AI网络架构，监督代理动态分配任务，未选代理作为干扰器增强通信安全性
    - 构建能量最小化问题，联合优化代理选择、波束成形和传输功率，平衡延迟与精度约束
    - 设计ASC和LAW两种资源分配方案，分别采用ADMM-SDR-SCA和LLM优化器高效求解
    - 实验验证能耗降低59.1%，显著延长移动设备服务时长
    - 基于Qwen系统的实际部署证明方案在手机AI应用中的高精度与实用性
    relevance_score: 90
    relevance_reason: 直接优化AI代理网络能量消耗，包括传输功率控制，适用于手机系统功耗降低。
