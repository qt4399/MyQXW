    arxiv_id: 2407.00641v3
    title_en: 'NeuroNAS: Enhancing Efficiency of Neuromorphic In-Memory Computing
      for Intelligent Mobile Agents through Hardware-Aware Spiking Neural Architecture
      Search'
    title_zh: NeuroNAS：通过硬件感知脉冲神经架构搜索增强智能移动智能体的神经形态存内计算效率
    pdf_url: https://arxiv.org/pdf/2407.00641v3.pdf
    summary_en: 'Intelligent mobile agents (e.g., UGVs and UAVs) typically demand
      low power/energy consumption when solving their machine learning (ML)-based
      tasks, since they are usually powered by portable batteries with limited capacity.
      A potential solution is employing neuromorphic computing with Spiking Neural
      Networks (SNNs), which leverages event-based computation to enable ultra-low
      power/energy ML algorithms. To maximize the performance efficiency of SNN inference,
      the In-Memory Computing (IMC)-based hardware accelerators with emerging device
      technologies (e.g., RRAM) can be employed. However, SNN models are typically
      developed without considering constraints from the application and the underlying
      IMC hardware, thereby hindering SNNs from reaching their full potential in performance
      and efficiency. To address this, we propose NeuroNAS, a novel framework for
      developing energyefficient neuromorphic IMC for intelligent mobile agents using
      hardware-aware spiking neural architecture search (NAS), i.e., by quickly finding
      an SNN architecture that offers high accuracy under the given constraints (e.g.,
      memory, area, latency, and energy consumption). Its key steps include: optimizing
      SNN operations to enable efficient NAS, employing quantization to minimize the
      memory footprint, developing an SNN architecture that facilitates an effective
      learning, and devising a systematic hardware-aware search algorithm to meet
      the constraints. Compared to the state-of-the-art techniques, NeuroNAS quickly
      finds SNN architectures (with 8bit weight precision) that maintain high accuracy
      by up to 6.6x search time speed-ups, while achieving up to 92% area savings,
      1.2x latency improvements, 84% energy savings across different datasets (i.e.,
      CIFAR-10, CIFAR-100, and TinyImageNet-200); while the state-of-the-art fail
      to meet all constraints at once.'
    summary_zh: 智能移动智能体如UGV和UAV通常由便携电池供电，容量有限，需低功耗解决机器学习任务。神经形态计算结合脉冲神经网络（SNN）利用基于事件的计算实现超低功耗算法，而存内计算（IMC）硬件加速器可进一步提升效率，但SNN模型开发常忽略应用和硬件约束，限制其潜力。为此，本文提出NeuroNAS框架，通过硬件感知脉冲神经架构搜索（NAS）开发节能神经形态IMC，快速找到满足内存、面积、延迟和能耗约束的高准确率SNN架构。关键步骤包括：优化SNN操作以支持高效NAS搜索；采用量化技术最小化内存占用；开发促进有效学习的SNN架构；设计系统化硬件感知搜索算法。相比现有技术，NeuroNAS以8位权重精度快速找到SNN架构，搜索时间加速6.6倍，同时在CIFAR-10等数据集上实现高达92%的面积节省、1.2倍延迟改进和84%的能耗降低，而现有方法无法同时满足所有约束，显著提升移动智能体的能效比。
    key_points_zh:
    - NeuroNAS框架利用硬件感知SNN架构搜索，为智能移动智能体定制高效神经形态IMC方案
    - 优化SNN操作并采用量化技术，大幅减少内存占用和搜索时间
    - 开发支持有效学习的SNN架构，适应硬件约束并提升模型性能
    - 系统化搜索算法快速平衡准确率与资源约束，满足实际部署需求
    - 实验验证搜索时间加速6.6倍，面积节省92%，延迟改进1.2倍，能耗降低84%
    - 在多数据集上实现全面能效提升，解决现有技术无法兼顾多约束的问题
