    title_en: Cooperative Edge Caching Based on Elastic Federated and Multi-Agent
      Deep Reinforcement Learning in Next-Generation Network
    title_zh: 基于弹性联邦和多智能体深度强化学习的下一代网络协作边缘缓存
    pdf_url: https://arxiv.org/pdf/2401.09886v2.pdf
    summary_en: Edge caching is a promising solution for next-generation networks
      by empowering caching units in small-cell base stations (SBSs), which allows
      user equipments (UEs) to fetch users' requested contents that have been pre-cached
      in SBSs. It is crucial for SBSs to predict accurate popular contents through
      learning while protecting users' personal information. Traditional federated
      learning (FL) can protect users' privacy but the data discrepancies among UEs
      can lead to a degradation in model quality. Therefore, it is necessary to train
      personalized local models for each UE to predict popular contents accurately.
      In addition, the cached contents can be shared among adjacent SBSs in next-generation
      networks, thus caching predicted popular contents in different SBSs may affect
      the cost to fetch contents. Hence, it is critical to determine where the popular
      contents are cached cooperatively. To address these issues, we propose a cooperative
      edge caching scheme based on elastic federated and multi-agent deep reinforcement
      learning (CEFMR) to optimize the cost in the network. We first propose an elastic
      FL algorithm to train the personalized model for each UE, where adversarial
      autoencoder (AAE) model is adopted for training to improve the prediction accuracy,
      then {a popular} content prediction algorithm is proposed to predict the popular
      contents for each SBS based on the trained AAE model. Finally, we propose a
      multi-agent deep reinforcement learning (MADRL) based algorithm to decide where
      the predicted popular contents are collaboratively cached among SBSs. Our experimental
      results demonstrate the superiority of our proposed scheme to existing baseline
      caching schemes.
    summary_zh: 边缘缓存作为下一代网络的有前景解决方案，通过在小型基站（SBSs）部署缓存单元，使用户设备（UEs）能够获取预缓存的内容。然而，SBSs需要在保护用户隐私的同时准确预测热门内容。传统联邦学习（FL）虽能保护隐私，但UEs间的数据差异会导致模型质量下降，因此有必要为每个UE训练个性化本地模型以准确预测热门内容。此外，在下一代网络中，缓存内容可在相邻SBSs间共享，因此不同SBSs的缓存决策会影响内容获取成本。为解决这些问题，我们提出基于弹性联邦和多智能体深度强化学习的协作边缘缓存方案（CEFMR），以优化网络成本。首先，我们提出弹性FL算法，采用对抗自编码器（AAE）模型训练个性化模型以提高预测精度；其次，基于训练好的AAE模型提出热门内容预测算法；最后，设计多智能体深度强化学习（MADRL）算法决定热门内容在SBSs间的协作缓存位置。实验结果表明，所提方案在优化内容获取成本方面显著优于现有基准缓存方案，有效降低了移动设备的系统功耗。
    key_points_zh:
    - 提出弹性联邦学习算法，训练个性化本地模型以提高热门内容预测精度
    - 采用对抗自编码器（AAE）模型增强预测准确性，解决数据差异导致的能耗问题
    - 设计多智能体深度强化学习（MADRL）算法，协作决定缓存位置以优化能耗成本
    - 实现SBSs间缓存内容共享，降低用户内容获取的系统功耗
    - 实验表明方案在成本优化和能效方面显著优于基准方法
