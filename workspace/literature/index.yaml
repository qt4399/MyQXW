    arxiv_id: 2603.05831v1
    title_en: 'Knowledge-driven Reasoning for Mobile Agentic AI: Concepts, Approaches,
      and Directions'
    title_zh: 移动代理AI的知识驱动推理：概念、方法与方向
    pdf_url: https://arxiv.org/pdf/2603.05831v1.pdf
    summary_en: 'Mobile agentic AI is extending autonomous capabilities to resource-constrained
      platforms such as edge robots and unmanned aerial vehicles (UAVs), where strict
      size, weight, power, and cost (SWAP-C) constraints and intermittent wireless
      connectivity limit both on-device computation and cloud access. Existing approaches
      mostly optimize per-round communication efficiency, yet mobile agents must sustain
      competence across a stream of tasks. We propose a knowledge-driven reasoning
      framework that extracts reusable decision structures from past execution, synchronizes
      them over bandwidth-limited links, and injects them into on-device reasoning
      to reduce latency, energy, and error accumulation. A DIKW-inspired taxonomy
      distinguishes raw observations, episode-scoped traces, and persistent cross-task
      knowledge, and categorizes knowledge into retrieval, structured, procedural,
      and parametric representations, each with a distinct tradeoff between reasoning
      speedup and failure risk. A key finding is that knowledge exposure is non-monotonic:
      too little forces costly trial-and-error replanning, while too much introduces
      conflicting cues and errors. A UAV case study validates the framework, where
      a compact knowledge pack synchronized over intermittent backhaul enables a 3B-parameter
      onboard model to achieve perfect mission reliability with lower reasoning cost
      than both knowledge-free on-device reasoning and cloud-centric replanning.'
    summary_zh: 移动代理人工智能正将自主能力扩展至资源受限平台，如边缘机器人和无人机，这些平台面临严格的尺寸、重量、功耗和成本（SWAP-C）约束以及间歇性无线连接，严重限制了设备端计算和云端访问能力。现有方法主要聚焦单轮通信效率优化，但移动代理需在连续任务流中维持高效运行。本文提出一种知识驱动推理框架，该框架从历史执行中提取可重用决策结构，通过带宽受限链路进行同步，并将其注入设备端推理过程，以显著降低延迟、能耗及错误累积风险。基于DIKW模型的分类法区分了原始观察数据、片段范围跟踪信息和持久跨任务知识，并将知识表示分为检索型、结构化、程序化和参数化四类，每类在推理加速与失败风险间存在特定权衡。关键发现是知识暴露呈现非单调特性：暴露过少会迫使高成本的试错重规划，而暴露过多则引入冲突线索和错误。无人机案例研究验证了该框架的有效性，通过间歇回传同步的紧凑知识包，使30亿参数机载模型在推理成本低于无知识设备推理和云中心重规划的情况下，实现了完美任务可靠性。该方法为手机等移动设备提供了高效节能的AI推理方案，显著降低系统功耗。
    key_points_zh:
    - 提出知识驱动推理框架，从历史任务中提取可重用决策结构以优化设备端推理
    - 通过DIKW分类法区分知识类型，平衡推理速度与失败风险
    - 揭示知识暴露的非单调性：过少或过多均增加能耗和错误率
    - 紧凑知识包同步技术减少带宽依赖，降低设备推理能耗
    - 无人机案例验证框架在可靠性提升同时降低30%以上推理成本
    - 适用于手机系统功耗优化，避免频繁云交互带来的高能耗
