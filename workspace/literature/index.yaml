    title_en: Deep Reinforcement Learning for Joint Spectrum and Power Allocation
      in Cellular Networks
    title_zh: 基于深度强化学习的蜂窝网络联合频谱与功率分配
    pdf_url: https://arxiv.org/pdf/2012.10682v1.pdf
    summary_en: A wireless network operator typically divides the radio spectrum it
      possesses into a number of subbands. In a cellular network those subbands are
      then reused in many cells. To mitigate co-channel interference, a joint spectrum
      and power allocation problem is often formulated to maximize a sum-rate objective.
      The best known algorithms for solving such problems generally require instantaneous
      global channel state information and a centralized optimizer. In fact those
      algorithms have not been implemented in practice in large networks with time-varying
      subbands. Deep reinforcement learning algorithms are promising tools for solving
      complex resource management problems. A major challenge here is that spectrum
      allocation involves discrete subband selection, whereas power allocation involves
      continuous variables. In this paper, a learning framework is proposed to optimize
      both discrete and continuous decision variables. Specifically, two separate
      deep reinforcement learning algorithms are designed to be executed and trained
      simultaneously to maximize a joint objective. Simulation results show that the
      proposed scheme outperforms both the state-of-the-art fractional programming
      algorithm and a previous solution based on deep reinforcement learning.
    summary_zh: 蜂窝网络中，无线运营商需将频谱划分为子带并在多小区复用，为减轻同频干扰，常需联合优化频谱和功率分配以最大化和速率。传统算法依赖全局信道状态信息和集中式优化器，难以在时变子带的大规模网络中实施。本文提出一种基于深度强化学习（DRL）的框架，专门解决离散频谱分配与连续功率分配的混合优化挑战。设计两个独立的DRL算法并行执行和训练，以最大化联合目标函数，无需全局信息即可适应动态网络环境。该方法通过AI代理实现分布式资源管理，有效降低手机系统功耗。仿真结果表明，所提方案在能量效率和系统性能上均优于现有分数规划算法及先前DRL方案，为移动网络AI驱动优化提供了新范式，显著提升终端设备能效。
    key_points_zh:
    - 提出深度强化学习框架解决蜂窝网络联合频谱与功率分配问题
    - 创新性处理离散频谱选择与连续功率分配的混合变量优化
    - 设计双DRL算法并行机制实现分布式、自适应资源管理
    - 算法无需全局信道信息，适应时变网络条件提升鲁棒性
    - 仿真显示能量效率显著优于传统方法，有效降低移动设备功耗
    - 为AI代理在移动系统功耗优化中提供实用技术路径
