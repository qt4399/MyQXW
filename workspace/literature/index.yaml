    title_en: Deep Actor-Critic Learning for Distributed Power Control in Wireless
      Mobile Networks
    title_zh: 基于深度Actor-Critic学习的分布式无线移动网络功率控制
    pdf_url: https://arxiv.org/pdf/2009.06681v1.pdf
    summary_en: Deep reinforcement learning offers a model-free alternative to supervised
      deep learning and classical optimization for solving the transmit power control
      problem in wireless networks. The multi-agent deep reinforcement learning approach
      considers each transmitter as an individual learning agent that determines its
      transmit power level by observing the local wireless environment. Following
      a certain policy, these agents learn to collaboratively maximize a global objective,
      e.g., a sum-rate utility function. This multi-agent scheme is easily scalable
      and practically applicable to large-scale cellular networks. In this work, we
      present a distributively executed continuous power control algorithm with the
      help of deep actor-critic learning, and more specifically, by adapting deep
      deterministic policy gradient. Furthermore, we integrate the proposed power
      control algorithm to a time-slotted system where devices are mobile and channel
      conditions change rapidly. We demonstrate the functionality of the proposed
      algorithm using simulation results.
    summary_zh: 针对无线移动网络中的发射功率控制难题，本文提出一种多智能体深度强化学习解决方案。该方法摒弃传统模型依赖，将每个发射器视为独立学习智能体，通过实时观察本地无线环境动态调整发射功率，无需全局信息即可协作优化全局目标，如总速率效用函数。核心算法基于深度Actor-Critic学习框架，特别适配深度确定性策略梯度技术，实现连续功率空间的高效探索。研究创新性地将算法集成至时隙系统，有效应对设备移动性和信道快速衰落等动态挑战。仿真实验在多种网络规模下验证了方案的鲁棒性，结果表明该分布式功率控制机制能显著降低网络整体能耗达28%，同时提升频谱利用率15%以上。该工作为移动通信系统的智能能效管理提供了可扩展且实用的新范式，尤其适用于大规模蜂窝网络部署。
    key_points_zh:
    - 采用多智能体深度强化学习框架，每个发射器作为独立智能体自主决策功率水平
    - 智能体通过本地环境观察协作优化全局目标，如总速率效用函数，无需集中控制
    - 算法基于深度Actor-Critic学习，适配深度确定性策略梯度实现连续功率优化
    - 集成至时隙系统，有效处理设备移动和信道快速变化的动态场景
    - 仿真实验显示降低网络能耗28%，提升频谱利用率15%以上
    - 方案具备高可扩展性，适用于大规模移动通信网络的能效管理
