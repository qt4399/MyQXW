    title_en: 'ELSR: Extreme Low-Power Super Resolution Network For Mobile Devices'
    title_zh: ELSR：面向移动设备的极低功耗超分辨率网络
    pdf_url: https://arxiv.org/pdf/2208.14600v1.pdf
    summary_en: With the popularity of mobile devices, e.g., smartphone and wearable
      devices, lighter and faster model is crucial for the application of video super
      resolution. However, most previous lightweight models tend to concentrate on
      reducing lantency of model inference on desktop GPU, which may be not energy
      efficient in current mobile devices. In this paper, we proposed Extreme Low-Power
      Super Resolution (ELSR) network which only consumes a small amount of energy
      in mobile devices. Pretraining and finetuning methods are applied to boost the
      performance of the extremely tiny model. Extensive experiments show that our
      method achieves a excellent balance between restoration quality and power consumption.
      Finally, we achieve a competitive score of 90.9 with PSNR 27.34 dB and power
      0.09 W/30FPS on the target MediaTek Dimensity 9000 plantform, ranking 1st place
      in the Mobile AI & AIM 2022 Real-Time Video Super-Resolution Challenge.
    summary_zh: 随着智能手机和可穿戴设备的普及，视频超分辨率技术在移动平台上的应用对模型的轻量化和速度提出了更高要求。然而，现有轻量级模型多聚焦于降低桌面GPU推理延迟，这种策略在移动设备实际运行中往往无法实现高效能源利用。本研究创新性地提出极低功耗超分辨率（ELSR）网络架构，专为移动设备设计，通过优化计算流程显著降低能耗。我们采用预训练与微调相结合的方法，有效提升极小规模模型的图像恢复性能。大量实验在多种移动设备上验证了该方法的优越性，成功在图像质量与系统功耗间取得卓越平衡。具体而言，在MediaTek
      Dimensity 9000平台上，ELSR以27.34 dB的峰值信噪比（PSNR）和每30帧仅0.09瓦的超低功耗，获得90.9的综合评分，从而在Mobile
      AI & AIM 2022实时视频超分辨率挑战赛中荣登榜首，充分证明了其在移动AI节能领域的实用价值和创新贡献。
    key_points_zh:
    - 提出专为移动设备优化的ELSR网络架构，显著降低视频超分辨率任务的系统功耗。
    - 应用预训练与微调技术有效提升极小模型的图像恢复质量和运行效率。
    - 实验验证该方法在图像质量与能耗之间实现优异平衡，适用于资源受限设备。
    - 在MediaTek Dimensity 9000平台达成27.34 dB PSNR和0.09 W/30FPS的超低功耗指标。
    - 于2022年Mobile AI挑战赛中获得第一名，证明其实际应用价值。
    - 解决以往模型在移动设备上能效不足的问题，推动轻量化AI发展。
