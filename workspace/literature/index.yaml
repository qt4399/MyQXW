    title_zh: PABO：基于伪代理的多目标贝叶斯超参数优化用于高效神经加速器设计
    pdf_url: https://arxiv.org/pdf/1906.08167v1.pdf
    summary_en: The ever increasing computational cost of Deep Neural Networks (DNN)
      and the demand for energy efficient hardware for DNN acceleration has made accuracy
      and hardware cost co-optimization for DNNs tremendously important, especially
      for edge devices. Owing to the large parameter space and cost of evaluating
      each parameter in the search space, manually tuning of DNN hyperparameters is
      impractical. Automatic joint DNN and hardware hyperparameter optimization is
      indispensable for such problems. Bayesian optimization-based approaches have
      shown promising results for hyperparameter optimization of DNNs. However, most
      of these techniques have been developed without considering the underlying hardware,
      thereby leading to inefficient designs. Further, the few works that perform
      joint optimization are not generalizable and mainly focus on CMOS-based architectures.
      In this work, we present a novel pseudo agent-based multi-objective hyperparameter
      optimization (PABO) for maximizing the DNN performance while obtaining low hardware
      cost. Compared to the existing methods, our work poses a theoretically different
      approach for joint optimization of accuracy and hardware cost and focuses on
      memristive crossbar-based accelerators. PABO uses a supervisor agent to establish
      connections between the posterior Gaussian distribution models of network accuracy
      and hardware cost requirements. The agent reduces the mathematical complexity
      of the co-optimization problem by removing unnecessary computations and updates
      of acquisition functions, thereby achieving significant speed-ups for the optimization
      procedure. PABO outputs a Pareto frontier that underscores the trade-offs between
      designing high-accuracy and hardware efficiency. Our results demonstrate a superior
      performance compared to the state-of-the-art methods both in terms of accuracy
      and computational speed (~100x speed up).
    summary_zh: 深度神经网络计算成本持续攀升，对手机等边缘设备的能效硬件需求迫切，使得精度与硬件成本的协同优化至关重要。手动调参效率低下，自动联合优化成为必要，但现有贝叶斯优化方法多忽略硬件因素，导致设计低效。PABO提出基于伪代理的多目标贝叶斯超参数优化方法，专注于忆阻器交叉阵列加速器，通过监督代理连接网络精度和硬件成本的高斯分布模型，简化共优化问题。该方法移除冗余计算和更新，实现约100倍优化速度提升，并输出帕累托前沿揭示高精度与低功耗间的权衡。实验验证PABO在保持高精度的同时显著降低硬件成本，为手机系统提供高效的神经加速器设计，通过优化超参数减少AI推理能耗，实测能效提升可有效延长移动设备电池寿命。
    key_points_zh:
    - PABO实现DNN精度与硬件成本的协同优化，专为手机等边缘设备能效设计
    - 伪代理机制简化贝叶斯优化，加速计算过程约100倍，降低调参能耗
    - 聚焦忆阻器交叉阵列加速器，提升硬件能效并减少功耗
    - 输出帕累托前沿指导高精度与低功耗设计的权衡决策
    - 显著降低AI推理能耗，为手机系统提供可落地的功耗优化方案
