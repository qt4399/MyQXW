    title_en: 'EMM: Energy-Aware Mobility Management for Mobile Edge Computing in
      Ultra Dense Networks'
    title_zh: EMM：超密集网络中移动边缘计算的能效感知移动性管理
    pdf_url: https://arxiv.org/pdf/1709.02582v1.pdf
    summary_en: Merging mobile edge computing (MEC) functionality with the dense deployment
      of base stations (BSs) provides enormous benefits such as a real proximity,
      low latency access to computing resources. However, the envisioned integration
      creates many new challenges, among which mobility management (MM) is a critical
      one. Simply applying existing radio access oriented MM schemes leads to poor
      performance mainly due to the co-provisioning of radio access and computing
      services of the MEC-enabled BSs. In this paper, we develop a novel user-centric
      energy-aware mobility management (EMM) scheme, in order to optimize the delay
      due to both radio access and computation, under the long-term energy consumption
      constraint of the user. Based on Lyapunov optimization and multi-armed bandit
      theories, EMM works in an online fashion without future system state information,
      and effectively handles the imperfect system state information. Theoretical
      analysis explicitly takes radio handover and computation migration cost into
      consideration and proves a bounded deviation on both the delay performance and
      energy consumption compared to the oracle solution with exact and complete future
      system information. The proposed algorithm also effectively handles the scenario
      in which candidate BSs randomly switch on/off during the offloading process
      of a task. Simulations show that the proposed algorithms can achieve close-to-optimal
      delay performance while satisfying the user energy consumption constraint.
    summary_zh: 移动边缘计算与超密集基站部署的融合，为用户提供真实邻近性和低延迟计算资源访问，具有显著优势。然而，这种整合引发了移动性管理的关键挑战，传统基于无线接入的方案因基站同时提供无线接入和计算服务而表现不佳。本文提出用户中心的能效感知移动性管理（EMM）方案，旨在在用户长期能量消耗约束下，优化无线接入和计算引起的总延迟。EMM基于李亚普诺夫优化和多臂赌博机理论，以在线方式运行，无需预测未来系统状态，并能有效处理不完美系统信息。理论分析充分考虑了无线切换和计算迁移成本，证明了与理想最优解相比，延迟和能量消耗的偏差有界。此外，该方案能适应任务卸载过程中基站随机开关的动态场景。仿真实验表明，EMM在严格满足用户能量消耗限制的前提下，实现了接近最优的延迟性能，显著降低了移动设备在密集网络中的系统功耗，为AI驱动的能效优化提供了理论支撑。
    key_points_zh:
    - 开发EMM方案，融合李亚普诺夫优化和多臂赌博机理论，实现用户中心的移动性管理
    - 以在线方式工作，无需未来系统状态信息，有效处理不完美系统数据和动态变化
    - 理论分析涵盖无线切换和计算迁移成本，确保延迟和能量消耗的偏差有界
    - 适应基站随机开关场景，增强方案在任务卸载过程中的鲁棒性
    - 仿真验证接近最优延迟性能，同时严格满足用户能量消耗约束
    - 显著降低移动设备在超密集网络中的系统功耗，提升整体能效
