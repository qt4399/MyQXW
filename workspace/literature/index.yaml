    title_en: 'Efficient Single-Image Depth Estimation on Mobile Devices, Mobile AI
      & AIM 2022 Challenge: Report'
    title_zh: 移动设备上高效的单图像深度估计：Mobile AI & AIM 2022挑战赛报告
    pdf_url: https://arxiv.org/pdf/2211.04470v1.pdf
    summary_en: Various depth estimation models are now widely used on many mobile
      and IoT devices for image segmentation, bokeh effect rendering, object tracking
      and many other mobile tasks. Thus, it is very crucial to have efficient and
      accurate depth estimation models that can run fast on low-power mobile chipsets.
      In this Mobile AI challenge, the target was to develop deep learning-based single
      image depth estimation solutions that can show a real-time performance on IoT
      platforms and smartphones. For this, the participants used a large-scale RGB-to-depth
      dataset that was collected with the ZED stereo camera capable to generated depth
      maps for objects located at up to 50 meters. The runtime of all models was evaluated
      on the Raspberry Pi 4 platform, where the developed solutions were able to generate
      VGA resolution depth maps at up to 27 FPS while achieving high fidelity results.
      All models developed in the challenge are also compatible with any Android or
      Linux-based mobile devices, their detailed description is provided in this paper.
    summary_zh: 深度估计模型在移动和物联网设备中广泛应用于图像分割、背景虚化及目标跟踪等任务，开发高效准确的模型对低功耗移动芯片组至关重要。2022年Mobile
      AI挑战赛聚焦于构建实时单图像深度估计解决方案，以适配智能手机和物联网平台。参赛者利用基于ZED立体相机收集的大规模RGB-to-depth数据集，该数据集能生成最远50米物体的高精度深度图。所有模型在Raspberry
      Pi 4平台上进行严格评估，最终方案以高达27帧每秒的速度输出VGA分辨率深度图，同时保持高保真度结果。这些模型完全兼容Android或Linux-based移动设备，通过优化网络结构和推理流程，在有限算力下平衡精度与速度。研究强调了轻量化设计对降低设备功耗的关键作用，例如采用模型剪枝和量化技术减少计算负载。本报告详细阐述了获胜方案的技术细节，为移动AI应用提供了可复用的节能框架，有助于延长电池寿命并提升用户体验，尤其适用于资源受限的移动场景。
    key_points_zh:
    - Mobile AI挑战赛开发实时单图像深度估计模型，适配低功耗移动芯片组需求
    - 使用ZED立体相机数据集支持50米范围内高精度深度图生成
    - 模型在Raspberry Pi 4上实现VGA分辨率27 FPS输出，兼顾高保真度与低延迟
    - 所有方案兼容Android/Linux设备，确保广泛部署可行性
    - 通过模型剪枝和量化技术优化能效，显著降低系统功耗
    - 为移动设备提供实用节能框架，延长电池寿命并提升任务效率
