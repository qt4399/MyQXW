    title_en: 'E2M2: Energy Efficient Mobility Management in Dense Small Cells with
      Mobile Edge Computing'
    title_zh: E2M2：密集小小区中移动边缘计算的能效移动性管理
    pdf_url: https://arxiv.org/pdf/1701.07363v1.pdf
    summary_en: Merging mobile edge computing with the dense deployment of small cell
      base stations promises enormous benefits such as a real proximity, ultra-low
      latency access to cloud functionalities. However, the envisioned integration
      creates many new challenges and one of the most significant is mobility management,
      which is becoming a key bottleneck to the overall system performance. Simply
      applying existing solutions leads to poor performance due to the highly overlapped
      coverage areas of multiple base stations in the proximity of the user and the
      co-provisioning of radio access and computing services. In this paper, we develop
      a novel user-centric mobility management scheme, leveraging Lyapunov optimization
      and multi-armed bandits theories, in order to maximize the edge computation
      performance for the user while keeping the user's communication energy consumption
      below a constraint. The proposed scheme effectively handles the uncertainties
      present at multiple levels in the system and provides both short-term and long-term
      performance guarantee. Simulation results show that our proposed scheme can
      significantly improve the computation performance (compared to state of the
      art) while satisfying the communication energy constraint.
    summary_zh: 移动边缘计算与密集小小区基站部署的融合，为用户提供了真实邻近性和超低延迟云功能访问，但移动性管理成为系统性能的关键瓶颈。现有方案因用户附近基站覆盖高度重叠及同时提供无线接入和计算服务而表现欠佳。本文提出用户中心的E2M2移动性管理方案，基于李亚普诺夫优化和多臂赌博机理论，在保持用户通信能量消耗低于约束的同时，最大化边缘计算性能。该方案有效处理系统中多级不确定性，包括网络动态变化和用户移动性，并提供短期和长期性能保证。通过仿真实验，E2M2在严格满足通信能量约束的条件下，显著提升了计算性能，相比现有技术有明显优势。该研究为移动设备在密集网络环境中的功耗优化提供了新方法，通过AI驱动的移动性管理降低系统能耗，促进能效提升。
    key_points_zh:
    - 提出E2M2方案，利用李亚普诺夫优化和多臂赌博机理论优化移动性管理决策
    - 最大化边缘计算性能的同时，严格控制用户通信能量消耗不超出设定约束
    - 有效处理系统多级不确定性，包括覆盖重叠和动态网络变化
    - 提供短期和长期性能保证，确保方案在各种场景下的稳定性
    - 仿真验证显著提升计算性能，优于现有技术并满足能量约束
    - 为密集小小区中移动设备的AI功耗管理提供实用框架，降低系统整体能耗
