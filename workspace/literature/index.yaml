    arxiv_id: 2510.00078v1
    title_en: 'Adaptive and Resource-efficient Agentic AI Systems for Mobile and Embedded
      Devices: A Survey'
    title_zh: 面向移动和嵌入式设备的自适应与资源高效AI代理系统综述
    pdf_url: https://arxiv.org/pdf/2510.00078v1.pdf
    summary_en: 'Foundation models have reshaped AI by unifying fragmented architectures
      into scalable backbones with multimodal reasoning and contextual adaptation.
      In parallel, the long-standing notion of AI agents, defined by the sensing-decision-action
      loop, is entering a new paradigm: with FMs as their cognitive core, agents transcend
      rule-based behaviors to achieve autonomy, generalization, and self-reflection.
      This dual shift is reinforced by real-world demands such as autonomous driving,
      robotics, virtual assistants, and GUI agents, as well as ecosystem advances
      in embedded hardware, edge computing, mobile deployment platforms, and communication
      protocols that together enable large-scale deployment. Yet this convergence
      collides with reality: while applications demand long-term adaptability and
      real-time interaction, mobile and edge deployments remain constrained by memory,
      energy, bandwidth, and latency. This creates a fundamental tension between the
      growing complexity of FMs and the limited resources of deployment environments.
      This survey provides the first systematic characterization of adaptive, resource-efficient
      agentic AI systems. We summarize enabling techniques into elastic inference,
      test-time adaptation, dynamic multimodal integration, and agentic AI applications,
      and identify open challenges in balancing accuracy-latency-communication trade-offs
      and sustaining robustness under distribution shifts. We further highlight future
      opportunities in algorithm-system co-design, cognitive adaptation, and collaborative
      edge deployment. By mapping FM structures, cognition, and hardware resources,
      this work establishes a unified perspective toward scalable, adaptive, and resource-efficient
      agentic AI. We believe this survey can help readers to understand the connections
      between enabling technologies while promoting further discussions on the fusion
      of agentic intelligence and intelligent agents.'
    summary_zh: 基础模型的兴起统一了AI架构，赋能多模态推理和上下文适应能力，而AI代理（基于感知-决策-行动循环）正以基础模型为认知核心，迈向自主性、泛化性和自省能力的新范式。这一融合由自动驾驶、机器人及虚拟助手等实际应用需求驱动，并受益于嵌入式硬件、边缘计算和移动部署平台的生态系统进步。然而，移动和边缘设备的资源限制（如内存、能耗、带宽和延迟）与应用所需的长期适应性及实时交互形成根本张力。本综述首次系统刻画了自适应、资源高效的代理AI系统，归纳了弹性推理、测试时适应、动态多模态集成等关键技术，并深入分析了精度-延迟-通信权衡及分布偏移下鲁棒性维持的挑战。我们进一步提出算法-系统协同设计、认知适应机制和协作边缘部署的未来方向，为构建可扩展、自适应且资源高效的移动AI代理提供统一框架，助力解决AI在资源受限环境中的部署难题。
    key_points_zh:
    - 基础模型与AI代理融合推动自主性、泛化性和自省能力的提升
    - 移动设备资源限制与应用需求之间存在根本矛盾，需平衡能耗与性能
    - 关键技术包括弹性推理、测试时适应和动态多模态集成以优化资源利用
    - 核心挑战在于精度-延迟-通信权衡及分布偏移下的鲁棒性维持
    - 未来方向聚焦算法-系统协同设计、认知适应机制和协作边缘部署
