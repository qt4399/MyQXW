    arxiv_id: 2507.21385v1
    title_en: Deep Reinforcement Learning-based Cell DTX/DRX Configuration for Network
      Energy Saving
    title_zh: 基于深度强化学习的小区DTX/DRX配置实现网络节能
    pdf_url: https://arxiv.org/pdf/2507.21385v1.pdf
    summary_en: 3GPP Release 18 cell discontinuous transmission and reception (cell
      DTX/DRX) is an important new network energy saving feature for 5G. As a time-domain
      technique, it periodically aggregates the user data transmissions in a given
      duration of time when the traffic load is not heavy, so that the remaining time
      can be kept silent and advanced sleep modes (ASM) can be enabled to shut down
      more radio components and save more energy for the cell. However, inevitably
      the packet delay is increased, as during the silent period no transmission is
      allowed. In this paper we study how to configure cell DTX/DRX to optimally balance
      energy saving and packet delay, so that for delay-sensitive traffic maximum
      energy saving can be achieved while the degradation of quality of service (QoS)
      is minimized. As the optimal configuration can be different for different network
      and traffic conditions, the problem is complex and we resort to deep reinforcement
      learning (DRL) framework to train an AI agent to solve it. Through careful design
      of 1) the learning algorithm, which implements a deep Q-network (DQN) on a contextual
      bandit (CB) model, and 2) the reward function, which utilizes a smooth approximation
      of a theoretically optimal but discontinuous reward function, we are able to
      train an AI agent that always tries to select the best possible Cell DTX/DRX
      configuration under any network and traffic conditions. Simulation results show
      that compared to the case when cell DTX/DRX is not used, our agent can achieve
      up to ~45% energy saving depending on the traffic load scenario, while always
      maintaining no more than ~1% QoS degradation.
    summary_zh: 3GPP Release 18引入的小区不连续传输与接收（cell DTX/DRX）是5G网络关键节能技术，通过周期性聚合用户数据传输并启用静默期，使基站进入高级睡眠模式以关闭射频组件，从而显著降低能耗。然而，静默期不可避免地增加数据包延迟，影响服务质量。本文研究如何动态配置cell
      DTX/DRX参数以最优平衡节能与延迟，尤其针对延迟敏感流量实现最大节能同时最小化QoS降级。鉴于网络条件和流量负载的复杂性，我们设计深度强化学习框架训练AI代理：采用上下文赌博机模型实现深度Q网络学习算法，并创新使用平滑近似奖励函数解决理论最优但不连续的问题。仿真结果表明，相比未启用DTX/DRX的场景，该代理在不同流量负载下最高实现45%的节能效果，同时将QoS降级严格控制在1%以内，为移动网络提供了自适应节能方案。
    key_points_zh:
    - cell DTX/DRX技术通过周期性静默期关闭射频组件，是5G网络核心节能手段
    - 深度强化学习框架动态优化配置参数，平衡能耗节省与数据包延迟
    - 采用深度Q网络在上下文赌博机模型上实现高效学习算法
    - 奖励函数设计使用平滑近似技术确保训练稳定性和性能
    - 实测最高节能45%且QoS降级不超过1%，满足严格服务质量要求
    - 自适应适配不同网络条件，为移动基站提供智能节能策略
