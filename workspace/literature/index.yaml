    title_en: 'BeeCup: A Bio-Inspired Energy-Efficient Clustering Protocol for Mobile
      Learning'
    title_zh: BeeCup：一种受生物启发的移动学习节能聚类协议
    pdf_url: https://arxiv.org/pdf/2008.05852v1.pdf
    summary_en: Mobile devices have become a popular tool for ubiquitous learning
      in recent years. Multiple mobile users can be connected via ad hoc networks
      for the purpose of learning. In this context, due to limited battery capacity,
      energy efficiency of mobile devices becomes a very important factor that remarkably
      affects the user experience of mobile learning. Based on the artificial bee
      colony (ABC) algorithm, we propose a new clustering protocol, namely BeeCup,
      to save the energy of mobile devices while guaranteeing the quality of learning.
      The BeeCup protocol takes advantage of biologically-inspired computation, with
      focus on improving the energy efficiency of mobile devices. It first estimates
      the number of cluster heads (CHs) adaptively according to the network scale,
      and then selects the CHs by employing the ABC algorithm. In case some CHs consume
      energy excessively, clusters will be dynamically updated to keep energy consumption
      balanced within the whole network. Simulation results demonstrate the effectiveness
      and superiority of the proposed protocol.
    summary_zh: 随着移动设备在无处不在学习中的广泛应用，用户通过临时网络连接进行协作学习已成为常态。但受限于电池容量，设备能效问题严重制约用户体验。针对此，本研究基于人工蜂群算法提出BeeCup协议，一种创新的生物启发式节能聚类机制。该协议通过自适应估计网络规模动态确定簇头数量，并利用人工蜂群算法智能选择最优簇头节点，有效避免局部能耗过载。当检测到簇头能耗失衡时，协议自动触发集群动态重组，确保全网能量消耗均匀分布。仿真测试证实，BeeCup在保证学习质量的前提下，显著降低通信能耗，延长网络生命周期。相较于传统方法，其能效提升明显，尤其适用于资源受限的移动学习场景，为移动教育应用提供了可落地的节能框架。
    key_points_zh:
    - 基于人工蜂群算法设计BeeCup协议，专为移动学习场景优化能效
    - 自适应估计簇头数量，根据网络规模动态调整聚类结构
    - 采用生物启发式计算智能选择簇头，减少冗余通信开销
    - 实施动态集群更新机制，实时平衡全网能耗分布
    - 仿真验证协议在维持学习质量的同时大幅降低能量消耗
    - 有效延长移动设备续航时间，提升学习应用用户体验
