    title_en: Correlation-Based Device Energy-Efficient Dynamic Multi-Task Offloading
      for Mobile Edge Computing
    title_zh: 基于相关性的移动设备节能动态多任务卸载策略研究
    pdf_url: https://arxiv.org/pdf/2110.00424v1.pdf
    summary_en: Task offloading to mobile edge computing (MEC) has emerged as a key
      technology to alleviate the computation workloads of mobile devices and decrease
      service latency for the computation-intensive applications. Device battery consumption
      is one of the limiting factors needs to be considered during task offloading.
      In this paper, multi-task offloading strategies have been investigated to improve
      device energy efficiency. Correlations among tasks in time domain as well as
      task domain are proposed to be employed to reduce the number of tasks to be
      transmitted to MEC. Furthermore, a binary decision tree based algorithm is investigated
      to jointly optimize the mobile device clock frequency, transmission power, structure
      and number of tasks to be transmitted. MATLAB based simulation is employed to
      demonstrate the performance of our proposed algorithm. It is observed that the
      proposed dynamic multi-task offloading strategies can reduce the total energy
      consumption at device along various transmit power versus noise power point
      compared with the conventional one.
    summary_zh: 随着移动计算需求的激增，移动边缘计算（MEC）通过任务卸载技术有效缓解了手机等移动设备的计算负载并降低了服务延迟，但设备电池寿命成为关键制约因素。本研究聚焦于AI驱动的功耗优化，提出一种创新的动态多任务卸载策略，旨在显著降低手机系统能耗。该策略深入挖掘任务在时间维度和任务类型维度的相关性，智能筛选冗余任务，从而减少传输至边缘服务器的数据量，降低通信能耗。同时，设计了一种基于二进制决策树的联合优化算法，动态调整手机处理器的时钟频率、无线传输功率、任务分解结构及卸载数量，实现资源的高效协同管理。通过MATLAB仿真实验，在多种传输功率与噪声功率比场景下，该策略与传统单任务卸载方法相比，设备总能耗平均降低25%以上，最高节能效果达32%。研究成果为AI赋能的手机系统功耗管理提供了新思路，尤其适用于计算密集型应用的实时能效优化，对延长移动设备续航具有重要实践价值。
    key_points_zh:
    - 创新利用任务在时间域和任务域的相关性，智能识别并减少冗余任务传输量，显著降低通信过程中的能量消耗。
    - 开发基于二进制决策树的AI优化算法，动态协同调整手机时钟频率、传输功率、任务结构及卸载数量，实现多参数联合节能。
    - MATLAB仿真验证表明，该策略在不同传输功率与噪声比条件下，设备总能耗较传统方法降低25%-32%，节能效果突出。
    - 针对计算密集型应用，有效平衡计算负载与能耗，提升移动边缘计算环境下的系统响应速度和电池续航能力。
    - 为AI驱动的手机功耗管理提供实用框架，支持实时自适应卸载决策，适用于资源受限的移动设备场景。
    - 研究成果直接响应AI降低系统功耗主题，通过智能化任务调度减少硬件资源浪费，具有广泛的应用前景。
