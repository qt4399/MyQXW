    title_en: Deep Learning on Mobile Devices - A Review
    title_zh: 移动设备上的深度学习：综述
    pdf_url: https://arxiv.org/pdf/1904.09274v1.pdf
    summary_en: Recent breakthroughs in deep learning and artificial intelligence
      technologies have enabled numerous mobile applications. While traditional computation
      paradigms rely on mobile sensing and cloud computing, deep learning implemented
      on mobile devices provides several advantages. These advantages include low
      communication bandwidth, small cloud computing resource cost, quick response
      time, and improved data privacy. Research and development of deep learning on
      mobile and embedded devices has recently attracted much attention. This paper
      provides a timely review of this fast-paced field to give the researcher, engineer,
      practitioner, and graduate student a quick grasp on the recent advancements
      of deep learning on mobile devices. In this paper, we discuss hardware architectures
      for mobile deep learning, including Field Programmable Gate Arrays, Application
      Specific Integrated Circuit, and recent mobile Graphic Processing Units. We
      present Size, Weight, Area and Power considerations and their relation to algorithm
      optimizations, such as quantization, pruning, compression, and approximations
      that simplify computation while retaining performance accuracy. We cover existing
      systems and give a state-of-the-industry review of TensorFlow, MXNet, Mobile
      AI Compute Engine, and Paddle-mobile deep learning platform. We discuss resources
      for mobile deep learning practitioners, including tools, libraries, models,
      and performance benchmarks. We present applications of various mobile sensing
      modalities to industries, ranging from robotics, healthcare and multi-media,
      biometrics to autonomous drive and defense. We address the key deep learning
      challenges to overcome, including low quality data, and small training/adaptation
      data sets. In addition, the review provides numerous citations and links to
      existing code bases implementing various technologies.
    summary_zh: 本文系统综述了移动设备上深度学习技术的最新进展，重点聚焦于降低系统功耗的创新方法。随着人工智能技术的突破，移动应用日益普及，但传统云依赖模式导致高带宽消耗和资源浪费。在设备端部署深度学习可显著减少通信开销、降低云服务成本、提升响应速度并保障数据隐私。文章深入分析了适用于移动场景的硬件架构，包括现场可编程门阵列（FPGA）、专用集成电路（ASIC）和移动图形处理器（GPU），并探讨了尺寸、重量、面积与功耗（SWaP）约束对算法优化的影响。核心内容涵盖量化、剪枝、压缩及近似等技术，这些方法通过简化计算流程而维持精度，有效降低能耗。同时，回顾了TensorFlow
      Lite、MXNet、Mobile AI Compute Engine和Paddle-mobile等平台的行业现状，评估了工具库、模型资源及性能基准。应用案例涉及机器人、医疗健康、多媒体、生物识别、自动驾驶和国防领域，展示了本地化处理对功耗的优化效果。最后，指出了低质量数据和小规模训练集等挑战，为研究者提供了全面的实践参考，助力移动系统能效提升。
    key_points_zh:
    - 移动设备端深度学习减少通信带宽需求，避免云端传输高能耗，显著降低整体系统功耗。
    - 硬件架构优化如FPGA和ASIC专为低功耗设计，提升能效比并适应移动设备资源限制。
    - 算法技术如量化、剪枝和压缩简化计算复杂度，在保持精度的同时大幅削减能耗。
    - 主流深度学习平台集成功耗管理工具，动态优化资源分配以延长电池续航。
    - 应用领域通过本地数据处理减少外部依赖，有效缓解移动系统功耗压力。
