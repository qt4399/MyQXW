    title_en: Dynamic DNNs Meet Runtime Resource Management on Mobile and Embedded
      Platforms
    title_zh: 动态深度神经网络在移动及嵌入式平台上的运行时资源管理优化
    pdf_url: https://arxiv.org/pdf/2206.02525v2.pdf
    summary_en: 'Deep neural network (DNN) inference is increasingly being executed
      on mobile and embedded platforms due to low latency and better privacy. However,
      efficient deployment on these platforms is challenging due to the intensive
      computation and memory access. We propose a holistic system design for DNN performance
      and energy optimisation, combining the trade-off opportunities in both algorithms
      and hardware. The system can be viewed as three abstract layers: the device
      layer contains heterogeneous computing resources; the application layer has
      multiple concurrent workloads; and the runtime resource management layer monitors
      the dynamically changing algorithms'' performance targets as well as hardware
      resources and constraints, and tries to meet them by tuning the algorithm and
      hardware at the same time. Moreover, We illustrate the runtime approach through
      a dynamic version of ''once-for-all network'' (namely Dynamic-OFA), which can
      scale the ConvNet architecture to fit heterogeneous computing resources efficiently
      and has good generalisation for different model architectures such as Transformer.
      Compared to the state-of-the-art Dynamic DNNs, our experimental results using
      ImageNet on a Jetson Xavier NX show that the Dynamic-OFA is up to 3.5x (CPU),
      2.4x (GPU) faster for similar ImageNet Top-1 accuracy, or 3.8% (CPU), 5.1% (GPU)
      higher accuracy at similar latency. Furthermore, compared with Linux governor
      (e.g. performance, schedutil), our runtime approach reduces the energy consumption
      by 16.5% at similar latency.'
    summary_zh: 随着深度神经网络（DNN）推理在移动和嵌入式平台上的广泛应用，其低延迟和隐私保护优势日益凸显，但计算和内存访问密集的特性使得高效部署面临严峻挑战。本文提出一种创新的整体系统设计，通过深度融合算法与硬件的权衡机会来优化DNN性能和能耗。该系统架构清晰分为三层：设备层整合异构计算资源；应用层管理多个并发工作负载；运行时资源管理层实时监控动态变化的算法性能目标和硬件资源约束，并智能调整算法与硬件配置以满足需求。作为核心实现，我们开发了动态版'一次为所有网络'（Dynamic-OFA），该技术能高效缩放卷积神经网络架构以适应多样化的异构计算资源，并对Transformer等不同模型架构展现出卓越的泛化能力。在Jetson
      Xavier NX嵌入式平台上，基于ImageNet数据集的全面实验验证表明，与当前最先进的动态DNN方法相比，Dynamic-OFA在保持相似Top-1准确率时，CPU和GPU推理速度分别提升3.5倍和2.4倍；或在相似延迟条件下，CPU和GPU的准确率分别提高3.8%和5.1%。此外，与Linux标准调度器（如performance和schedutil）相比，本方法在维持相似延迟的同时，显著降低系统能耗达16.5%，为移动设备的能效优化提供了有效解决方案。
    key_points_zh:
    - 提出三层系统架构（设备层、应用层、运行时资源管理层），实现算法与硬件的协同优化，提升DNN部署效率。
    - 开发动态版'一次为所有网络'（Dynamic-OFA），支持高效缩放卷积神经网络架构，适应异构计算资源，并对Transformer等模型具有良好泛化性。
    - 实验显示在Jetson Xavier NX平台上，Dynamic-OFA显著提升推理速度：CPU快3.5倍，GPU快2.4倍（相似准确率）。
    - 在相似延迟下，Dynamic-OFA提高ImageNet Top-1准确率：CPU高3.8%，GPU高5.1%。
    - 相比Linux调度器，该方法降低能耗16.5%，同时保持相似延迟，有效优化移动设备能效。
