    title_en: Pareto-guided Pipeline for Distilling Featherweight AI Agents in Mobile
      MOBA Games
    title_zh: 帕累托引导的移动MOBA游戏中轻量级AI代理蒸馏管道
    pdf_url: https://arxiv.org/pdf/2602.07521v1.pdf
    summary_en: Recent advances in game AI have demonstrated the feasibility of training
      agents that surpass top-tier human professionals in complex environments such
      as Honor of Kings (HoK), a leading mobile multiplayer online battle arena (MOBA)
      game. However, deploying such powerful agents on mobile devices remains a major
      challenge. On one hand, the intricate multi-modal state representation and hierarchical
      action space of HoK demand large, sophisticated policy networks that are inherently
      difficult to compress into lightweight forms. On the other hand, production
      deployment requires high-frequency inference under strict energy and latency
      constraints on mobile platform. To the best of our knowledge, bridging large-scale
      game AI and practical on-device deployment has not been systematically studied.
      In this work, we propose a Pareto optimality guided pipeline and design a high-efficiency
      student architecture search space tailored for mobile execution, enabling systematic
      exploration of the trade-off between performance and efficiency. Experimental
      results demonstrate that the distilled model achieves remarkable efficiency,
      including an $12.4\times$ faster inference speed (under 0.5ms per frame) and
      a $15.6\times$ improvement in energy efficiency (under 0.5mAh per game), while
      retaining a 40.32% win rate against the original teacher model.
    summary_zh: 近年来，游戏AI技术已成功训练出在《王者荣耀》等复杂移动多人在线战术竞技游戏中超越顶级人类职业选手的智能代理。然而，将此类高性能代理部署到移动设备面临严峻挑战：一方面，游戏的多模态状态表示和分层动作空间要求大型复杂策略网络，难以压缩为轻量级模型；另一方面，实际部署需在移动平台严格的能效与延迟约束下实现高频推理。目前，桥接大规模游戏AI与移动端落地的系统性研究尚属空白。本研究创新性地提出帕累托最优引导的蒸馏管道，并设计专为移动执行优化的高效学生架构搜索空间，系统探索性能与效率的权衡边界。实验结果表明，蒸馏后的轻量级模型显著提升运行效率，推理速度达到每帧低于0.5毫秒（较原模型提升12.4倍），能效优化至每局游戏能耗低于0.5毫安时（提升15.6倍），同时保持对原始教师模型40.32%的胜率，为移动端AI部署提供了实用解决方案。
    key_points_zh:
    - 提出帕累托最优引导的蒸馏管道，解决移动MOBA游戏中AI代理部署的能效瓶颈
    - 设计针对移动平台的高效学生架构搜索空间，系统优化性能与能耗的权衡关系
    - 克服多模态状态表示和分层动作空间导致的模型压缩难题
    - 实现推理速度12.4倍提升（每帧<0.5ms），显著降低延迟
    - 达成能效15.6倍改进（每局<0.5mAh），大幅延长设备续航
    - 在保持40.32%胜率的前提下确保代理性能
