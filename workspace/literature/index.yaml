    title_en: Toward Cross-Layer Energy Optimizations in AI Systems
    title_zh: 面向AI系统的跨层能量优化研究
    pdf_url: https://arxiv.org/pdf/2404.06675v2.pdf
    summary_en: 'The "AI for Science, Energy, and Security" report from DOE outlines
      a significant focus on developing and optimizing artificial intelligence workflows
      for a foundational impact on a broad range of DOE missions. With the pervasive
      usage of artificial intelligence (AI) and machine learning (ML) tools and techniques,
      their energy efficiency is likely to become the gating factor toward adoption.
      This is because generative AI (GenAI) models are massive energy hogs: for instance,
      training a 200-billion parameter large language model (LLM) at Amazon is estimated
      to have taken 11.9 GWh, which is enough to power more than a thousand average
      U.S. households for a year. Inference consumes even more energy, because a model
      trained once serve millions. Given this scale, high energy efficiency is key
      to addressing the power delivery problem of constructing and operating new supercomputers
      and datacenters specialized for AI workloads. In that regard, we outline software-
      and architecture-level research challenges and opportunities, setting the stage
      for creating cross-layer energy optimizations in AI systems.'
    summary_zh: 美国能源部发布的《AI for Science, Energy, and Security》报告强调了人工智能工作流优化对能源部核心任务的战略意义。随着AI和机器学习技术的普及，其能源效率已成为制约广泛应用的关键瓶颈。生成式AI模型能耗极高，例如在亚马逊训练一个2000亿参数的大语言模型估计消耗11.9吉瓦时电力，足以供应千余个美国家庭一年用电；而推理过程因单次训练服务海量用户，总体能耗更为惊人。在此背景下，高能效解决方案对缓解AI专用超级计算机和数据中心的电力供应压力至关重要。本文系统梳理了软件与硬件架构层面的研究挑战与机遇，提出跨层协同优化框架，旨在通过算法创新和系统设计降低能耗。特别针对移动设备领域，该框架可适配智能手机AI应用，显著减少系统功耗并延长电池续航，为资源受限场景提供实用路径。
    key_points_zh:
    - 生成式AI模型训练与推理过程能耗巨大，成为AI部署的主要制约因素
    - 跨层能量优化需整合软件算法与硬件架构的协同设计
    - 针对手机系统，优化策略可降低AI应用功耗并提升能效
    - 美国能源部报告指出AI工作流优化对能源任务具有基础性影响
    - 未来研究应聚焦推理阶段能耗削减，因单次训练服务规模庞大
