    title_en: Neural Contextual Bandits Based Dynamic Sensor Selection for Low-Power
      Body-Area Networks
    title_zh: 基于神经上下文赌博机的动态传感器选择用于低功耗体域网络
    pdf_url: https://arxiv.org/pdf/2205.11832v1.pdf
    summary_en: 'Providing health monitoring devices with machine intelligence is
      important for enabling automatic mobile healthcare applications. However, this
      brings additional challenges due to the resource scarcity of these devices.
      This work introduces a neural contextual bandits based dynamic sensor selection
      methodology for high-performance and resource-efficient body-area networks to
      realize next generation mobile health monitoring devices. The methodology utilizes
      contextual bandits to select the most informative sensor combinations during
      runtime and ignore redundant data for decreasing transmission and computing
      power in a body area network (BAN). The proposed method has been validated using
      one of the most common health monitoring applications: cardiac activity monitoring.
      Solutions from our proposed method are compared against those from related works
      in terms of classification performance and energy while considering the communication
      energy consumption. Our final solutions could reach $78.8\%$ AU-PRC on the PTB-XL
      ECG dataset for cardiac abnormality detection while decreasing the overall energy
      consumption and computational energy by $3.7 \times$ and $4.3 \times$, respectively.'
    summary_zh: 随着移动医疗应用的快速发展，为健康监测设备集成机器智能对实现自动化服务至关重要，但设备资源稀缺性带来了显著挑战。本研究提出一种基于神经上下文赌博机的动态传感器选择方法，旨在构建高性能且资源高效的体域网络，以支持下一代移动健康监测设备。该方法在运行时利用上下文赌博机算法动态筛选最具信息量的传感器组合，主动忽略冗余数据流，从而有效降低体域网络中的数据传输功耗和计算能耗。研究以心脏活动监测这一典型健康应用为验证场景，将所提方案与现有工作在分类性能和能耗指标上进行系统对比。实验结果表明，在PTB-XL
      ECG数据集上，该方法实现了78.8%的AU-PRC心脏异常检测准确率，同时整体能耗降低3.7倍，计算能耗降低4.3倍。这一成果为资源受限的移动AI系统提供了可落地的低功耗优化路径，显著提升了健康监测设备的续航能力与实用性。
    key_points_zh:
    - 提出基于神经上下文赌博机的动态传感器选择机制，实时优化数据采集过程
    - 通过筛选高信息量传感器组合并剔除冗余数据，有效降低传输与计算功耗
    - 在心脏监测应用中验证，达到78.8% AU-PRC的异常检测准确率
    - 整体能耗降低3.7倍，计算能耗降低4.3倍，显著提升能效比
    - 适用于资源受限的体域网络设备，为移动健康监测提供实用解决方案
