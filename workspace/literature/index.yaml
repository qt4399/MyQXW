    title_en: 'ClawMobile: Rethinking Smartphone-Native Agentic Systems'
    title_zh: ClawMobile：重新思考智能手机原生代理系统
    pdf_url: https://arxiv.org/pdf/2602.22942v1.pdf
    summary_en: "Smartphones represent a uniquely challenging environment for agentic\
      \ systems. Unlike cloud or desktop settings, mobile devices combine constrained\
      \ execution contexts, fragmented control interfaces, and rapidly changing application\
      \ states. As large language models (LLMs) evolve from conversational assistants\
      \ to action-oriented agents, achieving reliable smartphone-native autonomy requires\
      \ rethinking how reasoning and control are composed.\n  We introduce ClawMobile\
      \ as a concrete exploration of this design space. ClawMobile adopts a hierarchical\
      \ architecture that separates high-level language reasoning from structured,\
      \ deterministic control pathways, improving execution stability and reproducibility\
      \ on real devices. Using ClawMobile as a case study, we distill the design principles\
      \ for mobile LLM runtimes and identify key challenges in efficiency, adaptability,\
      \ and stability. We argue that building robust smartphone-native agentic systems\
      \ demands principled coordination between probabilistic planning and deterministic\
      \ system interfaces. The implementation is open-sourced~\\footnote{https://github.com/ClawMobile/ClawMobile}\
      \ to facilitate future exploration."
    summary_zh: 智能手机作为代理系统的运行环境面临独特挑战，包括执行资源严重受限、控制界面高度碎片化以及应用状态瞬息万变。随着大型语言模型（LLMs）从对话助手演变为行动导向代理，实现可靠的智能手机原生自主性需重新设计推理与控制的组合方式。本文提出ClawMobile，一种分层架构，将高级语言推理层与底层结构化、确定性控制路径分离，有效避免因状态不确定性导致的执行失败，显著提升真实设备上的执行稳定性和结果可重复性。通过案例研究，我们系统提炼移动LLM运行时的设计原则，重点聚焦能源效率优化：通过减少冗余计算、优化资源调度和降低无效操作频率，大幅削减系统功耗；同时兼顾适应性与稳定性挑战，确保代理在多变场景下高效运行。研究表明，构建鲁棒的智能手机原生代理系统必须实现概率规划与确定性系统接口的协同工作，该开源框架为未来研究提供了实践基础。
    key_points_zh:
    - 提出分层架构ClawMobile，分离高级推理与底层控制路径，提升执行稳定性并减少因失败重试导致的额外功耗
    - 通过结构化控制机制降低状态不确定性，避免无效操作，显著优化资源调度以降低系统能耗
    - 聚焦移动LLM运行时效率，识别并解决能源消耗关键点，包括计算冗余削减和动态资源分配
    - 强调概率规划与确定性接口的协调，确保代理在碎片化环境中高效运行，减少CPU空转时间
    - 开源实现促进社区协作，加速功耗优化技术的迭代与应用验证
