    title_en: 'InFi: End-to-End Learning to Filter Input for Resource-Efficiency in
      Mobile-Centric Inference'
    title_zh: InFi：面向移动端推理的端到端输入过滤学习以提升资源效率
    pdf_url: https://arxiv.org/pdf/2209.13873v3.pdf
    summary_en: 'Mobile-centric AI applications have high requirements for resource-efficiency
      of model inference. Input filtering is a promising approach to eliminate the
      redundancy so as to reduce the cost of inference. Previous efforts have tailored
      effective solutions for many applications, but left two essential questions
      unanswered: (1) theoretical filterability of an inference workload to guide
      the application of input filtering techniques, thereby avoiding the trial-and-error
      cost for resource-constrained mobile applications; (2) robust discriminability
      of feature embedding to allow input filtering to be widely effective for diverse
      inference tasks and input content. To answer them, we first formalize the input
      filtering problem and theoretically compare the hypothesis complexity of inference
      models and input filters to understand the optimization potential. Then we propose
      the first end-to-end learnable input filtering framework that covers most state-of-the-art
      methods and surpasses them in feature embedding with robust discriminability.
      We design and implement InFi that supports six input modalities and multiple
      mobile-centric deployments. Comprehensive evaluations confirm our theoretical
      results and show that InFi outperforms strong baselines in applicability, accuracy,
      and efficiency. InFi achieve 8.5x throughput and save 95% bandwidth, while keeping
      over 90% accuracy, for a video analytics application on mobile platforms.'
    summary_zh: 移动端AI应用对模型推理的资源效率要求极高，输入过滤作为一种消除冗余以降低推理成本的有效方法，仍面临两大关键挑战：推理工作负载的理论可过滤性指导不足，导致资源受限应用需反复试错；特征嵌入缺乏鲁棒区分性，难以适应多样化任务与输入内容。本文首先形式化输入过滤问题，通过理论比较推理模型与过滤器的假设复杂度，揭示优化潜力。进而提出首个端到端可学习的输入过滤框架InFi，该框架覆盖主流方法并显著增强特征嵌入的鲁棒性，支持六种输入模态及多种移动端部署方案。综合实验验证了理论分析的正确性，结果表明InFi在适用性、准确率和效率上全面超越基线模型。在移动平台视频分析应用中，InFi实现8.5倍吞吐量提升，节省95%网络带宽，同时保持90%以上的高精度，为资源受限场景提供了高效解决方案。
    key_points_zh:
    - 形式化输入过滤问题，理论分析推理模型与过滤器的假设复杂度差异，明确优化边界
    - 提出端到端可学习框架InFi，通过增强特征嵌入的鲁棒区分性提升过滤效果
    - 支持六种输入模态及多平台部署，显著扩展技术适用范围
    - 实验显示吞吐量提升8.5倍，带宽节省95%，兼顾高精度与低资源消耗
    - 为移动端AI提供免试错的理论指导，降低资源受限应用的开发成本
