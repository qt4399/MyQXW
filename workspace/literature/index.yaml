    title_en: Energy Efficiency Optimization for MIMO-OFDM Mobile Multimedia Communication
      Systems with QoS Constraints
    title_zh: 基于QoS约束的MIMO-OFDM移动多媒体通信系统能量效率优化
    pdf_url: https://arxiv.org/pdf/1412.6130v1.pdf
    summary_en: It is widely recognized that besides the quality of service (QoS),
      the energy efficiency is also a key parameter in designing and evaluating mobile
      multimedia communication systems, which has catalyzed great interest in recent
      literature. In this paper, an energy efficiency model is first proposed for
      multiple-input multiple-output orthogonal-frequency-division-multiplexing (MIMO-OFDM)
      mobile multimedia communication systems with statistical QoS constraints. Employing
      the channel matrix singular-value-decomposition (SVD) method, all subchannels
      are classified by their channel characteristics. Furthermore, the multi-channel
      joint optimization problem in conventional MIMO-OFDM communication systems is
      transformed into a multi-target single channel optimization problem by grouping
      all subchannels. Therefore, a closed-form solution of the energy efficiency
      optimization is derived for MIMO-OFDM mobile mlutimedia communication systems.
      As a consequence, an energy-efficiency optimized power allocation (EEOPA) algorithm
      is proposed to improve the energy efficiency of MIMO-OFDM mobile multimedia
      communication systems. Simulation comparisons validate that the proposed EEOPA
      algorithm can guarantee the required QoS with high energy efficiency in MIMO-OFDM
      mobile multimedia communication systems.
    summary_zh: 在移动多媒体通信系统的设计与评估中，能量效率与服务质量（QoS）同等关键，是近年来研究热点。本文针对具有统计QoS约束的多输入多输出正交频分复用（MIMO-OFDM）移动多媒体通信系统，提出了一种创新的能量效率优化模型。通过采用信道矩阵奇异值分解（SVD）方法，系统依据信道特性对所有子信道进行分类，并将传统多信道联合优化问题转化为多目标单信道优化问题，从而简化求解过程。在此基础上，推导出能量效率优化的闭式解，并设计了能量效率优化功率分配（EEOPA）算法。该算法通过智能功率分配策略，在满足QoS要求的同时最大化系统能量效率，有效降低手机系统功耗。仿真结果表明，EEOPA算法在各种信道条件下均能显著提升能量效率，保证服务质量，为移动设备节能提供了实用解决方案，适用于实际通信系统部署。
    key_points_zh:
    - 提出MIMO-OFDM移动多媒体通信系统的能量效率优化模型，整合统计QoS约束
    - 应用SVD技术对子信道分类，将多信道优化问题简化为单信道优化
    - 推导能量效率优化的闭式解，实现高效求解与实时应用
    - 设计EEOPA算法通过智能功率分配平衡QoS与能量效率
    - 仿真验证算法在保证服务质量的同时显著降低系统功耗
