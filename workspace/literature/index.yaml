    title_en: 'Fast Camera Image Denoising on Mobile GPUs with Deep Learning, Mobile
      AI 2021 Challenge: Report'
    title_zh: 基于深度学习的移动GPU快速相机图像去噪：Mobile AI 2021挑战赛报告
    pdf_url: https://arxiv.org/pdf/2105.08629v1.pdf
    summary_en: Image denoising is one of the most critical problems in mobile photo
      processing. While many solutions have been proposed for this task, they are
      usually working with synthetic data and are too computationally expensive to
      run on mobile devices. To address this problem, we introduce the first Mobile
      AI challenge, where the target is to develop an end-to-end deep learning-based
      image denoising solution that can demonstrate high efficiency on smartphone
      GPUs. For this, the participants were provided with a novel large-scale dataset
      consisting of noisy-clean image pairs captured in the wild. The runtime of all
      models was evaluated on the Samsung Exynos 2100 chipset with a powerful Mali
      GPU capable of accelerating floating-point and quantized neural networks. The
      proposed solutions are fully compatible with any mobile GPU and are capable
      of processing 480p resolution images under 40-80 ms while achieving high fidelity
      results. A detailed description of all models developed in the challenge is
      provided in this paper.
    summary_zh: 图像去噪是移动照片处理的核心难题，现有方案多依赖合成数据且计算成本过高，难以在移动设备实时运行。为此，本文发起首届Mobile AI挑战赛，旨在开发端到端深度学习去噪方案以适配智能手机GPU。参赛者基于野外捕获的大规模真实噪声-干净图像对数据集进行模型训练，确保方案实用性。所有模型在搭载Mali
      GPU的三星Exynos 2100芯片组上严格评估，该GPU支持浮点与量化神经网络加速。最终方案完全兼容主流移动GPU，可在40-80毫秒内处理480p分辨率图像，同时保持高保真视觉效果。详细分析了各参赛模型的架构创新与效率优化策略，证明深度学习方法能有效平衡移动端去噪的实时性与质量需求，为行业提供可落地的高效解决方案。
    key_points_zh:
    - 针对移动设备推出首个真实场景图像去噪挑战赛，解决合成数据泛化性不足问题
    - 构建大规模野外噪声-干净图像对数据集，提升模型实际部署可靠性
    - 开发的深度学习模型兼容各类移动GPU，480p图像处理仅需40-80毫秒
    - 在三星Exynos 2100平台验证高能效性，兼顾实时性能与图像保真度
    - 总结模型优化策略，为移动端AI图像处理提供可复用的技术路径
