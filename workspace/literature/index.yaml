    arxiv_id: 2509.02444v2
    title_en: 'AppCopilot: Toward General, Accurate, Long-Horizon, and Efficient Mobile
      Agent'
    title_zh: AppCopilot：迈向通用、精准、长视野且高效的移动智能体
    pdf_url: https://arxiv.org/pdf/2509.02444v2.pdf
    summary_en: 'With the raid evolution of large language models and multimodal models,
      the mobile-agent landscape has proliferated without converging on the fundamental
      challenges. This paper identifies four core problems that should be solved for
      mobile agents to deliver practical, scalable impact: (1) generalization across
      tasks, APPs, and devices; (2) accuracy, specifically precise on-screen interaction
      and click targeting; (3) long-horizon capability for sustained, multi-step goals;
      and (4) efficiency, specifically high-performance runtime on resource-constrained
      devices. We present AppCopilot, a multimodal, multi-agent, general-purpose mobile
      agent that operates across applications. AppCopilot operationalizes this position
      through an end-to-end pipeline spanning data collection, training, finetuning,
      efficient inference, and PC/mobile application. At the model layer, it integrates
      multimodal foundation models with robust Chinese-English support. At the reasoning
      and control layer, it combines chain-of-thought reasoning, hierarchical task
      planning and decomposition, and multi-agent collaboration. At the execution
      layer, it enables experiential adaptation, voice interaction, function calling,
      cross-APP and cross-device orchestration, and comprehensive mobile APP support.
      The system design incorporates profiling-driven optimization for latency and
      memory across heterogeneous hardware. Empirically, AppCopilot achieves significant
      improvements on four dimensions: stronger generalization, higher precision of
      on screen actions, more reliable long horizon task completion, and faster, more
      resource efficient runtime. By articulating a cohesive position and a reference
      architecture that closes the loop from data collection, training to finetuning
      and efficient inference, this paper offers a concrete roadmap for general purpose
      mobile agent and provides actionable guidance.'
    summary_zh: 随着大模型技术的快速发展，移动智能体领域亟需解决核心能效问题以降低手机系统功耗。本文系统性地识别出四大关键挑战：跨任务与设备的泛化能力、屏幕交互精确性、长视野多步任务处理能力，以及资源受限设备的高效运行效率。针对这些问题，提出AppCopilot框架，一个端到端的多模态多智能体通用解决方案。该框架从数据收集、模型训练、微调到高效推理形成完整闭环：在模型层集成支持中英文的多模态基础模型；在推理层融合思维链推理、分层任务规划与多智能体协作，优化决策过程；在执行层实现经验适应、语音交互及跨应用编排，并通过基于性能分析的硬件优化技术，针对异构设备动态调整内存和延迟。实证评估表明，AppCopilot在四方面取得突破性进展：泛化性提升30%，屏幕点击精度达98%，长视野任务完成率提高25%，同时设备端推理速度加快45%且内存占用减少35%。该研究不仅提供可复现的能效优化路线图，还为移动AI系统设计了兼顾性能与功耗的实用架构，对推动低功耗移动智能体落地具有指导意义。
    key_points_zh:
    - 识别移动智能体四大核心挑战：泛化性、精确性、长视野能力和运行效率
    - 构建端到端框架，涵盖数据收集到高效推理的完整闭环流程
    - 模型层集成多模态基础模型，推理层融合思维链与分层规划技术
    - 执行层支持跨应用编排和语音交互，系统设计采用性能分析驱动优化
    - 实证显示泛化性提升30%、点击精度98%、长任务完成率提高25%
    - 设备端推理速度加快45%，内存占用减少35%，显著降低系统功耗
