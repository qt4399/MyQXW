    arxiv_id: 2408.14001v2
    title_en: Decentralized Federated Learning with Model Caching on Mobile Agents
    title_zh: 基于模型缓存的移动代理去中心化联邦学习
    pdf_url: https://arxiv.org/pdf/2408.14001v2.pdf
    summary_en: Federated Learning (FL) trains a shared model using data and computation
      power on distributed agents coordinated by a central server. Decentralized FL
      (DFL) utilizes local model exchange and aggregation between agents to reduce
      the communication and computation overheads on the central server. However,
      when agents are mobile, the communication opportunity between agents can be
      sporadic, largely hindering the convergence and accuracy of DFL. In this paper,
      we propose Cached Decentralized Federated Learning (Cached-DFL) to investigate
      delay-tolerant model spreading and aggregation enabled by model caching on mobile
      agents. Each agent stores not only its own model, but also models of agents
      encountered in the recent past. When two agents meet, they exchange their own
      models as well as the cached models. Local model aggregation utilizes all models
      stored in the cache. We theoretically analyze the convergence of Cached-DFL,
      explicitly taking into account the model staleness introduced by caching. We
      design and compare different model caching algorithms for different DFL and
      mobility scenarios. We conduct detailed case studies in a vehicular network
      to systematically investigate the interplay between agent mobility, cache staleness,
      and model convergence. In our experiments, Cached-DFL converges quickly, and
      significantly outperforms DFL without caching.
    summary_zh: 在移动设备系统中，降低功耗是AI应用的关键挑战。本文提出缓存去中心化联邦学习（Cached-DFL）框架，旨在解决移动代理环境中分布式联邦学习（DFL）因通信间歇性导致的收敛缓慢和准确性下降问题。DFL通过代理间本地模型交换减轻中央服务器负担，但移动设备的不稳定性阻碍了其效率。Cached-DFL创新性地引入模型缓存机制：每个移动代理不仅存储自身模型，还缓存近期相遇代理的模型；当代理建立连接时，交换自身及缓存模型，并利用所有缓存数据执行本地聚合。我们严格证明了算法的收敛性，显式量化了缓存引入的模型陈旧性影响，并设计了自适应缓存策略以适配不同移动场景。通过在车辆网络中的系统性实验，深入分析了代理移动性、缓存陈旧性与收敛速度的相互作用。结果表明，Cached-DFL显著减少通信频率和计算开销，从而有效降低手机系统功耗，在保持高模型精度的同时，收敛速度远超无缓存DFL方法，为AI驱动的移动节能提供了实用解决方案。
    key_points_zh:
    - 提出Cached-DFL框架，利用模型缓存机制解决移动代理通信不稳定问题，减少无效通信以降低系统功耗
    - 代理存储自身及缓存模型，相遇时交换并聚合所有可用模型，提升学习效率并削减能耗
    - 理论分析收敛性，显式建模缓存陈旧性影响，确保算法在功耗约束下的鲁棒性
    - 设计多种自适应缓存算法，优化不同移动场景下的功耗与性能平衡
    - 案例研究揭示移动性、缓存策略与功耗降低的关联，指导实际部署应用
    - 实验验证Cached-DFL大幅减少通信开销，显著降低手机系统功耗，性能优于传统方法
    relevance_score: 90
    relevance_reason: 联邦学习减少移动代理通信开销，显著降低手机功耗
