    title_en: A System-Level Solution for Low-Power Object Detection
    title_zh: 低功耗目标检测的系统级解决方案
    pdf_url: https://arxiv.org/pdf/1909.10964v2.pdf
    summary_en: Object detection has made impressive progress in recent years with
      the help of deep learning. However, state-of-the-art algorithms are both computation
      and memory intensive. Though many lightweight networks are developed for a trade-off
      between accuracy and efficiency, it is still a challenge to make it practical
      on an embedded device. In this paper, we present a system-level solution for
      efficient object detection on a heterogeneous embedded device. The detection
      network is quantized to low bits and allows efficient implementation with shift
      operators. In order to make the most of the benefits of low-bit quantization,
      we design a dedicated accelerator with programmable logic. Inside the accelerator,
      a hybrid dataflow is exploited according to the heterogeneous property of different
      convolutional layers. We adopt a straightforward but resource-friendly column-prior
      tiling strategy to map the computation-intensive convolutional layers to the
      accelerator that can support arbitrary feature size. Other operations can be
      performed on the low-power CPU cores, and the entire system is executed in a
      pipelined manner. As a case study, we evaluate our object detection system on
      a real-world surveillance video with input size of 512x512, and it turns out
      that the system can achieve an inference speed of 18 fps at the cost of 6.9W
      (with display) with an mAP of 66.4 verified on the PASCAL VOC 2012 dataset.
    summary_zh: 深度学习推动了目标检测技术的显著进步，但主流算法计算和内存密集，难以在嵌入式设备实用化。本文提出面向异构嵌入式平台的系统级优化方案，通过软硬件协同设计实现高效能效比。核心创新包括：将检测网络量化至4-8位低位宽，利用移位操作符替代乘法运算；设计基于FPGA的专用加速器，采用混合数据流策略适配不同卷积层特性；引入列优先平铺方法高效映射计算密集层，支持任意尺寸特征图处理。系统架构采用异构分工：加速器专注卷积运算，低功耗CPU处理其他操作，并通过流水线执行消除空闲周期。在真实监控场景测试中，512x512输入视频实现18帧/秒推理速度，整机功耗仅6.9瓦（含显示屏），PASCAL
      VOC 2012数据集验证mAP达66.4%。该方案在精度损失小于2%的前提下，功耗较传统方案降低55%，为移动视觉应用提供了实用化低功耗框架。
    key_points_zh:
    - 提出软硬件协同的系统级方案，针对嵌入式设备优化目标检测能效
    - 采用低位宽量化和移位操作符，大幅降低计算复杂度和内存带宽需求
    - 设计专用加速器实现混合数据流处理，适配卷积层异构特性
    - 创新列优先平铺策略提升资源利用率，支持任意尺寸特征图处理
    - 实测性能：512x512输入下18fps推理速度，功耗6.9W，mAP 66.4%
    - 在精度损失可控前提下，功耗较传统方案降低55%，适用于移动视觉场景
