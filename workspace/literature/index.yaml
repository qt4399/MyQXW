    title_en: Towards Sustainability in 6G Network Slicing with Energy-Saving and
      Optimization Methods
    title_zh: 面向6G网络切片的可持续性：节能与优化方法
    pdf_url: https://arxiv.org/pdf/2505.12132v1.pdf
    summary_en: The 6G mobile network is the next evolutionary step after 5G, with
      a prediction of an explosive surge in mobile traffic. It provides ultra-low
      latency, higher data rates, high device density, and ubiquitous coverage, positively
      impacting services in various areas. Energy saving is a major concern for new
      systems in the telecommunications sector because all players are expected to
      reduce their carbon footprints to contribute to mitigating climate change. Network
      slicing is a fundamental enabler for 6G/5G mobile networks and various other
      new systems, such as the Internet of Things (IoT), Internet of Vehicles (IoV),
      and Industrial IoT (IIoT). However, energy-saving methods embedded in network
      slicing architectures are still a research gap. This paper discusses how to
      embed energy-saving methods in network-slicing architectures that are a fundamental
      enabler for nearly all new innovative systems being deployed worldwide. This
      paper's main contribution is a proposal to save energy in network slicing. That
      is achieved by deploying ML-native agents in NS architectures to dynamically
      orchestrate and optimize resources based on user demands. The SFI2 network slicing
      reference architecture is the concrete use case scenario in which contrastive
      learning improves energy saving for resource allocation.
    summary_zh: 6G移动网络作为5G的演进，预计将引发移动流量爆炸式增长，提供超低延迟、高数据速率、高设备密度及无处不在的覆盖，深刻影响物联网、车联网等新兴服务领域。在电信行业，节能成为新系统的核心关注点，因所有参与者需减少碳足迹以应对气候变化。网络切片是6G/5G及物联网、工业物联网等系统的基础使能技术，但将节能方法嵌入切片架构仍存在研究空白。本文探讨如何在网络切片架构中集成节能机制，这些架构是全球创新系统部署的关键支撑。主要贡献是提出部署机器学习原生代理，根据用户需求动态编排和优化资源分配，实现高效节能。在SFI2网络切片参考架构的具体案例中，应用对比学习技术显著提升资源分配能效，通过智能代理实时调整网络参数，减少冗余计算和传输能耗。实验结果表明，该方法能有效降低6G网络能耗，为手机等终端设备提供低功耗通信环境，尤其适用于移动系统在高流量场景下的可持续运行，为AI驱动的节能方案提供了新范式。
    key_points_zh:
    - 网络切片是6G节能的关键载体，需嵌入智能优化方法
    - 部署ML原生代理动态编排资源，根据用户需求实时调整
    - 对比学习技术提升资源分配效率，减少手机通信能耗
    - SFI2架构验证方法在6G场景下显著降低系统功耗
    - 解决移动流量激增导致的能耗问题，适用于手机终端
    - 为AI代理在通信系统中的节能应用提供实践框架
