    title_en: Ultra Power-Efficient CNN Domain Specific Accelerator with 9.3TOPS/Watt
      for Mobile and Embedded Applications
    title_zh: 超低功耗CNN领域专用加速器：9.3TOPS/Watt用于移动和嵌入式应用
    pdf_url: https://arxiv.org/pdf/1805.00361v1.pdf
    summary_en: Computer vision performances have been significantly improved in recent
      years by Convolutional Neural Networks(CNN). Currently, applications using CNN
      algorithms are deployed mainly on general purpose hardwares, such as CPUs, GPUs
      or FPGAs. However, power consumption, speed, accuracy, memory footprint, and
      die size should all be taken into consideration for mobile and embedded applications.
      Domain Specific Architecture (DSA) for CNN is the efficient and practical solution
      for CNN deployment and implementation. We designed and produced a 28nm Two-Dimensional
      CNN-DSA accelerator with an ultra power-efficient performance of 9.3TOPS/Watt
      and with all processing done in the internal memory instead of outside DRAM.
      It classifies 224x224 RGB image inputs at more than 140fps with peak power consumption
      at less than 300mW and an accuracy comparable to the VGG benchmark. The CNN-DSA
      accelerator is reconfigurable to support CNN model coefficients of various layer
      sizes and layer types, including convolution, depth-wise convolution, short-cut
      connections, max pooling, and ReLU. Furthermore, in order to better support
      real-world deployment for various application scenarios, especially with low-end
      mobile and embedded platforms and MCUs (Microcontroller Units), we also designed
      algorithms to fully utilize the CNN-DSA accelerator efficiently by reducing
      the dependency on external accelerator computation resources, including implementation
      of Fully-Connected (FC) layers within the accelerator and compression of extracted
      features from the CNN-DSA accelerator. Live demos with our CNN-DSA accelerator
      on mobile and embedded systems show its capabilities to be widely and practically
      applied in the real world.
    summary_zh: 近年来，卷积神经网络（CNN）在计算机视觉领域取得显著突破，但其在移动和嵌入式设备上的部署面临功耗、速度、精度及内存占用等多重挑战。通用硬件如CPU、GPU或FPGA难以满足低功耗需求，而领域专用架构（DSA）为此提供了高效解决方案。本研究设计并实现了基于28纳米工艺的二维CNN-DSA加速器，其功耗效率高达9.3TOPS/Watt，所有数据处理均在内部内存完成，避免了外部DRAM访问带来的能耗与延迟。该加速器以低于300毫瓦的峰值功耗处理224x224
      RGB图像，分类速度超过140帧每秒，同时保持与VGG基准相当的精度。加速器支持可重配置性，能适应卷积、深度卷积、短路连接、最大池化及ReLU等多种CNN层类型。为优化资源受限场景，特别是低端移动平台和微控制器单元（MCU），我们开发了专用算法，在加速器内部实现全连接层并压缩特征数据，显著减少对外部计算资源的依赖。实际系统演示验证了其在移动设备中的广泛适用性，有效降低系统功耗并提升能效比，为绿色移动计算提供了实用技术路径。
    key_points_zh:
    - 提出28纳米CNN-DSA加速器，实现9.3TOPS/Watt超低功耗效率，所有处理在内部内存完成以避免外部DRAM能耗
    - 支持224x224图像实时分类，速度超140fps且功耗低于300mW，精度媲美VGG基准
    - 可重配置架构兼容多种CNN层类型，包括卷积、深度卷积、短路连接及激活函数
    - 设计专用算法在加速器内实现全连接层和特征压缩，减少对外部资源依赖
    - 针对低端移动平台和MCU优化部署，实测验证广泛实用性
    - 通过现场演示证明其在移动系统中有效降低功耗并提升能效
