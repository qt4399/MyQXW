    arxiv_id: 2012.11070v2
    title_en: Energy Efficient Federated Learning over Heterogeneous Mobile Devices
      via Joint Design of Weight Quantization and Wireless Transmission
    title_zh: 通过权重量化与无线传输联合设计实现异构移动设备上的高效联邦学习
    pdf_url: https://arxiv.org/pdf/2012.11070v2.pdf
    summary_en: Federated learning (FL) is a popular collaborative distributed machine
      learning paradigm across mobile devices. However, practical FL over resource
      constrained mobile devices confronts multiple challenges, e.g., the local on-device
      training and model updates in FL are power hungry and radio resource intensive
      for mobile devices. To address these challenges, in this paper, we attempt to
      take FL into the design of future wireless networks and develop a novel joint
      design of wireless transmission and weight quantization for energy efficient
      FL over mobile devices. Specifically, we develop flexible weight quantization
      schemes to facilitate on-device local training over heterogeneous mobile devices.
      Based on the observation that the energy consumption of local computing is comparable
      to that of model updates, we formulate the energy efficient FL problem into
      a mixed-integer programming problem where the quantization and spectrum resource
      allocation strategies are jointly determined for heterogeneous mobile devices
      to minimize the overall FL energy consumption (computation + transmissions)
      while guaranteeing model performance and training latency. Since the optimization
      variables of the problem are strongly coupled, an efficient iterative algorithm
      is proposed, where the bandwidth allocation and weight quantization levels are
      derived. Extensive simulations are conducted to verify the effectiveness of
      the proposed scheme.
    summary_zh: 联邦学习（FL）作为一种在移动设备上协作的分布式机器学习范式，面临本地训练和模型更新耗电及占用无线资源的挑战。本文针对资源受限的移动设备，提出将FL融入未来无线网络设计，开发一种联合设计无线传输和权重量化的新型方案，以实现能效优化的联邦学习。具体而言，我们设计了灵活的权重量化机制，以适应异构移动设备的本地训练需求。基于本地计算能耗与模型更新能耗相当的观察，我们将能效FL问题建模为混合整数规划问题，联合确定量化策略和频谱资源分配，旨在最小化整体FL能耗（包括计算和传输），同时确保模型性能和训练延迟。由于问题变量强耦合，我们提出了一种高效迭代算法，推导出最优带宽分配和权重量化级别。通过广泛的仿真实验，验证了所提方案在降低能耗方面的有效性，为移动设备上的高效联邦学习提供了实用解决方案，显著减少了系统功耗。
    key_points_zh:
    - 提出联合设计权重量化和无线传输的方案，优化移动设备联邦学习的能效
    - 开发灵活权重量化机制，适应异构设备的本地训练需求以降低计算功耗
    - 将能耗最小化问题建模为混合整数规划，联合优化量化策略与频谱资源分配
    - 设计高效迭代算法解决变量强耦合问题，推导最优带宽和量化级别
    - 通过仿真实验证明方案有效降低整体能耗（计算+传输），同时保障模型性能
