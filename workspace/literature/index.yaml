    title_en: TCN Mapping Optimization for Ultra-Low Power Time-Series Edge Inference
    title_zh: 超低功耗时间序列边缘推理的TCN映射优化
    pdf_url: https://arxiv.org/pdf/2203.12925v1.pdf
    summary_en: Temporal Convolutional Networks (TCNs) are emerging lightweight Deep
      Learning models for Time Series analysis. We introduce an automated exploration
      approach and a library of optimized kernels to map TCNs on Parallel Ultra-Low
      Power (PULP) microcontrollers. Our approach minimizes latency and energy by
      exploiting a layer tiling optimizer to jointly find the tiling dimensions and
      select among alternative implementations of the causal and dilated 1D-convolution
      operations at the core of TCNs. We benchmark our approach on a commercial PULP
      device, achieving up to 103X lower latency and 20.3X lower energy than the Cube-AI
      toolkit executed on the STM32L4 and from 2.9X to 26.6X lower energy compared
      to commercial closed-source and academic open-source approaches on the same
      hardware target.
    summary_zh: 时间卷积网络（TCN）作为一种新兴的轻量级深度学习模型，广泛应用于时间序列分析任务。本文提出了一种自动化探索方法和一套优化内核库，专门用于将TCN高效映射到并行超低功耗（PULP）微控制器上，以解决移动设备中AI推理的高能耗问题。该方法通过层平铺优化器联合优化平铺维度，并智能选择因果和扩张一维卷积操作的替代实现方案，从而显著降低推理延迟和系统能耗。在商用PULP设备上的基准测试表明，与STM32L4微控制器上运行的Cube-AI工具包相比，本方法实现了高达103倍的延迟降低和20.3倍的能耗降低；同时，相较于相同硬件目标上的商业闭源及学术开源方法，能耗降低幅度达到2.9倍至26.6倍。这一成果为智能手机等移动设备的低功耗AI应用提供了实用解决方案，有效延长了电池续航时间并提升了边缘推理效率。
    key_points_zh:
    - 提出自动化探索方法和优化内核库，实现TCN在PULP微控制器上的高效映射，专为超低功耗场景设计。
    - 利用层平铺优化器联合优化平铺维度和卷积操作实现方案，显著减少推理延迟和系统能耗。
    - 在商用PULP设备测试中，延迟比Cube-AI工具包低103倍，能耗降低20.3倍，性能优势突出。
    - 相较于其他商业和学术方法，能耗降低范围在2.9倍至26.6倍之间，验证了方法的广泛适用性。
    - 为智能手机等移动设备的时间序列AI推理提供低功耗解决方案，有效提升电池续航能力。
