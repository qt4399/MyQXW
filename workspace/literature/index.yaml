    arxiv_id: 2002.02897v2
    title_en: 'MDLdroid: a ChainSGD-reduce Approach to Mobile Deep Learning for Personal
      Mobile Sensing'
    title_zh: MDLdroid：面向个人移动感知的ChainSGD-reduce移动深度学习方法
    pdf_url: https://arxiv.org/pdf/2002.02897v2.pdf
    summary_en: Personal mobile sensing is fast permeating our daily lives to enable
      activity monitoring, healthcare and rehabilitation. Combined with deep learning,
      these applications have achieved significant success in recent years. Different
      from conventional cloud-based paradigms, running deep learning on devices offers
      several advantages including data privacy preservation and low-latency response
      for both model inference and update. Since data collection is costly in reality,
      Google's Federated Learning offers not only complete data privacy but also better
      model robustness based on multiple user data. However, personal mobile sensing
      applications are mostly user-specific and highly affected by environment. As
      a result, continuous local changes may seriously affect the performance of a
      global model generated by Federated Learning. In addition, deploying Federated
      Learning on a local server, e.g., edge server, may quickly reach the bottleneck
      due to resource constraint and serious failure by attacks. Towards pushing deep
      learning on devices, we present MDLdroid, a novel decentralized mobile deep
      learning framework to enable resource-aware on-device collaborative learning
      for personal mobile sensing applications. To address resource limitation, we
      propose a ChainSGD-reduce approach which includes a novel chain-directed Synchronous
      Stochastic Gradient Descent algorithm to effectively reduce overhead among multiple
      devices. We also design an agent-based multi-goal reinforcement learning mechanism
      to balance resources in a fair and efficient manner. Our evaluations show that
      our model training on off-the-shelf mobile devices achieves 2x to 3.5x faster
      than single-device training, and 1.5x faster than the master-slave approach.
    summary_zh: 本文针对个人移动感知应用中联邦学习的局限性（如用户特定环境导致全局模型性能下降及边缘服务器资源瓶颈），提出MDLdroid去中心化移动深度学习框架，支持资源感知的设备上协作学习。该框架创新性地设计ChainSGD-reduce方法，包含链导向同步随机梯度下降算法，有效减少多设备间通信开销；同时引入基于代理的多目标强化学习机制，公平高效地平衡设备资源分配。实验在商用移动设备上验证，MDLdroid的模型训练速度比单设备快2至3.5倍，比主从方法快1.5倍，显著提升训练效率。该方法避免了数据上传至云端或边缘服务器，既保护用户隐私又降低延迟，通过分布式协作减少单设备计算负载，从而有效降低手机系统功耗。研究成果为资源受限的移动设备提供了轻量级深度学习方案，特别适用于健康监测等个人感知场景的功耗优化需求。
    key_points_zh:
    - 提出MDLdroid框架，解决联邦学习在个人移动感知中因环境变化导致的模型性能下降问题。
