    title_en: Towards Energy Efficient Federated Learning over 5G+ Mobile Devices
    title_zh: 面向5G+移动设备的节能联邦学习研究
    pdf_url: https://arxiv.org/pdf/2101.04866v1.pdf
    summary_en: The continuous convergence of machine learning algorithms, 5G and
      beyond (5G+) wireless communications, and artificial intelligence (AI) hardware
      implementation hastens the birth of federated learning (FL) over 5G+ mobile
      devices, which pushes AI functions to mobile devices and initiates a new era
      of on-device AI applications. Despite the remarkable progress made in FL, huge
      energy consumption is one of the most significant obstacles restricting the
      development of FL over battery-constrained 5G+ mobile devices. To address this
      issue, in this paper, we investigate how to develop energy efficient FL over
      5G+ mobile devices by making a trade-off between energy consumption for "working"
      (i.e., local computing) and that for "talking" (i.e., wireless communications)
      in order to boost the overall energy efficiency. Specifically, we first examine
      energy consumption models for graphics processing unit (GPU) computation and
      wireless transmissions. Then, we overview the state of the art of integrating
      FL procedure with energy-efficient learning techniques (e.g., gradient sparsification,
      weight quantization, pruning, etc.). Finally, we present several potential future
      research directions for FL over 5G+ mobile devices from the perspective of energy
      efficiency.
    summary_zh: 随着机器学习算法、5G及更高级无线通信技术与人工智能硬件实现的深度融合，联邦学习在5G+移动设备上的应用迅速发展，推动了AI功能向终端迁移并开启设备端AI应用新时代。然而，尽管联邦学习取得显著进展，高能耗问题仍是限制其在电池受限设备上发展的核心障碍。本文聚焦于通过权衡'工作'（本地计算）与'通信'（无线传输）的能耗来提升整体能效。首先，系统分析了图形处理单元（GPU）计算和无线传输的能耗模型，揭示关键能耗来源；其次，全面综述了联邦学习流程与节能技术（如梯度稀疏化、权重量化及模型剪枝）的集成现状，探讨其优化潜力；最后，从能效视角提出5G+移动设备联邦学习的未来研究方向，包括动态资源调度与硬件协同设计。研究为解决移动设备上联邦学习的能耗瓶颈提供了理论框架与实践路径，对推动绿色AI应用具有重要意义。
    key_points_zh:
    - 联邦学习在5G+移动设备上面临高能耗挑战，尤其对电池供电设备构成发展限制。
    - 提出通过本地计算与无线通信能耗的动态权衡机制提升整体能效。
    - 详细解析GPU计算和无线传输的能耗模型，识别关键优化节点。
    - 综述梯度稀疏化、权重量化等节能技术在联邦学习中的集成应用现状。
    - 提出未来研究方向，强调动态资源调度与硬件协同设计的重要性。
