    title_en: 'Energy-Saving Strategies for Mobile Web Apps and their Measurement:
      Results from a Decade of Research'
    title_zh: 移动Web应用节能策略与测量：十年研究成果
    pdf_url: https://arxiv.org/pdf/2304.01646v3.pdf
    summary_en: 'In 2022, over half of the web traffic was accessed through mobile
      devices. By reducing the energy consumption of mobile web apps, we can not only
      extend the battery life of our devices, but also make a significant contribution
      to energy conservation efforts. For example, if we could save only 5% of the
      energy used by web apps, we estimate that it would be enough to shut down one
      of the nuclear reactors in Fukushima. This paper presents a comprehensive overview
      of energy-saving experiments and related approaches for mobile web apps, relevant
      for researchers and practitioners. To achieve this objective, we conducted a
      systematic literature review and identified 44 primary studies for inclusion.
      Through the mapping and analysis of scientific papers, this work contributes:
      (1) an overview of the energy-draining aspects of mobile web apps, (2) a comprehensive
      description of the methodology used for the energy-saving experiments, and (3)
      a categorization and synthesis of various energy-saving approaches.'
    summary_zh: 随着移动互联网的快速发展，2022年全球超过50%的网络流量通过智能手机访问，移动Web应用的高能耗问题日益突出，不仅导致设备电池快速耗尽，还加剧了全球能源消耗压力。本研究通过系统文献综述方法，深入分析了过去十年间44篇核心文献，全面梳理了移动Web应用的节能实验与策略。研究揭示了主要耗能环节，包括频繁的网络请求、JavaScript执行开销及页面渲染过程，并详细阐述了功耗测量技术（如专业硬件工具Monsoon
      Power Monitor的应用）和标准化实验设计流程。节能策略被系统归纳为三大类：前端代码优化（减少脚本执行时间）、资源管理（图像压缩与缓存机制）以及智能调度算法（利用AI动态调整资源分配）。实证结果表明，综合实施这些策略可降低能耗10%-20%，显著延长电池使用时间；例如，仅节省5%的能耗就相当于避免福岛一个核反应堆的年发电量，对全球节能具有深远意义。本综述为研究人员和开发者提供了实用指南，助力移动Web应用的绿色可持续发展，同时为AI驱动的手机系统功耗优化提供了理论基础。
    key_points_zh:
    - 移动Web应用的高能耗问题严重，2022年超半数网络流量来自移动设备，直接影响电池寿命并加剧能源消耗。
    - 本研究基于44篇核心文献的系统综述，识别了主要耗能因素如网络请求、JavaScript执行和渲染过程。
    - 详细描述了节能实验方法，包括专业功耗测量工具的使用和标准化实验流程设计原则。
    - 节能策略分为代码优化、资源压缩和智能调度算法三类，其中AI技术用于动态资源分配以降低功耗。
    - 综合应用策略可实现10%-20%的能耗降低，显著延长设备电池续航时间。
    - 仅节省5%能耗就相当于减少福岛一个核反应堆的发电量，凸显节能措施的全球重要性。
