    title_en: Dissecting the Impact of Mobile DVFS Governors on LLM Inference Performance
      and Energy Efficiency
    title_zh: 剖析移动DVFS调控器对大语言模型推理性能和能效的影响
    pdf_url: https://arxiv.org/pdf/2507.02135v1.pdf
    summary_en: Large Language Models (LLMs) are increasingly being integrated into
      various applications and services running on billions of mobile devices. However,
      deploying LLMs on resource-limited mobile devices faces a significant challenge
      due to their high demand for computation, memory, and ultimately energy. While
      current LLM frameworks for mobile use three power-hungry components-CPU, GPU,
      and Memory-even when running primarily-GPU LLM models, optimized DVFS governors
      for CPU, GPU, and memory featured in modern mobile devices operate independently
      and are oblivious of each other. Motivated by the above observation, in this
      work, we first measure the energy-efficiency of a SOTA LLM framework consisting
      of various LLM models on mobile phones which showed the triplet mobile governors
      result in up to 40.4% longer prefilling and decoding latency compared to optimal
      combinations of CPU, GPU, and memory frequencies with the same energy consumption
      for sampled prefill and decode lengths. Second, we conduct an in-depth measurement
      study to uncover how the intricate interplay (or lack of) among the mobile governors
      cause the above inefficiency in LLM inference. Finally, based on these insights,
      we design FUSE - a unified energy-aware governor for optimizing the energy efficiency
      of LLM inference on mobile devices. Our evaluation using a ShareGPT dataset
      shows FUSE reduces the time-to-first-token and time-per-output-token latencies
      by 7.0%-16.9% and 25.4%-36.8% on average with the same energy-per-token for
      various mobile LLM models.
    summary_zh: 大语言模型（LLMs）在移动设备上的快速普及面临高计算、内存及能耗挑战。本文深入研究了现代智能手机中CPU、GPU和内存的DVFS（动态电压频率缩放）调控器独立运行机制，揭示其互不协调导致的能效瓶颈。通过系统测量发现，现有三重调控器配置在相同能耗下，可使LLM预填充和解码延迟增加高达40.4%，严重制约推理效率。研究进一步剖析了调控器间缺乏协同的深层原因，并据此设计了FUSE——一种统一的能效感知调控器框架。FUSE通过智能优化频率组合，动态协调三大组件资源分配。基于ShareGPT数据集的实证评估表明，该方案在保持每令牌能耗不变的前提下，平均将首令牌延迟降低7.0%-16.9%，输出令牌延迟减少25.4%-36.8%，显著提升移动LLM推理的能效比，为AI驱动的移动应用提供了关键优化路径。
    key_points_zh:
    - 揭示移动设备DVFS调控器独立运行导致LLM推理能效低下，相同能耗下延迟增加40.4%
    - 通过深度测量分析，阐明调控器间缺乏协同的机制及其对推理性能的影响
    - 提出FUSE统一调控器框架，实现CPU、GPU和内存频率的智能协同优化
    - 实验证明FUSE在恒定能耗下显著降低推理延迟，首令牌延迟减少7.0%-16.9%
    - 输出令牌延迟平均改善25.4%-36.8%，大幅提升移动AI应用能效
    - 为资源受限设备部署高效LLM推理提供了可落地的技术方案
