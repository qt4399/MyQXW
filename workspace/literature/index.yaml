    pdf_url: https://arxiv.org/pdf/2406.15732v1.pdf
    summary_en: Reduced environmental effect, lower operating costs, and a stable
      and sustainable energy supply for current and future generations are the main
      reasons why power optimization is important. Power optimization makes ensuring
      that energy is used more effectively, cutting down on waste and optimizing the
      utilization of resources.In today's world, power optimization and artificial
      intelligence (AI) integration are essential to changing the way energy is produced,
      used, and distributed. Real-time monitoring and analysis of power usage trends
      is made possible by AI-driven algorithms and predictive analytics, which enable
      dynamic modifications to effectively satisfy demand. Efficiency and sustainability
      are increased when power consumption is optimized in different sectors thanks
      to the use of intelligent systems. This survey paper comprises an extensive
      review of the several AI techniques used for power optimization as well as a
      methodical analysis of the literature for the study of various intelligent system
      application domains across different disciplines of power consumption.This literature
      review identifies the performance and outcomes of 17 different research methods
      by assessing them, and it aims to distill valuable insights into their strengths
      and limitations. Furthermore, this article outlines future directions in the
      integration of AI for power consumption optimization.
    summary_zh: 功率优化对减少环境影响、降低运营成本及保障可持续能源供应具有核心价值，其核心在于提升能源利用效率并减少资源浪费。人工智能技术的深度集成正革新能源生产、分配与消费模式，通过AI驱动的实时监控、预测分析和动态调整机制，系统能精准响应需求变化并优化功率使用。本文全面综述了17种主流AI技术在功率优化中的应用，涵盖工业、建筑及移动设备等领域，系统分析了智能算法在提升能效方面的性能表现与局限性。研究发现，AI模型可显著降低智能手机等移动平台的系统功耗，例如通过行为预测动态管理后台进程。未来方向包括深化AI与边缘计算融合，开发轻量化模型以适配资源受限设备，并探索多智能体协同优化策略，为手机系统功耗降低提供创新解决方案。
    key_points_zh:
    - AI技术通过实时监控与预测分析实现功率使用的动态优化
    - 动态调整策略有效减少能源浪费并提升资源利用率
    - 综述评估17种AI方法，揭示其在移动设备领域的应用潜力
    - 针对手机系统，AI可优化后台进程管理以降低整体功耗
    - 未来需加强轻量化模型开发以适配移动平台资源限制
