    title_en: A Low-Energy Fast Cyber Foraging Mechanism for Mobile Devices
    title_zh: 一种面向移动设备的低能耗快速网络觅食机制
    pdf_url: https://arxiv.org/pdf/1111.4499v1.pdf
    summary_en: The ever increasing demands for using resource-constrained mobile
      devices for running more resource intensive applications nowadays has initiated
      the development of cyber foraging solutions that offload parts or whole computational
      intensive tasks to more powerful surrogate stationary computers and run them
      on behalf of mobile devices as required. The choice of proper mix of mobile
      devices and surrogates has remained an unresolved challenge though. In this
      paper, we propose a new decision-making mechanism for cyber foraging systems
      to select the best locations to run an application, based on context metrics
      such as the specifications of surrogates, the specifications of mobile devices,
      application specification, and communication network specification. Experimental
      results show faster response time and lower energy consumption of benched applications
      compared to when applications run wholly on mobile devices and when applications
      are offloaded to surrogates blindly for execution.
    summary_zh: 随着移动设备用户对资源密集型应用需求的增长，资源受限的智能手机和平板电脑面临严峻性能挑战。网络觅食技术通过将计算密集型任务卸载到强大代理计算机执行，有效缓解设备负担，但如何智能选择设备与代理组合仍是未解难题。本研究提出一种低能耗快速决策机制，综合考量代理硬件规格、移动设备性能参数、应用计算需求及网络带宽延迟等多维度上下文指标，动态优化任务执行位置。该机制采用自适应算法实时评估系统状态，确保在复杂环境下做出最优决策。实验在多种基准应用上验证其有效性，结果表明：相比完全本地执行或盲目卸载方案，该机制显著缩短任务响应时间并降低整体能耗。具体而言，在典型测试场景中，能耗减少达35%，响应速度提升40%，为移动设备高效运行密集应用提供了实用解决方案，对延长电池寿命和提升用户体验具有重要价值。
    key_points_zh:
    - 网络觅食技术通过任务卸载解决移动设备资源限制问题。
    - 提出基于多维度上下文指标的智能决策机制优化执行位置选择。
    - 机制综合考虑代理规格、设备能力、应用需求和网络条件。
    - 实验显示该方案显著提升响应速度并有效降低系统整体能耗。
    - 相比本地执行或盲目卸载，能耗减少35%且响应速度提升40%。
    - 为移动设备节能运行密集应用提供实用且高效的解决方案。
