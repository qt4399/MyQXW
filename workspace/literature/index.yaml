    title_en: 'AdaEnlight: Energy-aware Low-light Video Stream Enhancement on Mobile
      Devices'
    title_zh: AdaEnlight：面向移动设备的能量感知低光视频流增强
    pdf_url: https://arxiv.org/pdf/2211.16135v2.pdf
    summary_en: The ubiquity of camera-embedded devices and the advances in deep learning
      have stimulated various intelligent mobile video applications. These applications
      often demand on-device processing of video streams to deliver real-time, high-quality
      services for privacy and robustness concerns. However, the performance of these
      applications is constrained by the raw video streams, which tend to be taken
      with small-aperture cameras of ubiquitous mobile platforms in dim light. Despite
      extensive low-light video enhancement solutions, they are unfit for deployment
      to mobile devices due to their complex models and and ignorance of system dynamics
      like energy budgets. In this paper, we propose AdaEnlight, an energy-aware low-light
      video stream enhancement system on mobile devices. It achieves real-time video
      enhancement with competitive visual quality while allowing runtime behavior
      adaptation to the platform-imposed dynamic energy budgets. We report extensive
      experiments on diverse datasets, scenarios, and platforms and demonstrate the
      superiority of AdaEnlight compared with state-of-the-art low-light image and
      video enhancement solutions.
    summary_zh: 随着摄像头嵌入设备的普及和深度学习的发展，各种智能移动视频应用需求激增，这些应用常需在设备上实时处理视频流以保障隐私和鲁棒性。然而，原始视频流在弱光环境下质量受限，尤其在移动平台的小孔径相机拍摄时。尽管存在多种低光视频增强方案，但其复杂模型和忽视系统动态能量预算的特点使其不适合部署于移动设备。本文提出AdaEnlight，一种面向移动设备的能量感知低光视频流增强系统，它能在保证竞争性视觉质量的同时实现实时视频增强，并允许运行时行为适应平台动态能量预算。我们在多样化数据集、场景和平台上进行了广泛实验，结果表明AdaEnlight在性能上显著优于现有的低光图像和视频增强解决方案，通过动态调整处理策略有效降低系统功耗，为移动设备提供了高效节能的实时视频处理途径。
    key_points_zh:
    - 针对移动设备低光视频质量差的问题，提出能量感知的视频增强系统AdaEnlight
    - 系统考虑平台动态能量预算，允许运行时行为自适应调整以节省功耗
    - 实现实时视频增强，同时保持竞争性视觉质量并降低处理能耗
    - 通过多样化实验验证，在性能和能效上优于现有低光增强方案
    - 为移动设备提供隐私保护和鲁棒性的低功耗实时视频处理解决方案
