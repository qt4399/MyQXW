    title_en: Deep Reinforcement Learning for Online Computation Offloading in Wireless
      Powered Mobile-Edge Computing Networks
    title_zh: 基于深度强化学习的无线供电移动边缘计算网络在线计算卸载方法
    pdf_url: https://arxiv.org/pdf/1808.01977v6.pdf
    summary_en: Wireless powered mobile-edge computing (MEC) has recently emerged
      as a promising paradigm to enhance the data processing capability of low-power
      networks, such as wireless sensor networks and internet of things (IoT). In
      this paper, we consider a wireless powered MEC network that adopts a binary
      offloading policy, so that each computation task of wireless devices (WDs) is
      either executed locally or fully offloaded to an MEC server. Our goal is to
      acquire an online algorithm that optimally adapts task offloading decisions
      and wireless resource allocations to the time-varying wireless channel conditions.
      This requires quickly solving hard combinatorial optimization problems within
      the channel coherence time, which is hardly achievable with conventional numerical
      optimization methods. To tackle this problem, we propose a Deep Reinforcement
      learning-based Online Offloading (DROO) framework that implements a deep neural
      network as a scalable solution that learns the binary offloading decisions from
      the experience. It eliminates the need of solving combinatorial optimization
      problems, and thus greatly reduces the computational complexity especially in
      large-size networks. To further reduce the complexity, we propose an adaptive
      procedure that automatically adjusts the parameters of the DROO algorithm on
      the fly. Numerical results show that the proposed algorithm can achieve near-optimal
      performance while significantly decreasing the computation time by more than
      an order of magnitude compared with existing optimization methods. For example,
      the CPU execution latency of DROO is less than $0.1$ second in a $30$-user network,
      making real-time and optimal offloading truly viable even in a fast fading environment.
    summary_zh: 本文针对无线供电移动边缘计算网络中的低功耗设备数据处理能力提升问题，提出一种深度强化学习在线卸载框架（DROO），旨在优化任务卸载决策与无线资源分配以适应时变信道条件。传统数值优化方法难以在信道相干时间内快速求解组合优化问题，而DROO通过深度神经网络直接学习二进制卸载决策，避免了复杂优化过程，显著降低计算复杂度，尤其适用于大规模网络场景。该框架引入自适应参数调整机制，动态优化算法性能。实验结果表明，在30用户网络中，DROO的CPU执行延迟低于0.1秒，计算时间比现有方法减少一个数量级以上，同时实现接近最优的性能表现。该方法有效解决了无线传感器网络和物联网等低功耗网络在快速衰落环境中的实时卸载难题，通过减少本地计算负载显著降低设备能耗，为移动系统功耗优化提供了高效可行的解决方案。
    key_points_zh:
    - 提出DROO框架，利用深度神经网络学习二进制卸载决策，消除组合优化问题求解需求，大幅降低计算复杂度。
    - 设计自适应参数调整机制，动态优化算法性能，特别适用于大规模网络环境。
    - 在30用户网络中实现CPU执行延迟低于0.1秒，计算时间减少一个数量级以上，确保实时决策能力。
    - 数值实验验证接近最优性能，有效提升无线传感器网络和物联网的数据处理效率。
    - 通过减少本地计算负载显著降低设备能耗，为移动系统功耗优化提供新思路。
    - 适用于快速衰落环境，解决传统方法难以应对的时变信道条件挑战。
