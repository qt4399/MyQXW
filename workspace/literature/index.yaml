    title_en: 'FrankenSplit: Efficient Neural Feature Compression with Shallow Variational
      Bottleneck Injection for Mobile Edge Computing'
    title_zh: FrankenSplit：用于移动边缘计算的高效神经特征压缩与浅层变分瓶颈注入
    pdf_url: https://arxiv.org/pdf/2302.10681v4.pdf
    summary_en: The rise of mobile AI accelerators allows latency-sensitive applications
      to execute lightweight Deep Neural Networks (DNNs) on the client side. However,
      critical applications require powerful models that edge devices cannot host
      and must therefore offload requests, where the high-dimensional data will compete
      for limited bandwidth. This work proposes shifting away from focusing on executing
      shallow layers of partitioned DNNs. Instead, it advocates concentrating the
      local resources on variational compression optimized for machine interpretability.
      We introduce a novel framework for resource-conscious compression models and
      extensively evaluate our method in an environment reflecting the asymmetric
      resource distribution between edge devices and servers. Our method achieves
      60% lower bitrate than a state-of-the-art SC method without decreasing accuracy
      and is up to 16x faster than offloading with existing codec standards.
    summary_zh: 移动AI加速器的普及使延迟敏感型应用能在客户端执行轻量级深度神经网络，但关键任务所需的高性能模型往往超出边缘设备承载能力，导致计算卸载时高维数据竞争有限网络带宽，加剧系统功耗问题。本研究创新性地提出FrankenSplit框架，摒弃传统分区DNN浅层执行思路，转而将本地资源集中于面向机器可解释性优化的变分压缩技术。该方法通过浅层变分瓶颈注入实现神经特征的高效压缩，在模拟边缘设备与服务器资源不对称分布的环境中进行了全面评估。实验结果表明，该方案在保持模型精度不变的前提下，比特率较最先进语义压缩方法降低60%，且卸载速度比现有编解码标准快16倍。这一突破显著缓解了移动边缘计算中的带宽压力与能耗瓶颈，为低功耗手机AI系统提供了轻量化数据传输新范式，有效平衡了性能与能效需求。
    key_points_zh:
    - 摒弃分区DNN浅层执行，聚焦变分压缩技术优化机器可解释性
    - 引入浅层变分瓶颈注入实现神经特征高效压缩，降低数据维度
    - 比特率较先进方法降低60%且精度无损，显著减少传输能耗
    - 卸载速度提升16倍，缓解边缘计算带宽竞争问题
    - 在资源不对称环境中验证，适用于手机等移动设备低功耗场景
    - 为移动AI系统提供轻量化数据传输解决方案，优化整体能效
