    title_en: 'SPA-Bench: A Comprehensive Benchmark for SmartPhone Agent Evaluation'
    title_zh: SPA-Bench：智能手机代理评估的综合基准
    pdf_url: https://arxiv.org/pdf/2410.15164v3.pdf
    summary_en: 'Smartphone agents are increasingly important for helping users control
      devices efficiently, with (Multimodal) Large Language Model (MLLM)-based approaches
      emerging as key contenders. Fairly comparing these agents is essential but challenging,
      requiring a varied task scope, the integration of agents with different implementations,
      and a generalisable evaluation pipeline to assess their strengths and weaknesses.
      In this paper, we present SPA-Bench, a comprehensive SmartPhone Agent Benchmark
      designed to evaluate (M)LLM-based agents in an interactive environment that
      simulates real-world conditions. SPA-Bench offers three key contributions: (1)
      A diverse set of tasks covering system and third-party apps in both English
      and Chinese, focusing on features commonly used in daily routines; (2) A plug-and-play
      framework enabling real-time agent interaction with Android devices, integrating
      over ten agents with the flexibility to add more; (3) A novel evaluation pipeline
      that automatically assesses agent performance across multiple dimensions, encompassing
      seven metrics related to task completion and resource consumption. Our extensive
      experiments across tasks and agents reveal challenges like interpreting mobile
      user interfaces, action grounding, memory retention, and execution costs. We
      propose future research directions to ease these difficulties, moving closer
      to real-world smartphone agent applications. SPA-Bench is available at https://ai-agents-2030.github.io/SPA-Bench/.'
    summary_zh: 随着多模态大语言模型（MLLM）在智能手机代理领域的兴起，开发高效节能的代理系统成为降低设备功耗的关键。然而，公平评估这些代理面临任务多样性、实现差异和标准化缺失等挑战。本研究推出SPA-Bench——一个全面的智能手机代理评估基准，专为模拟真实交互环境设计。其核心贡献包括：构建覆盖中英文系统设置及主流第三方应用的多样化任务库，聚焦用户日常高频操作；开发即插即用框架，支持实时代理与Android设备交互，已集成十余种代理模型并便于扩展；设计多维度自动评估管道，综合测量任务成功率、响应时间、内存占用及能耗等七项指标。大规模实验揭示当前代理在用户界面解析、动作精准执行、长期记忆维持及资源效率方面存在瓶颈，尤其指出复杂任务执行时功耗激增问题。研究进一步提出轻量级模型优化和智能调度算法等未来方向，旨在显著降低系统功耗，推动代理技术实用化。SPA-Bench已开源，为AI驱动的手机节能研究提供重要工具。
