    arxiv_id: 2410.07426v1
    title_en: 'CAFEEN: A Cooperative Approach for Energy Efficient NoCs with Multi-Agent
      Reinforcement Learning'
    title_zh: CAFEEN：基于多智能体强化学习的节能片上网络合作方法
    pdf_url: https://arxiv.org/pdf/2410.07426v1.pdf
    summary_en: In emerging high-performance Network-on-Chip (NoC) architectures,
      efficient power management is crucial to minimize energy consumption. We propose
      a novel framework called CAFEEN that employs both heuristic-based fine-grained
      and machine learning-based coarse-grained power-gating for energy-efficient
      NoCs. CAFEEN uses a fine-grained method to activate only essential NoC buffers
      during lower network loads. It switches to a coarse-grained method at peak loads
      to minimize compounding wake-up overhead using multi-agent reinforcement learning.
      Results show that CAFEEN adaptively balances power-efficiency with performance,
      reducing total energy by 2.60x for single application workloads and 4.37x for
      multi-application workloads, compared to state-of-the-art NoC power-gating frameworks.
    summary_zh: 在高性能片上网络（NoC）架构中，高效的电源管理对降低系统能耗具有决定性作用。本文提出CAFEEN框架，一种创新的节能解决方案，通过融合基于启发式的细粒度电源门控和基于机器学习的粗粒度电源门控技术，实现动态能效优化。该框架在低网络负载条件下采用细粒度方法，仅激活必要的NoC缓冲区以最小化空闲能耗；当负载达到峰值时，智能切换至粗粒度方法，利用多智能体强化学习算法协调电源门控决策，有效抑制累积唤醒开销。CAFEEN的核心优势在于其自适应能力，能够根据实时负载变化动态平衡能效与性能需求，避免传统方法在能效与延迟间的权衡困境。实验结果表明，该框架在单应用工作负载下实现总能耗降低2.60倍，在多应用工作负载下降低4.37倍，显著优于现有最先进的NoC电源管理方案，为移动设备芯片设计提供了高效节能的新途径。
    key_points_zh:
