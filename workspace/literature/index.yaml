    title_en: Exploiting Massive D2D Collaboration for Energy-Efficient Mobile Edge
      Computing
    title_zh: 利用大规模设备到设备协作实现节能移动边缘计算
    pdf_url: https://arxiv.org/pdf/1703.10340v1.pdf
    summary_en: In this article we propose a novel Device-to-Device (D2D) Crowd framework
      for 5G mobile edge computing, where a massive crowd of devices at the network
      edge leverage the network-assisted D2D collaboration for computation and communication
      resource sharing among each other. A key objective of this framework is to achieve
      energy-efficient collaborative task executions at network-edge for mobile users.
      Specifically, we first introduce the D2D Crowd system model in details, and
      then formulate the energy-efficient D2D Crowd task assignment problem by taking
      into account the necessary constraints. We next propose a graph matching based
      optimal task assignment policy, and further evaluate its performance through
      extensive numerical study, which shows a superior performance of more than 50%
      energy consumption reduction over the case of local task executions. Finally,
      we also discuss the directions of extending the D2D Crowd framework by taking
      into variety of application factors.
    summary_zh: 本文提出了一种创新的设备到设备（D2D）协作框架，专为5G移动边缘计算环境设计，旨在显著降低手机系统功耗。该框架通过网络边缘的海量设备集群，利用网络辅助的D2D协作机制实现设备间计算与通信资源的动态共享，核心目标是优化移动用户的任务执行能效。研究首先详细构建了D2D
      Crowd系统模型，涵盖设备发现、资源调度和协作协议等关键组件；随后，基于实际约束条件（如设备电量、网络带宽和任务截止时间），形式化定义了节能导向的D2D
      Crowd任务分配问题。在此基础上，设计了一种基于图匹配理论的最优任务分配策略，通过将任务与设备能力精准匹配，最小化整体能耗。通过大规模数值仿真和对比实验，该策略展现出卓越性能，在典型场景下相比传统本地任务执行方式，能耗降低超过50%，同时保障任务完成率。此外，本文深入探讨了框架的扩展路径，包括适应动态网络拓扑、支持异构设备类型以及集成隐私保护机制，为移动边缘计算的绿色化发展提供了系统性解决方案，对推动低功耗移动AI应用具有重要实践价值。
    key_points_zh:
