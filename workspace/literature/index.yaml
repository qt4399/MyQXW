    arxiv_id: 2205.13770v1
    title_en: 'LEAF + AIO: Edge-Assisted Energy-Aware Object Detection for Mobile
      Augmented Reality'
    title_zh: LEAF + AIO：面向移动增强现实的边缘辅助能量感知目标检测
    pdf_url: https://arxiv.org/pdf/2205.13770v1.pdf
    summary_en: Today very few deep learning-based mobile augmented reality (MAR)
      applications are applied in mobile devices because they are significantly energy-guzzling.
      In this paper, we design an edge-based energy-aware MAR system that enables
      MAR devices to dynamically change their configurations, such as CPU frequency,
      computation model size, and image offloading frequency based on user preferences,
      camera sampling rates, and available radio resources. Our proposed dynamic MAR
      configuration adaptations can minimize the per frame energy consumption of multiple
      MAR clients without degrading their preferred MAR performance metrics, such
      as latency and detection accuracy. To thoroughly analyze the interactions among
      MAR configurations, user preferences, camera sampling rate, and energy consumption,
      we propose, to the best of our knowledge, the first comprehensive analytical
      energy model for MAR devices. Based on the proposed analytical model, we design
      a LEAF optimization algorithm to guide the MAR configuration adaptation and
      server radio resource allocation. An image offloading frequency orchestrator,
      coordinating with the LEAF, is developed to adaptively regulate the edge-based
      object detection invocations and to further improve the energy efficiency of
      MAR devices. Extensive evaluations are conducted to validate the performance
      of the proposed analytical model and algorithms.
    summary_zh: 当前，基于深度学习的移动增强现实（MAR）应用在移动设备上应用较少，主要因其能耗过高。本文设计了一个基于边缘的能量感知MAR系统，使MAR设备能够根据用户偏好、相机采样率和可用无线资源动态调整配置，如CPU频率、计算模型大小和图像卸载频率。所提出的动态MAR配置适应机制能在不降低用户偏好的性能指标（如延迟和检测精度）的前提下，最小化多个MAR客户端的每帧能耗。为深入分析MAR配置、用户偏好、相机采样率与能耗之间的交互关系，我们提出了首个全面的MAR设备能量分析模型。基于该模型，设计了LEAF优化算法来指导MAR配置适应和服务器无线资源分配，并开发了图像卸载频率协调器，自适应调节基于边缘的目标检测调用以进一步提升能效。通过广泛的实验评估，验证了该系统在多客户端场景下显著降低能耗的有效性，同时确保用户体验不受影响。
    key_points_zh:
