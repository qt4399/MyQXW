  user: 你有哪些技能
  assistant: '我能做的主要是这些：


    - **回答问题**：解释概念、查漏补缺、做对比判断

    - **写作和改写**：文章、邮件、总结、文案、提纲、润色

    - **代码协助**：读代码、改代码、排查报错、写脚本、解释逻辑

    - **文档整理**：把零散信息整理成清晰结构

    - **分析资料**：提炼重点、比较方案、归纳结论

    - **制定方案**：任务拆解、执行步骤、优先级建议

    - **读取本地文件**：如果你的环境里有文件，我可以基于文件内容继续处理

    - **命令行协助**：运行一些本地命令来检查项目、文件、日志等

    - **长期协作**：基于已有记录维持上下文，不用每次都从零讲一遍


    你也可以把我当成：


    - 半个程序员

    - 半个秘书

    - 半个研究助理

    - 半个文字编辑


    但我也有边界：


    - 不能替你擅自对外发消息、做承诺

    - 不适合凭空编造事实

    - 高风险操作前需要你确认


    如果你愿意，我也可以直接用一句更实在的话说：

    **我最擅长的是：看懂你的问题，然后帮你把信息、文字、代码、文件变得可用。**'
